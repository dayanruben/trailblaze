<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trailblaze</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
    <script>
        console.log("Trailblaze UI loaded");

        // Decompress GZIP base64 string data (returns JSON string, not parsed object)
        async function decompressString(base64Data) {
            if (!base64Data) return null;

            // Decode base64 to binary
            const binaryString = atob(base64Data);
            const compressedBytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                compressedBytes[i] = binaryString.charCodeAt(i);
            }

            // Decompress using DecompressionStream
            if (typeof DecompressionStream !== 'undefined') {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                writer.write(compressedBytes);
                writer.close();

                const decompressedBuffer = await new Response(ds.readable).arrayBuffer();
                const decompressedText = new TextDecoder().decode(decompressedBuffer);
                return decompressedText;  // Return the JSON string, not parsed
            } else {
                throw new Error('DecompressionStream not supported');
            }
        }

        // Decompress GZIP base64 binary data (returns base64 string of decompressed bytes)
        async function decompressBinaryToBase64(base64Data) {
            if (!base64Data) return null;

            // Decode base64 to binary
            const binaryString = atob(base64Data);
            const compressedBytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                compressedBytes[i] = binaryString.charCodeAt(i);
            }

            // Decompress using DecompressionStream
            if (typeof DecompressionStream !== 'undefined') {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                writer.write(compressedBytes);
                writer.close();

                const decompressedBuffer = await new Response(ds.readable).arrayBuffer();
                const decompressedBytes = new Uint8Array(decompressedBuffer);

                // Convert back to base64
                let binary = '';
                for (let i = 0; i < decompressedBytes.length; i++) {
                    binary += String.fromCharCode(decompressedBytes[i]);
                }
                return btoa(binary);
            } else {
                throw new Error('DecompressionStream not supported');
            }
        }

        // Per-key promises that resolve to the decompressed JSON string.
        // Shared across concurrent callers so every caller for the same key sees the same result;
        // promises remain in the map after they resolve so later callers get the same string
        // (Kotlin caches the parsed value, so subsequent hits are rare).
        window.trailblaze_report_decompression_promises = {};

        // Key prefixes for hierarchical lookup
        const SESSION_PREFIX = 'session/';
        const CAPTURE_METADATA_PREFIX = 'capture_metadata/';
        const DEVICE_LOGS_PREFIX = 'device_logs/';

        // Type-appropriate empty fallback when no compressed source exists or decompression fails.
        // Kotlin side expects: /logs -> List, other -> Object. (No `/yaml` callers exist —
        // recording YAML is generated client-side from logs in the Wasm UI, see InlinedDataLoader.)
        function trailblazeReportFallback(key) {
            if (key.endsWith('/logs')) return '[]';
            return '{}';
        }

        // Lazy decompression on first access - supports hierarchical keys like "session/SESSION_ID/logs"
        window.getTrailblazeReportJsonFromBrowser = async function (key, callback) {
            console.log("getTrailblazeReportJsonFromBrowser called with key: " + key);

            // Single source of truth: the per-key promise. First caller creates it; every later
            // caller (including ones that arrive after it resolves) awaits the same promise and
            // gets the same jsonString. The previous implementation cached the parsed value and
            // nulled it after the first callback fired, so a second concurrent caller read null
            // and the Kotlin side threw JsonDecodingException.
            if (window.trailblaze_report_decompression_promises[key]) {
                try {
                    const jsonString = await window.trailblaze_report_decompression_promises[key];
                    callback(jsonString);
                } catch (error) {
                    console.error("Cached decompression rejected for " + key + ":", error);
                    callback(trailblazeReportFallback(key));
                }
                return;
            }

            // Try to find compressed data - support both flat and hierarchical keys
            let compressedData = null;

            // Direct lookup for flat keys (sessions, session_info, session_detail)
            // Skip if the key is explicitly null (legacy fields removed)
            if (window.trailblaze_report_compressed &&
                window.trailblaze_report_compressed[key] !== null &&
                window.trailblaze_report_compressed[key] !== undefined) {
                compressedData = window.trailblaze_report_compressed[key];
            }
            // Hierarchical lookup for per-session keys (session/SESSION_ID/logs)
            else if (key.startsWith(SESSION_PREFIX)) {
                const parts = key.split('/');
                if (parts.length === 3) {
                    const sessionId = parts[1];
                    const dataType = parts[2]; // 'logs'

                    if (dataType === 'logs') {
                        compressedData = window.trailblaze_report_compressed.per_session_logs[sessionId];
                    }
                }
            }
            // Capture metadata lookup (capture_metadata/SESSION_ID)
            else if (key.startsWith(CAPTURE_METADATA_PREFIX)) {
                const sessionId = key.substring(CAPTURE_METADATA_PREFIX.length);
                if (window.trailblaze_report_compressed.capture_metadata) {
                    compressedData = window.trailblaze_report_compressed.capture_metadata[sessionId];
                }
            }
            // Device logs lookup (device_logs/SESSION_ID)
            else if (key.startsWith(DEVICE_LOGS_PREFIX)) {
                const sessionId = key.substring(DEVICE_LOGS_PREFIX.length);
                if (window.trailblaze_report_compressed.device_logs) {
                    compressedData = window.trailblaze_report_compressed.device_logs[sessionId];
                }
            }

            // Decompress the data if found
            if (compressedData) {
                console.log("Decompressing " + key + "...");
                console.log("Compressed data length:", compressedData.length);
                const compressionPromise = decompressString(compressedData)
                    .then(jsonString => {
                        // No JSON.parse validate here — for multi-MB session-logs payloads it would
                        // double the parse cost (Kotlin's Json.decodeFromString parses again on the
                        // consumer side, and that's the contract-bearing parse). The Kotlin caller
                        // already wraps its decode in try/catch and treats failures as empty results.
                        console.log(key + " decompressed (" + jsonString.length + " chars)");

                        // Free memory: delete compressed source uniformly across all key types.
                        // The resolved promise above now holds the only reference we need.
                        if (window.trailblaze_report_compressed) {
                            if (key.startsWith(SESSION_PREFIX)) {
                                const parts = key.split('/');
                                const sessionId = parts[1];
                                const dataType = parts[2];
                                if (dataType === 'logs' && window.trailblaze_report_compressed.per_session_logs) {
                                    delete window.trailblaze_report_compressed.per_session_logs[sessionId];
                                }
                            } else if (key.startsWith(CAPTURE_METADATA_PREFIX)) {
                                const sessionId = key.substring(CAPTURE_METADATA_PREFIX.length);
                                if (window.trailblaze_report_compressed.capture_metadata) {
                                    delete window.trailblaze_report_compressed.capture_metadata[sessionId];
                                }
                            } else if (key.startsWith(DEVICE_LOGS_PREFIX)) {
                                const sessionId = key.substring(DEVICE_LOGS_PREFIX.length);
                                if (window.trailblaze_report_compressed.device_logs) {
                                    delete window.trailblaze_report_compressed.device_logs[sessionId];
                                }
                            } else {
                                // Flat keys: sessions, session_info, session_detail, etc.
                                delete window.trailblaze_report_compressed[key];
                            }
                        }

                        return jsonString;
                    })
                    .catch(error => {
                        console.error("Failed to decompress " + key + ":", error);
                        // Drop the rejected promise so a retry can attempt fresh decompression
                        delete window.trailblaze_report_decompression_promises[key];
                        throw error;
                    });

                window.trailblaze_report_decompression_promises[key] = compressionPromise;

                try {
                    const jsonString = await compressionPromise;
                    console.log("About to callback with JSON string length:", jsonString.length);
                    callback(jsonString);
                } catch (error) {
                    // The .catch() above already logged and dropped the promise.
                    // Callback with a fallback so the Kotlin side doesn't hang forever
                    // on its CompletableDeferred await.
                    callback(trailblazeReportFallback(key));
                }
            } else {
                // Cache a resolved promise of the fallback so repeat callers for known-not-present
                // keys (e.g. network_logs/<id> for sessions that didn't capture network traffic) don't
                // re-walk all lookup branches and re-log the same "no compressed data" error each time.
                console.warn("No compressed data found for key: " + key + " — caching fallback");
                const fallback = trailblazeReportFallback(key);
                window.trailblaze_report_decompression_promises[key] = Promise.resolve(fallback);
                callback(fallback);
            }
        }

        window.trailblaze_report_compressed = {};

        // Track in-progress decompressions to avoid duplicate work
        const decompressingImages = new Map();

        // Low-level image decompression (no caching - that's handled in Kotlin/WASM)
        window.decompressImageCallback = function (imageKey, callback) {
            if (!imageKey) {
                callback(null);
                return;
            }

            // Check if it's a remote URL - pass through unchanged
            if (imageKey.startsWith('http://') || imageKey.startsWith('https://')) {
                console.log('🌐 Remote URL detected, passing through:', imageKey);
                callback(imageKey);
                return;
            }

            // Check if already decompressing (avoid duplicate work)
            if (decompressingImages.has(imageKey)) {
                console.log('⏳ Image decompression in progress, queuing callback:', imageKey);
                decompressingImages.get(imageKey).push(callback);
                return;
            }

            // Start decompression
            decompressingImages.set(imageKey, [callback]);

            // Helper function to actually load the image
            const loadImage = () => {
                // Look up from compressed images
                if (!window.trailblaze_report_compressed || !window.trailblaze_report_compressed.images) {
                    console.warn('No compressed images found');
                    const callbacks = decompressingImages.get(imageKey);
                    callbacks.forEach(cb => cb(null));
                    decompressingImages.delete(imageKey);
                    return;
                }

                // Resolve image aliases (deduplicated video frames point to a canonical key)
                let resolvedKey = imageKey;
                if (window.trailblaze_report_compressed.image_aliases &&
                    window.trailblaze_report_compressed.image_aliases[imageKey]) {
                    resolvedKey = window.trailblaze_report_compressed.image_aliases[imageKey];
                }

                let compressedImage = window.trailblaze_report_compressed.images[resolvedKey];

                if (!compressedImage) {
                    console.warn('Image not found:', imageKey);
                    const callbacks = decompressingImages.get(imageKey);
                    callbacks.forEach(cb => cb(null));
                    decompressingImages.delete(imageKey);
                    return;
                }

                // Decompress the image (GZIP → raw bytes → base64)
                decompressBinaryToBase64(compressedImage).then(base64Data => {
                    const format = imageKey.endsWith('.png') ? 'png' : imageKey.endsWith('.webp') ? 'webp' : 'jpeg';
                    const dataUrl = `data:image/${format};base64,${base64Data}`;

                    // Free memory: delete compressed source after decompression.
                    // Don't delete if this is a canonical image that aliases may still reference.
                    if (resolvedKey === imageKey) {
                        // Only safe to delete if no aliases point to this key
                        const aliases = window.trailblaze_report_compressed.image_aliases;
                        const isCanonicalTarget = aliases && Object.values(aliases).includes(imageKey);
                        if (!isCanonicalTarget) {
                            delete window.trailblaze_report_compressed.images[imageKey];
                        }
                    }
                    // Clean up the alias entry since it's been resolved
                    if (resolvedKey !== imageKey && window.trailblaze_report_compressed.image_aliases) {
                        delete window.trailblaze_report_compressed.image_aliases[imageKey];
                    }

                    // Call all pending callbacks
                    const callbacks = decompressingImages.get(imageKey);
                    callbacks.forEach(cb => cb(dataUrl));
                    decompressingImages.delete(imageKey);
                }).catch(error => {
                    console.error('❌ Failed to decompress image:', imageKey, error);
                    const callbacks = decompressingImages.get(imageKey);
                    callbacks.forEach(cb => cb(null));
                    decompressingImages.delete(imageKey);
                });
            };

            // Load immediately - all data is inline in the compressed data block
            loadImage();
        };
        // Browser-level image preloading - triggers download and caches in browser HTTP cache
        window.preloadImageInBrowser = function(url) {
            const img = new Image();
            img.src = url;
        };
    </script>
    <script type="application/javascript" src="composeApp.js"></script>
</head>
<body>
</body>
</html>
