name: iOS Contacts Trails

on:
  # Runs on PRs targeting the default branch
  pull_request:
    branches: [ "main" ]

  # Runs after merging to the default branch
  push:
    branches: [ "main" ]

# Allow only one concurrent run per ref, cancelling any queued run when a
# newer one is triggered (mirrors the pr-checks.yml concurrency policy).
concurrency:
  group: ios-contacts-trails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-build the trailblaze uber JAR (with WASM template embedded) once and
  # publish it as an artifact for the downstream trails job. Mirrors the
  # `build-uber-jar` job in `pr-checks.yml` — see that file's header comment
  # for the rationale. Runs on macos-15 (same runner OS as the downstream
  # trails job) because Compose Desktop's `packageUberJarForCurrentOS`
  # bundles the OS-specific Skiko native library, so a Linux-built JAR
  # wouldn't carry the macOS Skiko binary the downstream daemon loads at
  # startup.
  build-uber-jar:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        # trailblaze-desktop transitively depends on Android-targeted modules,
        # so the Android Gradle Plugin needs an SDK to evaluate the build.
        # Mirrors the build-desktop.yml job which also runs on macOS.
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build trailblaze uber JAR (with WASM template embedded)
        env:
          TRAILBLAZE_GRADLE_EXTRA_ARGS: -Ptrailblaze.wasm=true
        run: ./scripts/install-trailblaze-source.sh

      - name: Stage artifact contents
        run: |
          mkdir -p trailblaze-uber-jar
          cp trailblaze-desktop/build/release/trailblaze.jar trailblaze-uber-jar/
          cp trailblaze-desktop/build/release/trailblaze trailblaze-uber-jar/
          ls -lh trailblaze-uber-jar/

      - name: Upload uber JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: trailblaze-uber-jar
          path: trailblaze-uber-jar/
          if-no-files-found: error
          retention-days: 7

  # Drives a recorded iOS Contacts trail via the Trailblaze CLI
  # (`trailblaze trail -d ios …`). Agent loop runs in-process on the host
  # using the bundled Maestro/XCTest driver. No external Maestro CLI
  # installation is required — Maestro is a JVM dependency of trailblaze-host
  # and ships inside the Trailblaze JAR. The XCTest runner is auto-installed
  # on the simulator at first connection.
  #
  # Requires a macOS runner for iOS Simulator support. macOS-15 ships with
  # Xcode 16 which includes iOS 18 simulator runtimes.
  ios-contacts-trails:
    runs-on: macos-15
    timeout-minutes: 60
    needs: build-uber-jar
    env:
      # Recordings-only — LLM is never invoked. A non-empty sentinel value is
      # required to satisfy the provider/client wiring.
      OPENAI_API_KEY: no-key-set

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Download prebuilt uber JAR
        uses: actions/download-artifact@v4
        with:
          name: trailblaze-uber-jar
          path: trailblaze-uber-jar/

      - name: Install trailblaze from prebuilt artifact
        env:
          TRAILBLAZE_ARTIFACT_DIR: ${{ github.workspace }}/trailblaze-uber-jar
        run: ./scripts/install-trailblaze-from-artifact.sh

      - name: Boot iOS Simulator
        run: |
          echo "Available iPhone simulators:"
          xcrun simctl list devices available | grep "iPhone"

          # Prefer iPhone 16 Pro (available on Xcode 16 / macOS-15 runners).
          # Fall back to the first available iPhone so the job degrades
          # gracefully if the runner image changes the set of pre-installed
          # simulators (e.g. Xcode minor update removes a device type).
          SIMULATOR_UDID=$(
            xcrun simctl list devices available |
            grep "iPhone 16 Pro " | grep -v "Max\|Plus" |
            head -1 |
            grep -oE "[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}"
          )

          if [ -z "$SIMULATOR_UDID" ]; then
            echo "iPhone 16 Pro not found, falling back to first available iPhone..."
            SIMULATOR_UDID=$(
              xcrun simctl list devices available |
              grep "iPhone" |
              head -1 |
              grep -oE "[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}"
            )
          fi

          if [ -z "$SIMULATOR_UDID" ]; then
            echo "ERROR: No iPhone simulator found"
            exit 1
          fi

          echo "Booting simulator UDID: $SIMULATOR_UDID"
          xcrun simctl boot "$SIMULATOR_UDID"

          # Block until the simulator reaches the Booted state. -b causes
          # bootstatus to exit once boot is complete rather than streaming.
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"
          echo "✓ Simulator booted: $SIMULATOR_UDID"

      - name: Run iOS Contacts trail
        id: run-trails
        continue-on-error: true
        run: ./.github/pr_run_ios_contacts_trails.sh

      - name: Generate Trailblaze report
        if: always()
        continue-on-error: true
        run: ./.github/pr_generate_trailblaze_report.sh

      - name: Create artifacts
        if: always()
        continue-on-error: true
        run: ./.github/pr_create_artifacts.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trailblaze-artifacts-ios-contacts
          path: |
            trailblaze-logs.zip
            trailblaze_report.html

      - name: Fail if trails failed
        if: steps.run-trails.outcome == 'failure'
        run: |
          echo "iOS Contacts trails failed - failing the workflow"
          exit 1
