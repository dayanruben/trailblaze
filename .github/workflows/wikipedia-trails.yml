name: Wikipedia Trails

on:
  # Runs after merging to the default branch. PR validation lives in
  # pr-checks.yml so it can share that workflow's prebuilt Linux uber JAR
  # instead of rebuilding the same artifact in a second workflow.
  push:
    branches: [ "main" ]

# Allow only one concurrent run per ref, cancelling any queued run when a
# newer one is triggered (mirrors the pr-checks.yml concurrency policy).
concurrency:
  group: wikipedia-trails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-build the trailblaze uber JAR (with WASM template embedded) once and
  # publish it as an artifact for the downstream trails job. Matches the
  # `build-uber-jar` job pattern in `pr-checks.yml` — see that file's header
  # comment for the rationale. The trails job downloads + installs the
  # prebuilt CLI so every `trailblaze` invocation runs via `java -jar`,
  # skipping the cold Gradle compile + daemon start each one would otherwise
  # incur.
  build-uber-jar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build trailblaze uber JAR (with WASM template embedded)
        env:
          TRAILBLAZE_GRADLE_EXTRA_ARGS: -Ptrailblaze.wasm=true
        run: ./scripts/install-trailblaze-source.sh

      - name: Stage artifact contents
        run: |
          mkdir -p trailblaze-uber-jar
          cp trailblaze-desktop/build/release/trailblaze.jar trailblaze-uber-jar/
          cp trailblaze-desktop/build/release/trailblaze trailblaze-uber-jar/
          ls -lh trailblaze-uber-jar/

      - name: Upload uber JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: trailblaze-uber-jar
          path: trailblaze-uber-jar/
          if-no-files-found: error
          retention-days: 7

  # Drives a recorded Wikipedia trail via the Trailblaze CLI (`trailblaze trail …`).
  # Agent loop runs in-process on the host using Playwright/Chromium; no Android
  # emulator is required. LLM inference is never invoked because the trail has
  # pre-recorded tool sequences.
  wikipedia-trails:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-uber-jar
    env:
      # Recordings-only — LLM is never invoked. A non-empty sentinel value is
      # required to satisfy the provider/client wiring (see android-tests-host-rpc
      # in pr-checks.yml for the same pattern).
      OPENAI_API_KEY: no-key-set

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Download prebuilt uber JAR
        uses: actions/download-artifact@v4
        with:
          name: trailblaze-uber-jar
          path: trailblaze-uber-jar/

      - name: Install trailblaze from prebuilt artifact
        env:
          TRAILBLAZE_ARTIFACT_DIR: ${{ github.workspace }}/trailblaze-uber-jar
        run: ./scripts/install-trailblaze-from-artifact.sh

      - name: Install Playwright system dependencies
        # The PlaywrightDriverManager auto-installs the Chromium binary via
        # `playwright install chromium`, but it does not install OS-level libraries.
        # These packages cover the shared libs that Chromium requires on Ubuntu and
        # are not guaranteed to be present on the runner image.
        #
        # ffmpeg (with libwebp) is added here too: the docs report-gallery step exports
        # an animated-timeline WebP via `trailblaze report --webp`, which shells out to
        # `ffmpeg -c:v libwebp_anim`. The storyboard WebP uses bundled libwebp and does
        # not need ffmpeg, so a degraded runner still produces the storyboard + HTML.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2

      - name: Create and run Wikipedia trail
        id: run-trails
        continue-on-error: true
        run: ./.github/pr_run_wikipedia_trails.sh

      - name: Generate Trailblaze report
        if: always()
        continue-on-error: true
        run: ./.github/pr_generate_trailblaze_report.sh

      - name: Generate docs report-gallery assets
        # Storyboard + animated-timeline WebP + interactive HTML report, consumed by the
        # GitHub Pages build for the Report Gallery. continue-on-error so a flaky encoder
        # never reds the trail job; the docs fall back to the committed placeholder.
        if: always()
        continue-on-error: true
        run: ./.github/pr_generate_report_assets.sh

      - name: Create artifacts
        if: always()
        continue-on-error: true
        run: ./.github/pr_create_artifacts.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trailblaze-artifacts-wikipedia
          path: |
            trailblaze-logs.zip
            trailblaze_report.html

      - name: Upload docs report-gallery assets
        # Dedicated, predictably-named artifact the GitHub Pages workflow downloads from
        # the latest successful run on main. Kept separate from the debug bundle above so
        # the Pages fetch pulls only the three files the docs page embeds.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-report-wikipedia
          path: report-assets/
          if-no-files-found: warn

      - name: Fail if trails failed
        if: steps.run-trails.outcome == 'failure'
        run: |
          echo "Wikipedia trails failed - failing the workflow"
          exit 1
