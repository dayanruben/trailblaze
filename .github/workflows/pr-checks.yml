name: Checks

on:
  # Runs on PRs targeting the default branch
  pull_request:
    branches: [ "main" ]

  # Runs after merging to the default branch
  push:
    branches: [ "main" ]

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run Tests. Split into two parallel jobs so the slow
  # `:trailblaze-scripting-subprocess` test suite (~45min — spawns a `bun`/`tsx`
  # subprocess per test) doesn't gate the rest of the build behind a single
  # 60-minute timeout. Wall-clock time becomes max(jobs), not sum.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          check-latest: true

      - name: Setup Bun
        # bun is the sole supported JS runtime. `assemble check` triggers
        # `:trailblaze-scripting-subprocess:installTrailblazeScriptingSdk`
        # (a `bun install` that downstream JAR builds read) and the host
        # `CheckCommandTest` suite, which shells out to the bun-test phase.
        # Without bun on PATH both fail hard rather than skipping.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Test on Ubuntu (excluding scripting-subprocess)
        # `--parallel` lets independent modules compile and test concurrently
        # across the daemon's worker pool; combined with carving out the slow
        # subprocess suite into its own job this brings the wall-clock down
        # from 60+ minutes to roughly 10–15.
        run: >-
          ./gradlew --parallel assemble check
          -x :trailblaze-scripting-subprocess:test
          -x :trailblaze-scripting-subprocess:check

      - name: Verify Documentation is up-to-date
        run: ./scripts/generate-docs-and-diff.sh

  # Isolated job for the subprocess-spawning tests. Each test forks a
  # `bun`/`tsx` child process to exercise the MCP transport, so the suite
  # is i/o-bound and serializes inside a single JVM — running it in its own
  # CI job lets the faster `checks` job report status promptly even when
  # this one is still working through its subprocess fan-out.
  checks-scripting-subprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          check-latest: true

      - name: Setup Bun
        # The subprocess tests `bun install` and then spawn `bun`/`tsx` for each
        # MCP server fixture. The other Android jobs already set this up; the
        # checks job didn't need it before, but this isolated suite does.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Run scripting-subprocess tests
        run: ./gradlew :trailblaze-scripting-subprocess:check

  # Drives the trail through `connectedDebugAndroidTest` — the test logic runs on the
  # emulator inside the JUnit instrumentation process and talks to the headless desktop
  # server on the default HTTPS port (TrailblazeDevicePort.TRAILBLAZE_DEFAULT_HTTPS_PORT) for agent orchestration.
  android-tests-on-device:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # These CI checks replay recorded trails, so LLM inference is never invoked.
      # A non-empty sentinel value is required to satisfy the provider/client wiring
      # (e.g., `examples/build.gradle.kts` forwards this to `trailblaze.llm.auth.token.openai`
      # and the on-device client map is built from whichever tokens are present).
      OPENAI_API_KEY: no-key-set

    steps:
      - name: Enable KVM group perms
        if: runner.os == 'Linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Create and start emulator and run tests (Linux)
        if: runner.os == 'Linux'
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b
        id: run-tests-linux
        continue-on-error: true
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          profile: Nexus 6
          script: ./.github/pr_run_android_tests_on_device.sh

      - name: Verify logs were pulled
        if: always()
        run: ./.github/pr_verify_logs_were_pulled.sh

      - name: Generate Trailblaze report
        if: always()
        continue-on-error: true
        run: ./.github/pr_generate_trailblaze_report.sh

      - name: Create artifacts
        if: always()
        continue-on-error: true
        run: ./.github/pr_create_artifacts.sh

      - name: Upload artifacts
        if: always()  # Ensures this runs even if the previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: trailblaze-artifacts-on-device
          path: |
            trailblaze-logs.zip
            trailblaze_report.html
            logcat.log

      - name: Fail if tests failed
        if: steps.run-tests-linux.outcome == 'failure'
        run: |
          echo "Tests failed - failing the workflow"
          exit 1

  # Drives the trail from the host via the Trailblaze CLI (`./trailblaze trail …`).
  # Agent loop runs in-process on the host; tools dispatch over RPC to the bundled
  # on-device APK that the CLI auto-installs over ADB.
  android-tests-host-rpc:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Recordings-only — LLM is never invoked. See android-tests-on-device above.
      OPENAI_API_KEY: no-key-set

    steps:
      - name: Enable KVM group perms
        if: runner.os == 'Linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Create and start emulator and run tests (Linux)
        if: runner.os == 'Linux'
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b
        id: run-tests-linux
        continue-on-error: true
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          profile: Nexus 6
          script: ./.github/pr_run_android_tests_host_rpc.sh

      - name: Verify logs were pulled
        if: always()
        run: ./.github/pr_verify_logs_were_pulled.sh

      - name: Generate Trailblaze report
        if: always()
        continue-on-error: true
        run: ./.github/pr_generate_trailblaze_report.sh

      - name: Create artifacts
        if: always()
        continue-on-error: true
        run: ./.github/pr_create_artifacts.sh

      - name: Upload artifacts
        if: always()  # Ensures this runs even if the previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: trailblaze-artifacts-host-rpc
          path: |
            trailblaze-logs.zip
            trailblaze_report.html
            logcat.log

      - name: Fail if tests failed
        if: steps.run-tests-linux.outcome == 'failure'
        run: |
          echo "Tests failed - failing the workflow"
          exit 1
