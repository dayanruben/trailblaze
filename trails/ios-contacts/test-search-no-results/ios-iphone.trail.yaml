- config:
    title: 'Contacts (iOS): Search query that returns no results'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: Open Contacts and search for "ZzZzNoSuchContact". Verify "No Results" is visible. Do not tap any rows.
    recording:
      tools:
      - contacts_ios_searchContacts:
          query: ZzZzNoSuchContact
          openFirstResult: false
      - assertVisibleWithAccessibilityText:
          accessibilityText: "No Results"
