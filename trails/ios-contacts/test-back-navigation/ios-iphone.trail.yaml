- config:
    title: 'Contacts (iOS): Back from contact detail returns to list'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: Open the "John Appleseed" contact in Contacts.
    recording:
      tools:
      - contacts_ios_openApp:
          dismissKeyboard: true
      - tapOnElementBySelector:
          reason: '''John Appleseed'' is visible in the contacts list. Tapping on this contact will open the contact details, fulfilling the objective.'
          nodeSelector:
            iosMaestro:
              textRegex: John Appleseed
            index: 1
  - step: Tap the back-navigation control (the "<" button in the navbar). Verify the contacts list root is visible again — the "Contacts" navbar title should reappear at the top of the list.
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The navbar back button on a contact detail screen carries the accessibility label "Back". Tapping it pops back to the contacts list root. (The original recording flailed on Toolbar/Contacts selectors; "Back" is the label the live a11y tree actually exposes.)
          nodeSelector:
            iosMaestro:
              accessibilityTextRegex: Back
      - assertVisibleBySelector:
          reason: Verify the contacts list root rendered again by asserting the "Contacts" navbar title is visible at the top of the list.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
