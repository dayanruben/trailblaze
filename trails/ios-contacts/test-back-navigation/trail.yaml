config:
  target: contacts
  devices:
    ios-iphone: IOS_HOST
  tags:
  - nav
  title: 'Contacts (iOS): Back from contact detail returns to list'

trail:
  - step: "Open the \"John Appleseed\" contact in Contacts."
    recording:
      ios-iphone:
        - contacts_ios_openApp:
            dismissKeyboard: true
        - tapOnElementBySelector:
            reason: '''John Appleseed'' is visible in the contacts list. Tapping on this contact will open the contact details, fulfilling the objective.'
            nodeSelector:
              iosMaestro:
                textRegex: John Appleseed
              index: 1

  - step: "Tap the back-navigation control (the \"<\" button in the navbar). Verify the contacts list root is visible again — the \"Contacts\" navbar title should reappear at the top of the list."
    recording:
      ios-iphone:
        - tapOnElementBySelector:
            reason: Tap the navbar back button to pop back to the contacts list root. On the iOS 18.6 simulators CI uses, the detail-screen back control exposes the accessibility label "Back" (verified live), and there is no element with a "BackButton" resourceId — so match on the label. The post-tap assertion below targets the list-only "Add" button rather than the navbar title, since the detail screen's back button also carries the label "Contacts".
            nodeSelector:
              iosMaestro:
                accessibilityTextRegex: Back
        - assertVisibleBySelector:
            reason: Verify we returned to the contacts list root by asserting the list-only "Add" button (the "+" in the list navbar) is visible. The contact detail screen exposes an "Edit" button here instead of "Add", so this distinguishes the list root from the detail screen even if the back tap were to no-op. (Asserting the "Contacts" navbar title alone would not, because the detail screen's back button also carries the label "Contacts".)
            nodeSelector:
              iosMaestro:
                accessibilityTextRegex: Add
