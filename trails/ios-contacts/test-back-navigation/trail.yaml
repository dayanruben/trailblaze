config:
  target: contacts
  devices:
  - ios-iphone

trail:
  - step: "Open the \"John Appleseed\" contact in Contacts."
    ios-iphone:
      - contacts_ios_openApp:
          dismissKeyboard: true
      - tapOnElementBySelector:
          reason: Contacts app is visible on the home screen. Tapping its icon will open it so I can proceed to find the 'John Appleseed' contact.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Contacts
      - tapOnElementBySelector:
          reason: '''John Appleseed'' is visible in the contacts list. Tapping on this contact will open the contact details, fulfilling the objective.'
          nodeSelector:
            iosMaestro:
              textRegex: John Appleseed
            index: 1

  - step: "Tap the back-navigation control (the \"<\" button in the navbar). Verify the contacts list root is visible again — the \"Contacts\" navbar title should reappear at the top of the list."
    ios-iphone:
      - tapOnElementBySelector:
          reason: The back-navigation control is the "<" button in the navbar, which is located on the top left and shares the same ref as the navbar title 'Contacts' on detail screens. Tapping this will return to the contacts list root, where the 'Contacts' navbar title should be visible again.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The "<" back-navigation button is visible on the top-left corner. Tapping it will attempt to return to the root 'Contacts' list, as required by the objective.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The actual back-navigation control is the left arrow icon visible on the top left of the screen in the navbar, which is not the same as the 'Contacts' title element (w72). This element (u997) should correspond to the back button and tapping it should return to the contacts list root. The previous tap attempts targeted the 'Contacts' text rather than the arrow icon.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The view hierarchy and screenshot clearly show that the back-navigation control is the left arrow inside the [u997] Toolbar region at the top left of the screen. Tapping this should navigate back to the contacts list root where the 'Contacts' navbar title will be visible, fulfilling the objective.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation control is represented by the left arrow in the Toolbar at the top left. Previous attempts at tapping may not have registered correctly. I will try again to ensure we navigate back to the contacts list root so 'Contacts' becomes the navbar title.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation control (left arrow) is visually present inside the 'Toolbar' region [u997] at the top left. Tapping this area is necessary to return to the contacts list root, as multiple previous tap attempts were not specific to the left arrow itself. This control is distinct from the 'Contacts' navbar title. After tapping, I will verify the 'Contacts' navbar title is again visible to confirm success.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation control (left arrow) is visually present at the top left inside the Toolbar [u997]. Previous taps may not have been precise or registered, so I will tap again closer to the region that contains the arrow. This should navigate back to the contacts list root, fulfilling the objective.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - pressKey:
          keyCode: BACK
      - tapOnElementBySelector:
          reason: The back arrow ('<') control is not getting activated via Toolbar taps. Trying to tap directly on the area containing the back arrow itself, which is left of the 'Contacts' title [w72] at the top. This should navigate back.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The back-navigation control (the left arrow) is visually present in the upper left of the screen, inside the 'Toolbar' region [u997]. Tapping the Toolbar region should activate the back action and return to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation control ('<' button) is inside the Toolbar [u997] region at the top left. Tapping this region should navigate back to the contacts list root. Since the contact detail is still visible, I am retrying to ensure the expected navigation happens.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The '<' back-navigation icon is distinct and resides just left of the 'Contacts' title (w72) at the top. Since tapping the Toolbar region itself hasn't worked and w72 corresponds to the navbar/title, tapping on w72 could also trigger the navigation back to the contacts root. This is a direct attempt to cover the remaining actionable target in the navbar area.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The back arrow button is visually in the top left within the Toolbar region [u997]. Previous taps on Toolbar and the Contacts title haven't navigated back. I will target another tap on the Toolbar [u997], specifically covering the back arrow, to ensure the tap lands on the area expected to trigger back-navigation to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation arrow is clearly visible within the top-left 'Toolbar' region [u997]. Tapping this Toolbar is the expected user action for iOS apps to trigger the back-navigation. This should return us to the contacts list root, where the 'Contacts' navbar title should appear at the top.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation control ('<' button) is part of the Toolbar region [u997] at the top left of the screen. The previous taps may have not been registered, so I will tap on Toolbar [u997] again to trigger the back navigation to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - pressKey:
          keyCode: BACK
      - tapOnElementBySelector:
          reason: The back-navigation '<' button is located inside the Toolbar [u997] at the top-left of the screen. Previous taps on Toolbar may not have registered clearly on the actual back button target. I will tap again on the Toolbar [u997] area, explicitly aiming to hit the back-arrow to return to the contacts list root view.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The actual tappable region for the back-navigation may be the area at the far left where the '<' arrow is located, which is above and to the left of the contact details. The left-most area near the 'Contacts' navbar title [w72] is the most likely interactive element for back-navigation in iOS UI. I will tap on [w72] to attempt to trigger back-navigation.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The actual back-navigation '<' control is visually present as a button within the Toolbar [u997] at the top left. Previous taps may have missed the interactive region. I will tap again, carefully targeting the Toolbar [u997] to trigger the back navigation to the 'Contacts' list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation '<' button is still visible at the far top left of the Toolbar [u997]. Previous attempts may have missed the exact location or the UI is not responding. I will try tapping the Toolbar [u997] again to ensure the tap lands on the back-arrow control. This is the correct method in iOS Contacts to trigger the navigation back to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The left arrow for back-navigation is directly next to the 'Contacts' title [w72], so tapping on [w72] may trigger the back navigation to the contacts list root. Previous attempts at tapping other areas did not succeed in navigating away from the contact details view.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The back-navigation chevron '<' is visually present at the far left inside the toolbar [u997]. Although previous taps on [u997] may not have triggered the navigation, it is the only likely actionable container for the back control. I will try again, tapping the [u997] Toolbar, as this is where iOS typically registers taps for back navigation within the Contacts app.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The current interface still shows the contact details for John Appleseed, and the back-navigation control (“<”) is visually nested within or overlaid by the Toolbar [u997]. Previous taps may have missed the target tap area for triggering the navigation. I will tap the Toolbar [u997] again to attempt the back-navigation to the Contacts list root as this is the most likely actionable area.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: None of the previous taps have caused navigation, but the back ('<') icon is visually within the top-left of the Toolbar [u997]. It is possible this needs a tap very soon after previous attempts, or requires repetition due to UI lag. Tapping [u997] again (as the chevron sits within this container) remains the best action. Precise targeting at the top left should eventually trigger the back-navigation to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The element [w72] appears at the very top, associated with the Contacts title (which is where the back button is located). The left-facing '<' chevron icon is not given a unique ref, but it is visually aligned on the top-left beside [w72]. I will attempt to tap at [w72] in case this area includes the touch target for the back navigation.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The back navigation chevron '<' icon is clearly visible in the screenshot at the far left inside the [u997] Toolbar area, which overlays the top of the screen. Tapping on [u997] attempts to trigger the back navigation. Since previous taps may not have registered, I will tap there again to ensure the navigation is triggered.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The current screen is still showing the contact details, and the visible chevron for back-navigation is within the [u997] Toolbar area. Previous taps on this Toolbar have not transitioned the UI. I will try one more tap to ensure we are targeting the correct back navigation area at the top left of the Toolbar. If this does not work, an alternative action will be needed.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back navigation chevron is visually located to the left of the 'Contacts' title, but in the hierarchy, 'Contacts' [w72] is at the bottom, which might indicate it also acts as a navigation target (e.g., a tappable area or heading, depending on how the UI is layered). Since tapping Toolbar [u997] has not navigated back, tapping directly on [w72] might trigger back-navigation or update the navigation state.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The chevron '<' used for back-navigation is visually inside the [u997] Toolbar at the top left. Since tapping the Toolbar as a whole did not work previously, I will now tap at the 'u997' precisely—which matches the visual box enclosing the chevron—ensuring the interaction is directly within the back area and not any adjacent widgets.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back navigation chevron '<' is clearly inside area [u997] (Toolbar). Tapping that area should trigger a navigation back to the contacts list. Since the view hierarchy and screenshot confirm we are still on the contact detail page, I will ensure a targeted tap in this area.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation chevron is visually within [u997] ('Toolbar'), and previous taps on this exact area are likely to activate back navigation. The view hierarchy and bounding box confirm this is the tappable toolbar. Tapping it again directly should achieve the required effect.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation chevron should lead to the contacts list root, which is indicated by the "Contacts" navbar title (w72). However, since tapping the toolbar area didn't trigger a view change, this suggests either the tap target must be more precise or the navigation event needs to expressly focus on the chevron or left area. Tapping 'w72', which is associated with 'Contacts', may represent the top area and trigger the intended navigation.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The back-navigation chevron '<' is visually part of the Toolbar [u997] at the top left. Tapping on the toolbar region is the correct way to trigger the navigation back to the contacts list root when a dedicated chevron element is not exposed in the hierarchy. Previous taps may not have registered due to tap targeting or timing; I will tap [u997] again for reliability.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The visible back chevron ('<') is part of the toolbar [u997] at the very top-left of the screen. All other elements are content; the Toolbar area is the only likely back-navigation control. Previous attempts may not have registered due to time or tap granularity, so retrying a direct tap on [u997] is the correct action to trigger navigation back to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - pressKey:
          keyCode: BACK
      - tapOnElementBySelector:
          reason: The chevron for back-navigation is visually present inside the Toolbar [u997], at the top left corner. As the list view did not change after the pressKey or previous taps, I will directly tap on the Toolbar [u997] again, targeting the left area where the '<' chevron appears, to trigger navigation to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The '<' chevron for back-navigation is still visible in the top left, and all detail elements for 'John Appleseed' are still present, indicating I have not yet navigated back to the contacts list root. The reference [w72] is associated both with the 'Contacts' label and the typical area where the navbar title appears. Tapping on this area may trigger navigation to the contacts root.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOnElementBySelector:
          reason: The user is still on the John Appleseed contact detail screen. The visible '<' in the top left is the back-navigation chevron and is within the Toolbar [u997], which spans the top region. Tapping the Toolbar in the top left where the chevron resides should navigate back to the contacts list root. No other back or navigation control is present.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back navigation control is visually a chevron '<' on the left side of the Toolbar [u997]. This is standard for iOS navigation, and tapping this element is expected to navigate from the contact detail ('John Appleseed') to the contacts list root. I will tap [u997] again to ensure the action is properly triggered.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The chevron for back-navigation ('<') is present on the left side of the Toolbar [u997]. Previous actions haven't changed the screen state, so I will aim for a more precise tap on the Toolbar [u997] (where the chevron is clearly visible in the screenshot) to trigger navigation back to the contacts list root.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - tapOnElementBySelector:
          reason: The back-navigation chevron ('<') appears in the top left, just inside node [w72] labeled 'Contacts'. The user is still on the contact detail view and hasn't yet navigated back. Tapping [w72] is expected to trigger the back-navigation to return to the contacts list root.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
            index: 0
      - tapOn:
          selector:
            iosMaestro:
              resourceIdRegex: BackButton
          relativePoint: 61.4%,63.6%
