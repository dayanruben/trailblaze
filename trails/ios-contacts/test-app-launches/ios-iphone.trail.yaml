- config:
    title: 'Contacts (iOS): App launches to a contacts list'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: Launch the iOS Contacts app (com.apple.MobileAddressBook) with a clean state, and verify the contacts list root rendered — the "Contacts" navbar title should be visible.
    recording:
      tools:
      - contacts_ios_openApp:
          dismissKeyboard: true
      - assertVisibleBySelector:
          reason: Verify the contacts list root rendered by asserting the "Contacts" navbar title is visible. The contacts_ios_openApp trailhead already cold-starts Contacts and lands on the list root, so no home-screen icon tap is needed.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
