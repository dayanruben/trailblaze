- config:
    title: 'Contacts (iOS): Create a contact with first + last name'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: Open the iOS Contacts app and create a new contact with first name "Trailblaze" and last name "Demo". Save and verify the new contact appears in the list.
    recording:
      tools:
      - contacts_ios_openApp:
          dismissKeyboard: true
      - tapOnElementBySelector:
          reason: The Contacts app icon is visible on the home screen with ref 'z698'. Tapping it will open the Contacts app, which is required to begin creating a new contact.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Contacts
      - tapOnElementBySelector:
          reason: To create a new contact, I need to tap the 'Add' button (ref 'f430') which is typically used to start adding a new contact in the Contacts app.
          nodeSelector:
            iosMaestro:
              accessibilityTextRegex: Add
      - tapOnElementBySelector:
          reason: To begin entering the first name for the new contact, I need to tap on the 'First name' field, which is located at the top of the name section. This will focus the field for text input.
          nodeSelector:
            iosMaestro:
              textRegex: 0%
            below:
              iosMaestro:
                textRegex: Add photo
      - tapOnElementBySelector:
          reason: The current screen appears to be within the 'Text Tone' section of the Contacts app, possibly due to an errant tap. To return to creating a new contact, I should tap the 'Cancel' button (ref 'y504') at the top left.
          nodeSelector:
            iosMaestro:
              accessibilityTextRegex: Cancel
      - tapOnElementBySelector:
          reason: The editable fields for 'First name' and 'Last name' appear just above the 'Toolbar' node [p996], suggesting that tapping in that region will focus the 'First name' field to begin entering the contact's name.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - inputText:
          text: Trailblaze
          reasoning: The 'First name' field is visible and appears ready for input. I will enter 'Trailblaze' as the first name for the new contact.
      - tapOnElementBySelector:
          reason: To create a new contact, I need to tap the 'Add' button (ref 'f430') at the bottom right. This initiates the process to add a new contact in the iOS Contacts app.
          nodeSelector:
            iosMaestro:
              accessibilityTextRegex: Add
      - contacts_ios_createContact:
          firstName: Trailblaze
          lastName: Demo
      - tapOnElementBySelector:
          reason: I need to focus the 'First name' field at the top of the contact draft form to enter the first name 'Trailblaze.' Tapping just above the toolbar, near the field area, will place the cursor there.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - inputText:
          text: Trailblaze
          reasoning: The 'First name' field is currently visible and ready for input. I will enter 'Trailblaze' to complete the first name entry for the new contact.
      - tapOnElementBySelector:
          reason: To enter the last name for the contact, the next step should focus the 'Last name' field. The reference 'p996' appears to cover the area where both 'First name' and 'Last name' fields are present, but as 'First name' is already filled, a secondary tap may move focus to 'Last name'.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Toolbar
      - inputText:
          text: Demo
          reasoning: The 'Last name' field is visible right under the 'First name' field, which is filled with 'Trailblaze.' Now, I will enter 'Demo' as the last name.
      - tapOnElementBySelector:
          reason: Both first and last names have been entered. The next step is to tap the 'Done' button (ref u412) to save and create the contact.
          nodeSelector:
            iosMaestro:
              accessibilityTextRegex: Done
