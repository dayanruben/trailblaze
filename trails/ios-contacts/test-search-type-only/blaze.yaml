# Exercises the `openFirstResult: false` branch of `contacts_ios_searchContacts`.
# The tool stops after typing, leaving the search active so the agent can verify
# the inline suggestion list without committing to a tap.
- config:
    title: "Contacts (iOS): Search field active after typing, no result tapped"
    platform: ios
    driver: IOS_HOST
    target: contacts
    tags: [search]
- prompts:
    - step: |
        Call the `contacts_ios_searchContacts` tool with query="John",
        rowText="John Appleseed", openFirstResult=false.
    - step: Verify "John Appleseed" appears as a search suggestion row without opening it.
