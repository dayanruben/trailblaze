- config:
    title: 'Contacts (iOS): Contacts navbar visible on cold start'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: Launch the iOS Contacts app from a cold start. Verify the navbar shows "Contacts" and the list root surface is visible. Do not tap anything.
    recording:
      tools:
      - launchApp:
          appId: com.apple.MobileAddressBook
          launchMode: FORCE_RESTART
          reasoning: Launch Contacts from a cold start by its bundle identifier so the trail begins from the contacts list root regardless of prior state. Uses only framework primitives (no scripted tool) so this trail can join the pure-replay smoke set.
      - assertVisibleBySelector:
          reason: Verify the contacts list root rendered after the cold start by asserting the "Contacts" navbar title is visible. No row is tapped, matching the objective.
          nodeSelector:
            iosMaestro:
              textRegex: Contacts
