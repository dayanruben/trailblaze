- config:
    title: 'Contacts (iOS) (scripted): direct open by name'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: |
      Call the `contacts_ios_openApp` tool with dismissKeyboard=true.
    recording:
      tools:
      - contacts_ios_openApp:
          dismissKeyboard: true
  - step: |
      Call the `contacts_ios_openContact` tool with name="John Appleseed",
      expectedHeading="John Appleseed".
    recording:
      tools:
      - contacts_ios_openContact:
          name: John Appleseed
          expectedHeading: John Appleseed
