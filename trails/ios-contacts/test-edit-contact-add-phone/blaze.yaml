- config:
    title: "Contacts (iOS): Edit a contact to add a phone number"
    platform: ios
    driver: IOS_HOST
    target: contacts
    tags: [crud, slow]
- prompts:
    - step: |
        Call the `contacts_ios_deleteContact` tool with name="Trailblaze Demo"
        as a defensive teardown of any prior-run state.
    - step: |
        Call the `contacts_ios_createContact` tool with firstName="Trailblaze",
        lastName="Demo", phoneNumber="".
    - step: |
        Call the `contacts_ios_addPhoneNumber` tool with name="Trailblaze Demo",
        phoneNumber="5557654321".
    - step: |
        Call the `contacts_ios_verifyContactStructure` tool with
        name="Trailblaze Demo", requireFields=["phone"].
    - step: |
        Call the `contacts_ios_deleteContact` tool with name="Trailblaze Demo".
