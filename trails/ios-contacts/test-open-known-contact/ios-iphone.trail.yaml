- config:
    title: 'Contacts (iOS): Open a known contact by name'
    target: contacts
    platform: ios
    driver: IOS_HOST
- prompts:
  - step: Open the "John Appleseed" contact in Contacts and verify its detail screen renders the name "John Appleseed".
    recording:
      tools:
      - contacts_ios_openApp:
          dismissKeyboard: true
      - tapOnElementBySelector:
          reason: The Contacts app icon ('Contacts') is visible on the home screen. Tapping it will open the Contacts app, which is the necessary first step for accessing the 'John Appleseed' contact.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: Contacts
      - tapOnElementBySelector:
          reason: '''John Appleseed'' is visible in the contacts list. Tapping this entry will open its detail screen as required by the objective.'
          nodeSelector:
            iosMaestro:
              textRegex: John Appleseed
            index: 1
      - assertVisibleBySelector:
          reason: The node with ref 'f648' clearly displays the text 'John Appleseed' on the contact detail screen. Verifying this node confirms the contact detail screen rendered the correct name as required by the objective.
          nodeSelector:
            iosMaestro:
              accessibilityTextRegex: c
      - assertVisibleBySelector:
          reason: The node 'o725' displays the name 'John Appleseed' on the contact detail screen, confirming the detail screen for this contact is rendered as required by the objective.
          nodeSelector:
            iosMaestro:
              resourceIdRegex: ContactCardHeaderView
