config:
  id: clock/open-and-switch-to-timer
  description: Open the Clock app and navigate to the Timer tab.
  devices:
    android: ANDROID_ONDEVICE_INSTRUMENTATION

trail:
  - step: "Launch the AOSP Desk Clock app (com.android.deskclock) with a clean state."

  - step: "Tap the Timer tab."

  - step: "Verify the Timer tab is showing — the screen should display a numeric time entry control or an existing timer list, not the Alarm tab."
