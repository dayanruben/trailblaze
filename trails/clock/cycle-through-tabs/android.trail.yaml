# Cycle through all four Clock tabs in order. Exercises the custom
# `clock_android_launchApp` scripted tool (declared by the `clock` workspace pack)
# for setup, then drives the agent through tab navigation.
- config:
    id: "clock/cycle-through-tabs"
    driver: ANDROID_ONDEVICE_INSTRUMENTATION
    target: clock
    description: "Launch Clock via the custom scripted tool, then visit each tab."

- tools:
    - clock_android_launchApp: {}

- prompts:
    - step: Tap the Alarm tab.
    - step: Tap the Clock tab.
    - step: Tap the Timer tab.
    - step: Tap the Stopwatch tab.
    - step: Verify the Stopwatch tab is now selected (the screen should show a stopwatch readout starting at 00:00.0 with a Start button).
