# Minimal Clock-app smoke trail: launches the AOSP Clock and verifies all four
# bottom-nav tabs render. Used by `examples:connectedDebugAndroidTest`'s `ClockTest`
# on-device gate, where the host-side scripted-tool runtime isn't wired up — see
# `clock/set-alarm-730am/trail.yaml` for the host-rpc trail that exercises the
# `clock_android_launchApp` trailmap-defined scripted tool under the same
# accessibility driver.
config:
  id: clock/launch-smoke
  devices:
    android: ANDROID_ONDEVICE_ACCESSIBILITY

trail:
  - step: "Launch the Clock app"
    recording:
      android:
        - launchApp:
            appId: com.android.deskclock

  - verify: "All four bottom-nav tabs are visible"
    recording:
      android:
        - assertVisibleBySelector:
            reason: Clock app's bottom-nav surfaces the ALARM tab on every default launch.
            nodeSelector:
              androidAccessibility:
                resourceIdRegex: android:id/text1
                textRegex: ALARM
        - assertVisibleBySelector:
            reason: CLOCK tab anchor.
            nodeSelector:
              androidAccessibility:
                resourceIdRegex: android:id/text1
                textRegex: CLOCK
        - assertVisibleBySelector:
            reason: TIMER tab anchor.
            nodeSelector:
              androidAccessibility:
                resourceIdRegex: android:id/text1
                textRegex: TIMER
        - assertVisibleBySelector:
            reason: STOPWATCH tab anchor.
            nodeSelector:
              androidAccessibility:
                resourceIdRegex: android:id/text1
                textRegex: STOPWATCH
