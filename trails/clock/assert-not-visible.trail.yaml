# Accessibility assertion test: assertNotVisible by text. Verifies that elements NOT
# on screen are correctly reported as not visible. assertNotVisibleWithText constructs
# DriverNodeMatch.AndroidAccessibility internally from its text/id fields, so no
# nodeSelector field is needed.
config:
  id: clock/assert-not-visible
  devices:
    android: ANDROID_ONDEVICE_ACCESSIBILITY

trail:
  - step: "Launch the Clock app"
    recording:
      android:
        - launchApp:
            appId: com.android.deskclock

  - verify: "There is no \"Delete\" button visible on the alarm list screen"
    recording:
      android:
        - assertNotVisibleWithText:
            text: Delete

  - verify: "There is no \"Cancel\" button visible"
    recording:
      android:
        - assertNotVisibleWithText:
            text: Cancel

  - step: "Tap on the STOPWATCH tab"
    recording:
      android:
        - tapOnElementBySelector:
            reason: Navigate to STOPWATCH to change context for next assertion.
            nodeSelector:
              androidAccessibility:
                resourceIdRegex: android:id/text1
                textRegex: STOPWATCH

  - verify: "The ALARM tab content is no longer visible - no add alarm FAB"
    recording:
      android:
        - assertNotVisibleWithText:
            text: Add alarm
