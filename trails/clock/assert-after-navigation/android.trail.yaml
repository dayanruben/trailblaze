# Accessibility assertion test: tap then assert visible.
# Navigates between Clock app tabs using nodeSelector-based taps
# and asserts elements appear after each navigation.
- config:
    id: "clock/assert-after-navigation"
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
- prompts:
    - step: Launch the Clock app
      recording:
        tools:
          - launchApp:
              appId: com.android.deskclock
    - step: Tap on the TIMER tab
      recording:
        tools:
          - tapOnElementBySelector:
              reason: Navigate to the TIMER tab to test assertions after navigation.
              nodeSelector:
                androidAccessibility:
                  textRegex: TIMER
                  resourceIdRegex: "android:id/text1"
    - verify: The timer setup screen is showing
      recording:
        tools:
          - assertVisibleBySelector:
              reason: After tapping TIMER, the timer setup view should be visible.
              nodeSelector:
                androidAccessibility:
                  resourceIdRegex: "com.android.deskclock:id/timer_setup"
    - step: Tap on the ALARM tab
      recording:
        tools:
          - tapOnElementBySelector:
              reason: Navigate back to the ALARM tab.
              nodeSelector:
                androidAccessibility:
                  textRegex: ALARM
                  resourceIdRegex: "android:id/text1"
    - verify: The alarm screen is showing with the add alarm button
      recording:
        tools:
          - assertVisibleBySelector:
              reason: The FAB to add alarms should be visible after navigating back.
              nodeSelector:
                androidAccessibility:
                  contentDescriptionRegex: Add alarm
                  resourceIdRegex: "com.android.deskclock:id/fab"
                  isClickable: true
