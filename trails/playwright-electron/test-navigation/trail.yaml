config:
  devices:
    web: PLAYWRIGHT_ELECTRON
  title: Electron Navigation Test

trail:
  - step: "Verify the heading \"Trailblaze Test Fixture\" is visible"
    recording:
      web:
        - web_verifyElementVisible:
            ref: e1
            reasoning: To complete the objective, I need to verify that the heading 'Trailblaze Test Fixture' is visible. The element with ID e1 matches exactly this heading, so verifying its visibility confirms the objective.
            nodeSelector:
              web:
                ariaRole: heading
                ariaNameRegex: Trailblaze Test Fixture

  - step: "Click on the \"Form\" navigation link"
    recording:
      web:
        - web_click:
            ref: e4
            reasoning: The objective is to click on the 'Form' navigation link. The element [e4] corresponds to the 'Form' link and should be clicked to fulfill the task.
            nodeSelector:
              web:
                cssSelector: "#nav-form"

  - step: "Verify the heading \"Contact Form\" is visible"
    recording:
      web:
        - web_verifyElementVisible:
            ref: e8
            reasoning: The objective is to verify that the heading 'Contact Form' is visible. The view hierarchy confirms there is a heading element matching that label (e8), so verifying its visibility will accomplish the task.
            nodeSelector:
              web:
                ariaRole: heading
                ariaNameRegex: Contact Form

  - step: "Click on the \"Counter\" navigation link"
    recording:
      web:
        - web_click:
            ref: e5
            reasoning: The objective is to click on the 'Counter' navigation link. The view hierarchy shows a link with the label 'Counter' identified as e5. Clicking this will fulfill the objective.
            nodeSelector:
              web:
                cssSelector: "#nav-counter"

  - step: "Verify the heading \"Counter\" is visible"
    recording:
      web:
        - web_verifyElementVisible:
            ref: e8
            reasoning: The objective requires verifying that the heading 'Counter' is visible. This element is present as [e8] and should be confirmed visible to satisfy the objective.
            nodeSelector:
              web:
                ariaRole: heading
                ariaNameRegex: Counter

  - step: "Click on the \"About\" navigation link"
    recording:
      web:
        - web_click:
            ref: e6
            reasoning: The current objective is to click on the "About" navigation link. The element with ID e6 corresponds to this link, so clicking it fulfills the requirement.
            nodeSelector:
              web:
                cssSelector: "#nav-about"

  - step: "Verify the text \"Trailblaze is an AI-powered UI testing framework\" is visible"
    recording:
      web:
        - web_verifyTextVisible:
            text: Trailblaze is an AI-powered UI testing framework
            reasoning: The objective requires verifying the visibility of the text 'Trailblaze is an AI-powered UI testing framework'. This verification will check if that exact text is currently displayed on the screen.

  - step: "Navigate back to the previous page state by clicking the \"Home\" navigation link"
    recording:
      web:
        - web_click:
            ref: e3
            reasoning: The objective is to navigate back to the previous page state by clicking the 'Home' navigation link. The element for the 'Home' link is present (e3), so I will click it to accomplish the objective.
            nodeSelector:
              web:
                cssSelector: "#nav-home"

  - step: "Verify the heading \"Welcome\" is visible"
    recording:
      web:
        - web_verifyElementVisible:
            ref: e8
            reasoning: The current objective requires verifying that the heading 'Welcome' is visible. The view hierarchy clearly lists [e8] as heading 'Welcome', so I will verify its visibility directly to fulfill the objective.
            nodeSelector:
              web:
                ariaRole: heading
                ariaNameRegex: Welcome
