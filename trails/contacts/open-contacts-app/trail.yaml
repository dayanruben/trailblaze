config:
  id: contacts/open-contacts-app
  description: Open the Contacts app and verify the main screen is visible.
  devices:
    android-phone: ANDROID_ONDEVICE_INSTRUMENTATION
    android: ANDROID_ONDEVICE_INSTRUMENTATION

trail:
  - step: "Launch the Google Contacts app (com.google.android.contacts) with a clean state."

  - step: "If a sign-in / account-setup interstitial appears (e.g. a \"Sign in\" or \"Skip\" button), dismiss it by tapping \"Skip\" so the main contacts screen loads. If the main contacts screen is already visible, do nothing."

  - step: "Verify the main contacts screen is visible. The screen should show either an empty state (\"No contacts\" / \"Add a contact\") or a list of contacts. Do not tap anything else."
