config:
  title: 'Test: Ambiguous element disambiguation'

trail:
  - step: "Type \"Profile name\" into the profile text field"
    recording:
      desktop:
        - compose_type:
            text: Profile name
            testTag: profile_field

  - step: "Click the profile save button"
    recording:
      desktop:
        - compose_click:
            testTag: profile_save_button

  - step: "Verify the text \"Profile saved!\" is visible"
    recording:
      desktop:
        - compose_verify_text_visible:
            text: Profile saved!

  - step: "Type \"Settings value\" into the settings text field"
    recording:
      desktop:
        - compose_type:
            text: Settings value
            testTag: settings_field

  - step: "Click the settings save button"
    recording:
      desktop:
        - compose_click:
            testTag: settings_save_button

  - step: "Verify the text \"Settings saved!\" is visible"
    recording:
      desktop:
        - compose_verify_text_visible:
            text: Settings saved!
