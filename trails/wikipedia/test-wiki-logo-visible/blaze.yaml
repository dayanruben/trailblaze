- config:
    title: "Wikipedia: Globe logo / wordmark visible on every page"
    platform: web
    driver: PLAYWRIGHT_NATIVE
- prompts:
    - step: Navigate to https://en.wikipedia.org/wiki/Main_Page
    - step: Verify the Wikipedia wordmark text "Wikipedia" is visible in the top-left area of the page (the site name shown next to the puzzle-globe logo).
    - step: Verify the tagline text "The Free Encyclopedia" is visible near the wordmark.
