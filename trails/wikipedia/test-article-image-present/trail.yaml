config:
  target: wikipedia
  devices:
    web: PLAYWRIGHT_NATIVE
  title: 'Wikipedia: Article contains at least one image'

trail:
  - step: Navigate to https://en.wikipedia.org/wiki/Mount_Everest
  - step: Verify the heading "Mount Everest" is visible.
  - step: Verify that at least one image element is visible in the article body (Wikipedia articles about geographic features always include thumbnails in the infobox).
