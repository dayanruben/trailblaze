- config:
    title: 'Wikipedia: Open the William Shakespeare article'
    target: wikipedia
    platform: web
    driver: PLAYWRIGHT_NATIVE
- prompts:
  - step: Open the Wikipedia article for "William Shakespeare" and verify the article's first heading is "William Shakespeare".
    recording:
      tools:
      - web_navigate:
          url: https://en.wikipedia.org/wiki/William_Shakespeare
          reasoning: The screen is currently blank with no interactive elements, so I will directly navigate to the Wikipedia article for William Shakespeare to begin the task.
      - web_verify_value:
          expected: William Shakespeare
          reasoning: The first heading identified in the main content area is attached to element [e48]. I will verify that its text matches 'William Shakespeare' as required by the objective.
          nodeSelector:
            web:
              ariaRole: heading
              ariaNameRegex: William Shakespeare
