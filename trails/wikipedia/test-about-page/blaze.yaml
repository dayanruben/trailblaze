- config:
    title: "Wikipedia: About page opens and shows the project description"
    platform: web
    driver: PLAYWRIGHT_NATIVE
- prompts:
    - step: Navigate to https://en.wikipedia.org/wiki/Wikipedia:About
    - step: Verify the heading "Wikipedia:About" or "About Wikipedia" is visible at the top of the page.
    - step: Verify that body text containing the phrase "free encyclopedia" or "anyone can edit" is visible.
