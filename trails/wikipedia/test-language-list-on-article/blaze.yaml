- config:
    title: "Wikipedia: Article exposes a list of available languages"
    platform: web
    driver: PLAYWRIGHT_NATIVE
- prompts:
    - step: Navigate to https://en.wikipedia.org/wiki/Albert_Einstein
    - step: |
        Locate and (if needed) open the article's language menu. On Vector-2022
        this is the button labeled with a count followed by "languages" near the
        top of the page; on smaller viewports it may already be expanded as a list
        in the sidebar.
    - step: Verify that the language list contains the entry "Español".
    - step: Verify that the language list contains the entry "Deutsch".
