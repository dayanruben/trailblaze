# Demonstrates `wikipedia_web_openMainPageSection`. One scripted tool covers all
# four main-page section verifications by branching on the `section` arg.
config:
  id: 'wikipedia/test-custom-main-page-section'
  target: wikipedia
  devices:
    web: PLAYWRIGHT_NATIVE
  title: 'Wikipedia (scripted): verify all four main-page sections via one tool'

trail:
  - step: Call the `wikipedia_web_openMainPage` tool with dismissBanner=true.
  - step: Call the `wikipedia_web_openMainPageSection` tool with section="tfa", ensureOnMainPage=false.
  - step: Call the `wikipedia_web_openMainPageSection` tool with section="itn", ensureOnMainPage=false.
  - step: Call the `wikipedia_web_openMainPageSection` tool with section="dyk", ensureOnMainPage=false.
  - step: Call the `wikipedia_web_openMainPageSection` tool with section="otd", ensureOnMainPage=false.
