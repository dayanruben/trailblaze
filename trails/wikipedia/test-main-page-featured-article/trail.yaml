config:
  target: wikipedia
  devices:
    web: PLAYWRIGHT_NATIVE
  tags:
  - smoke
  - main-page
  title: 'Wikipedia: Today''s featured article section visible on main page'

trail:
  - step: "Navigate to https://en.wikipedia.org/wiki/Main_Page"
    recording:
      web:
        - web_navigate:
            url: https://en.wikipedia.org/wiki/Main_Page
            reasoning: The objective is to navigate to the English Wikipedia Main Page. Since there are no interactive elements on the current screen, direct navigation to the specified URL is required.

  - step: "Verify the \"Today's featured article\" section is visible on the page."
    recording:
      web:
        - web_verifyElementVisible:
            reasoning: The section titled "From today's featured article" is represented by the heading element [e40]. Verifying its visibility will confirm that the "Today's featured article" section is present on the page.
            nodeSelector:
              web:
                cssSelector: "#mp-tfa-h2"
