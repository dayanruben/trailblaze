config:
  target: wikipedia
  devices:
    web: PLAYWRIGHT_NATIVE
  tags:
  - smoke
  - main-page
  title: 'Wikipedia: In the news section visible on main page'

trail:
  - step: "Navigate to https://en.wikipedia.org/wiki/Main_Page"
    recording:
      web:
        - web_navigate:
            url: https://en.wikipedia.org/wiki/Main_Page
            reasoning: The objective is to navigate to the Wikipedia main page, so I will use the browser navigation tool to go directly to the specified URL.

  - step: "Verify the \"In the news\" section is visible on the page."
    recording:
      web:
        - web_verifyElementVisible:
            reasoning: The 'In the news' section is represented by the heading element with ID e89 in the main content area. Verifying the visibility of this heading will confirm that the 'In the news' section is currently visible on the Wikipedia Main Page.
            nodeSelector:
              web:
                cssSelector: "#mp-itn-h2"
