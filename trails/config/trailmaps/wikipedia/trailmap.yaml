# Demo trailmap for the Wikipedia (en) target. Loaded as a workspace trailmap from the opensource
# repo's `trails/config/trailblaze.yaml` — not bundled into the Trailblaze JAR. Binary-only
# adopters running outside this repo do not see this target unless they declare a workspace
# trailmap with the same id.
#
# LEARNING TO AUTHOR? This is the repo's own demo target — it backs the Wikipedia web trails
# under `trails/wikipedia/` and carries only the Android launch tool here, authored in the
# current best-practice shape: a typed `trailblaze.tool(...)` declaration in a bare `.ts` file
# (no `.yaml` manifest — the framework auto-discovers the export and reads its description from
# the JSDoc). For a fuller, standalone, copy-me workspace — many typed tools plus tool unit
# tests — see `examples/wikipedia/` (the canonical web reference).
#
# Per-platform `tool_sets:` and web `drivers:` are inherited from the bundled `trailblaze`
# framework trailmap via `dependencies: [trailblaze]`. Platforms that only need defaults are
# declared as empty maps (`{}`) — the explicit signal "this platform exists, fill in
# everything from defaults."
id: wikipedia
dependencies:
  - trailblaze
target:
  display_name: Wikipedia (en)
  tools:
    - wikipedia_android_launchApp
  platforms:
    android:
      app_ids:
        - org.wikipedia
    ios: {}
    web: {}
    compose: {}
