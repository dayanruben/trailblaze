# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./wikipedia_web_openRandomArticle.ts
name: wikipedia_web_openRandomArticle
description: |
  Open a random Wikipedia article via the sidebar's "Random article" link.
  Use this whenever the task is to navigate to a random article, click
  Random article, jump to a random page, or surf to an unpredictable
  article. Verifies that a new article page rendered (its #firstHeading
  is visible) — the resulting title is non-deterministic so don't try to
  assert specific heading text afterwards.
supportedPlatforms:
  - web
inputSchema:
  ensureOnWikipedia:
    type: boolean
    description: "Open the main page first if not on Wikipedia."
    required: false
