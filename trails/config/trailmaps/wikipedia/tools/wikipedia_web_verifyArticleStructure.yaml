# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./wikipedia_web_verifyArticleStructure.ts
name: wikipedia_web_verifyArticleStructure
description: |
  Verify the currently loaded page is a well-formed Wikipedia article. Use
  this whenever the task is to verify an article's structure or layout —
  confirm a Wikipedia article rendered, check that an article has body
  content, confirm it has a References section, or sanity-check that
  navigation actually landed on an article (not a search-results or
  disambiguation page). Asserts #firstHeading is visible, the body wrapper
  is visible, and optionally scrolls to confirm the "References" section
  is present.
supportedPlatforms:
  - web
inputSchema:
  expectedHeading:
    type: string
    description: "Visible text to assert in #firstHeading."
    required: false
  requireReferences:
    type: boolean
    description: "Scroll-to-bottom + assert References heading (default true)."
    required: false
