# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./wikipedia_web_searchAndOpenFirstResult.ts
name: wikipedia_web_searchAndOpenFirstResult
description: |
  Search Wikipedia from the header search box. Use this whenever the task
  is to search Wikipedia for something — e.g. "search for Albert Einstein",
  "look up Python on Wikipedia", "find articles about Mount Everest". Types
  the query into the header search input, submits the form, and verifies
  the resulting article's first heading. Pass `openFirstResult=false` to
  only type the query without submitting (useful for autocomplete-suggestion
  tests).
supportedPlatforms:
  - web
inputSchema:
  query:
    type: string
    description: "Query to type into the search box."
    required: false
  expectedHeading:
    type: string
    description: "Heading text to assert on the opened article. Defaults to `query`."
    required: false
  openFirstResult:
    type: boolean
    description: "Submit the search form (default true)."
    required: false
