# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./wikipedia_web_openMainPage.ts
name: wikipedia_web_openMainPage
description: |
  Open Wikipedia's Main_Page. Use this when the task asks to navigate to
  Wikipedia, open Wikipedia, go to the Wikipedia home page, or start from
  the main Wikipedia page. Loads en.wikipedia.org/wiki/Main_Page and waits
  for it to render. Optionally dismisses any fundraising banner that's
  currently showing so subsequent steps don't have to reason about it.
supportedPlatforms:
  - web
inputSchema:
  dismissBanner:
    type: boolean
    description: "When true (default), tries to close any visible fundraising banner."
    required: false
