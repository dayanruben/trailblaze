# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./contacts_ios_verifyContactStructure.ts
name: contacts_ios_verifyContactStructure
description: |
  Verify the currently-open iOS contact detail screen conforms to an expected
  shape — name heading visible, plus an optional list of required field
  labels ("phone", "email", "home", etc.). Use this whenever the task is to
  confirm a contact rendered correctly, check a contact has certain fields,
  or assert a contact's shape. Pass an empty `requireFields` list for a
  lightweight "did the detail screen render?" check.
supportedPlatforms:
  - ios
inputSchema:
  name:
    type: string
    description: "Contact name to assert in the navbar / heading."
    required: false
  requireFields:
    type: array
    description: "Optional list of additional field labels the contact must surface — common values: \"phone\", \"mobile\", \"email\", \"home\", \"work\". Each entry is passed to `assertVisibleWithAccessibilityText` as the `textRegex` value, so it's interpreted as a regex against accessibility text (case-sensitive by default — wrap with `(?i)` for case-insensitive). Empty list (the default) skips the field-presence assertions."
    required: false
