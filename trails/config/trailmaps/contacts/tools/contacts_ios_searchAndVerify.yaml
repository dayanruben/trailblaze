# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./contacts_ios_searchAndVerify.ts
name: contacts_ios_searchAndVerify
description: |
  Search Contacts for a name AND verify the resulting contact's detail screen
  is well-formed in a single tool call. Use this whenever the task combines
  "search for X" with "verify the contact has Y", e.g. "search for Albert
  Einstein and confirm the contact has a phone number". Composes the
  existing `contacts_ios_searchContacts` and
  `contacts_ios_verifyContactStructure` tools so callers get both behaviors
  with one round-trip.
supportedPlatforms:
  - ios
inputSchema:
  query:
    type: string
    description: "Name to search for."
    required: false
  expectedName:
    type: string
    description: "Visible name expected on the opened contact's detail screen. Defaults to `query`; pass explicitly when the query is a prefix and the destination row carries a fuller name."
    required: false
  requireFields:
    type: array
    description: "Optional list of field labels the contact must surface. Forwarded to `contacts_ios_verifyContactStructure`. Empty list skips field assertions."
    required: false
