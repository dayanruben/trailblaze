# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./contacts_ios_deleteContact.ts
name: contacts_ios_deleteContact
description: |
  Delete a contact from the iOS Contacts app, by name. Use this whenever the
  task is to delete a contact, remove a person from Contacts, or clean up a
  contact created by a previous step. Idempotent — if the contact doesn't
  exist the tool returns successfully without doing anything, so it's safe to
  use as a teardown step. Confirms the action-sheet "Delete Contact" prompt
  automatically.
supportedPlatforms:
  - ios
inputSchema:
  name:
    type: string
    description: "Visible name of the contact to delete."
    required: false
