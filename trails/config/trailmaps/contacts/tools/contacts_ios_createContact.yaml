# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./contacts_ios_createContact.ts
name: contacts_ios_createContact
description: |
  Create a brand-new contact in the iOS Contacts app. Use this whenever the
  task is to add a contact, create a contact, save a new person, or otherwise
  populate the contacts list with someone new. Opens the new-contact draft,
  types first + last name (and optionally a phone number), and saves. Verifies
  the save round-trip completed by asserting the contact's full name is
  visible on the post-save detail screen iOS navigates to.
supportedPlatforms:
  - ios
inputSchema:
  firstName:
    type: string
    description: "First name to type."
    required: false
  lastName:
    type: string
    description: "Last name to type."
    required: false
  phoneNumber:
    type: string
    description: "Phone number to type. Formatting (spaces, dashes, parens) is preserved verbatim — iOS does its own visual reformat after Save."
    required: false
