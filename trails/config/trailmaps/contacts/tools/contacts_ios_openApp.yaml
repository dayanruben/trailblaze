# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./contacts_ios_openApp.ts
name: contacts_ios_openApp
description: |
  Open the iOS Contacts app from a cold start. Use this when the task is to
  launch Contacts, open the Contacts app, go to Contacts, or otherwise begin
  a Contacts flow. Force-restarts the app so a stale draft or in-progress
  search from a prior run doesn't leak in. Verifies the contacts list root
  rendered ("Contacts" navbar title visible). Optionally dismisses any leftover
  keyboard so the next step sees the full list.
supportedPlatforms:
  - ios
inputSchema:
  dismissKeyboard:
    type: boolean
    description: "When true (default), tries to dismiss any keyboard left over from a prior run by tapping the search/cancel chip. Safe to set false if you know the app launches into a clean state."
    required: false
