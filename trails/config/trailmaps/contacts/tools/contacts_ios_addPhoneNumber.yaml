# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./contacts_ios_addPhoneNumber.ts
name: contacts_ios_addPhoneNumber
description: |
  Add a new phone number to an existing iOS contact. Use this whenever the
  task is to add a phone, attach a number to a contact, edit a contact to
  include a phone, or update a contact with a new number. Opens the contact,
  enters edit mode, taps "add phone", types the number, and saves. Verifies
  the contact's detail screen renders after the save round-trip.
supportedPlatforms:
  - ios
inputSchema:
  name:
    type: string
    description: "Contact whose detail screen we edit."
    required: false
  phoneNumber:
    type: string
    description: "Phone number to type. Formatting preserved verbatim."
    required: false
