# Complete scripted-tool descriptor (name + description + inputSchema) so the
# trailmap resolves on runtimes without the bun analyzer (e.g. on-device).
# The `.ts` sibling remains the implementation; this descriptor mirrors its
# `trailblaze.tool<...>()` declaration. Keep in sync when the `.ts` changes.
script: ./contacts_ios_openContact.ts
name: contacts_ios_openContact
description: |
  Open a specific contact by name from the iOS Contacts list. Use this whenever
  the task is to open a contact, view a contact, navigate to someone's
  contact card, or look up a particular person — e.g. "open the John Appleseed
  contact", "go to Albert Einstein's contact card". Verifies the contact's
  detail screen rendered by asserting the contact name is visible in the
  navbar. If the contact doesn't exist the underlying search throws — callers
  who want a "create if missing" pattern should wrap this with a `tryOrFalse`.
supportedPlatforms:
  - ios
inputSchema:
  name:
    type: string
    description: "Visible name of the contact to open (e.g. \"Albert Einstein\")."
    required: false
  expectedHeading:
    type: string
    description: "Visible text to assert on the contact detail screen after opening. Defaults to `name`, which works for the common case where the contact's display name is what shows in the navbar."
    required: false
