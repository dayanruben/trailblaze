id: "clock/android/clock_tab"
description: >
  Google Clock app, Clock tab is selected at the bottom nav, showing the
  cities list (RecyclerView). Distinct from clock/android/alarm_tab (no add-alarm FAB).

  Resource IDs use the `{{target.appId}}` template variable. In-session it expands
  to the single resolved app id (the Google variant `com.google.android.deskclock`
  or the AOSP variant `com.android.deskclock`, whichever is installed); at
  log-replay time it falls back to an alternation over both app_ids declared in
  the clock target.
android:
  required:
    - description: "CLOCK tab in selected state"
      selector:
        androidAccessibility:
          resourceIdRegex: "{{target.appId}}:id/tab_menu_clock"
          isSelected: true
    - description: "Cities RecyclerView"
      selector:
        androidAccessibility:
          resourceIdRegex: "{{target.appId}}:id/cities"
  forbidden:
    - description: "Time picker OK button (would mean a dialog is open over the tab)"
      selector:
        androidAccessibility:
          resourceIdRegex: "{{target.appId}}:id/material_timepicker_ok_button"
