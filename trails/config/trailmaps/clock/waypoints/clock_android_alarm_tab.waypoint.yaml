id: "clock/android/alarm_tab"
description: >
  AOSP Desk Clock app, Alarm tab is selected at the bottom nav, and the Add-alarm
  FAB is visible. Distinct from clock/android/alarm_time_picker (no clock face / OK
  button) and from the other bottom-nav tabs (FAB only appears on the alarm tab).

  Resource IDs use the `{{target.appId}}` template variable. In-session and at
  log-replay time it expands to the clock target's single app id
  `com.android.deskclock` (the AOSP Desk Clock).
android:
  required:
    - description: "ALARM tab in selected state"
      selector:
        androidAccessibility:
          resourceIdRegex: "{{target.appId}}:id/tab_menu_alarm"
          isSelected: true
    - description: "Add-alarm FAB"
      selector:
        androidAccessibility:
          resourceIdRegex: "{{target.appId}}:id/fab"
  forbidden:
    - description: "Time picker OK button (would mean the time picker dialog is open over the tab)"
      selector:
        androidAccessibility:
          resourceIdRegex: "{{target.appId}}:id/material_timepicker_ok_button"
