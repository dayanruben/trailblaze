# Demo trailmap for the Google Clock target. Loaded as a workspace trailmap from the opensource
# repo's `trails/config/trailblaze.yaml` — not bundled into the Trailblaze JAR. Binary-only
# adopters running outside this repo do not see this target unless they declare a workspace
# trailmap with the same id.
#
# Per-platform `tool_sets:` and web `drivers:` are inherited from the bundled `trailblaze`
# framework trailmap via `dependencies: [trailblaze]`. Platforms that only need defaults are
# declared as empty maps (`{}`) — the explicit signal "this platform exists, fill in
# everything from defaults."
id: clock
dependencies:
  - trailblaze
target:
  display_name: Google Clock
  platforms:
    android:
      app_ids:
        - com.google.android.deskclock
        - com.android.deskclock
      # Scripted tools declared under their platform (rather than at `target.tools:`) so the
      # platform↔tool association is explicit in the YAML; the trailmap loader hoists them
      # into the delivered top-level tool list at load time.
      tools:
        - clock_android_launchApp
        - clock_clearAlarms
    ios: {}
    web: {}
    compose: {}
# Waypoint YAMLs are auto-discovered from `waypoints/**.waypoint.yaml` (any depth).
