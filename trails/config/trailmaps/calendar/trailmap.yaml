id: calendar
dependencies:
  - trailblaze
target:
  display_name: Google Calendar
  platforms:
    android:
      app_ids:
        - com.google.android.calendar
      # Scripted tool declared under its platform (rather than at `target.tools:`) so the
      # platform↔tool association is explicit in the YAML; the trailmap loader hoists it
      # into the delivered top-level tool list at load time.
      tools:
        - calendar_android_launchApp
        - calendar_android_launch
    ios: {}
    web: {}
    compose: {}
# Waypoint YAMLs are auto-discovered from `waypoints/**.waypoint.yaml` (any depth).
