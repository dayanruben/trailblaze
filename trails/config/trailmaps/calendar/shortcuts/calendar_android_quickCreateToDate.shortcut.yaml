id: calendar_android_quickCreateToDate
description: Tap the start-date row in the quick-create sheet to open the date picker dialog.
shortcut:
  from: calendar/android/quick_create_collapsed
  to: calendar/android/event_date_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          contentDescriptionRegex: "^Start date: .*$"
