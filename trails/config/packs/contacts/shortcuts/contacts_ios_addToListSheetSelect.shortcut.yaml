shortcut:
  from: contacts/ios/add-contacts-to-list-sheet
  to: contacts/ios/add-contacts-to-list-with-selection
parameters: []
tools:
  - tapOnElementBySelector:
      nodeSelector:
        iosMaestro:
          resourceIdRegex: "^circle$"
