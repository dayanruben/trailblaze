id: "contacts/ios/emergency-phone-picker-mobile-only"
description: >
  iOS Contacts app, Emergency Contact phone picker for a contact with only a single
  phone label (e.g. just mobile). Sibling to the multi-phone variant. Available actions
  differ because there's only one tappable row.
required:
  - description: "mobile row"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^mobile$"
forbidden:
  - description: "main row — would mean multiple phones available"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^main$"
  - description: "work label rendered as phone — would mean multiple phones"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^work$"
  - description: "Lists header — would mean we're on Add to List picker"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^Lists$"
