id: "contacts/ios/visual-identity-emoji-emoji-tab"
description: >
  iOS Contacts app, emoji editor with the Emoji tab active ‚Äî exposes the emoji-pick
  affordance (search field + categorized grid). Sibling to
  contacts/ios/visual-identity-emoji-color-tab.
required:
  - description: "Emoji editor tab"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^Emoji$"
        resourceIdRegex: "^VisualIdentityEditorContainerVStack$"
  - description: "Visual identity Choose button"
    selector:
      iosMaestro:
        resourceIdRegex: "^VisualIdentityChooseButton$"
  - description: "Emoji glyph suggestion row"
    selector:
      iosMaestro:
        resourceIdRegex: "^SuggestionListItemButton$"
forbidden:
  - description: "Text tab ‚Äî would mean we're on the monogram editor"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^Text$"
        resourceIdRegex: "^VisualIdentityEditorContainerVStack$"
