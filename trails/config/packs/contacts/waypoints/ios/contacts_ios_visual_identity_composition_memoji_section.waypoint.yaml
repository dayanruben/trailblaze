id: "contacts/ios/visual-identity-composition-memoji-section"
description: >
  iOS Contacts app, visual identity composition picker with the Memoji section's New
  Memoji affordance prominent — sibling waypoint of the Photos / Monogram variants.
required:
  - description: "Visual identity Done button"
    selector:
      iosMaestro:
        resourceIdRegex: "^VisualIdentityDoneButton$"
  - description: "Memoji StickyHeader"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^Memoji$"
        resourceIdRegex: "^StickyHeaderContent$"
  - description: "New Memoji create-suggestion button"
    selector:
      iosMaestro:
        accessibilityTextRegex: "^New Memoji$"
        resourceIdRegex: "^CreateSuggestionButton$"
forbidden:
  - description: "Choose button — only on the editor, not composition"
    selector:
      iosMaestro:
        resourceIdRegex: "^VisualIdentityChooseButton$"
