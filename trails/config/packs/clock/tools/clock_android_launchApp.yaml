# Per-file in-process scripted tool descriptor for `clock_android_launchApp`.
#
# This descriptor declares a tool whose body lives in `script:` below. The pack loader
# translates it into an `InlineScriptToolConfig` and the framework registers the tool
# under the workspace `clock` pack — see `target.tools:` in `../../packs/clock/pack.yaml`.
#
# `script:` resolves against the JVM's current working directory (i.e. the directory
# `trailblaze` was invoked from). Run trail commands from this repo's root so the
# relative path below resolves cleanly. The `.ts` lives next to this descriptor under
# the owning pack — the convention library/target packs adopted in #2783.
script: ./trails/config/packs/clock/tools/clock_android_launchApp.ts
name: clock_android_launchApp
description: |
  Force-stops the Google Clock app and re-launches it via the package's default
  launcher activity, so the next step starts from a clean app state. Equivalent to a
  Maestro `launchApp({ launchMode: FORCE_RESTART })` against `com.google.android.deskclock`,
  but composed entirely from the dual-mode `adbShell` primitive so the same tool
  works on host- and on-device-dispatched scripted-tool sessions.

  Use this as the first step of any clock trail that wants a fresh launch state. No
  arguments — the framework resolves the app id from the `clock` pack manifest's
  `app_ids:` list against installed apps on the connected device.
supportedPlatforms:
  - android
