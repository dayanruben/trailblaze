id: "calendar/android/recurring_delete_dialog"
description: "'Delete recurring event' confirmation — three-radio dialog (This event / This and following events / All events) plus Cancel/Delete buttons. Distinct from delete_event_dialog (single-occurrence)."
required:
  - description: "Dialog title"
    selector:
      androidAccessibility:
        textRegex: "^Delete recurring event$"
  - description: "'This event' radio option"
    selector:
      androidAccessibility:
        textRegex: "^This event$"
  - description: "'This and following events' radio option"
    selector:
      androidAccessibility:
        textRegex: "^This and following events$"
  - description: "'All events' radio option"
    selector:
      androidAccessibility:
        textRegex: "^All events$"
  - description: "Picker dialog list"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/select_dialog_listview$"
forbidden:
  - description: "Single-occurrence delete dialog has 'Delete this event?' prompt"
    selector:
      androidAccessibility:
        textRegex: "^Delete this event\\?$"
