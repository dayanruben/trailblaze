id: "calendar/android/help_feedback"
description: "Google help (gms) screen embedded in Calendar — Help & feedback. Different package (com.google.android.gms) but reachable from the drawer."
required:
  - description: "Help app bar (gms namespace)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.gms:id/gh_help_app_bar$"
  - description: "Help console / search container"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.gms:id/gh_help_console$"
  - description: "Feedback option container"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.gms:id/gh_feedback_option$"
  - description: "'Help' header content-desc"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Help$"
  - description: "Search-help action"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Search help$"
