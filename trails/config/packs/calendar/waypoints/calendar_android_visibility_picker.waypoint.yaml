id: "calendar/android/visibility_picker"
description: "Event visibility picker dialog — Default visibility / Public / Private. Opened from event editor visibility row."
required:
  - description: "Dialog title 'Default visibility'"
    selector:
      androidAccessibility:
        textRegex: "^Default visibility$"
  - description: "Public option"
    selector:
      androidAccessibility:
        textRegex: "^Public$"
  - description: "Private option"
    selector:
      androidAccessibility:
        textRegex: "^Private$"
  - description: "Picker dialog list"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/select_dialog_listview$"
forbidden:
  - description: "Theme picker title (sibling dialog)"
    selector:
      androidAccessibility:
        textRegex: "^Choose theme$"
  - description: "Repeat picker option (sibling dialog)"
    selector:
      androidAccessibility:
        textRegex: "^Does not repeat$"
