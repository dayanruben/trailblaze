id: "calendar/android/custom_notification_dialog"
description: "Custom notification time editor — interval input, units selector, and 'As notification / As email' delivery method radios. Reached via notification picker → Custom…"
required:
  - description: "Dialog title 'Custom notification'"
    selector:
      androidAccessibility:
        textRegex: "^Custom notification$"
  - description: "Notification methods radio container"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/notification_methods_layout$"
  - description: "'As notification' delivery method radio"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/as_notification$"
  - description: "'As email' delivery method radio"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/as_email$"
  - description: "Interval input"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/interval$"
  - description: "Done button"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/done$"
forbidden:
  - description: "Plain notification picker list (would mean Custom dialog has not been opened)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/select_dialog_listview$"
