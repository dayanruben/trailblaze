id: "calendar/android/add_location"
description: "Add-location screen with a search input and suggestion list. Toolbar reads 'Add location' (or 'Locations'). Reached from the event editor's location row."
required:
  - description: "Toolbar accessibility label 'Locations'"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Locations$"
  - description: "'Add location' header text"
    selector:
      androidAccessibility:
        textRegex: "^Add location$"
  - description: "Location search input"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/search_text$"
  - description: "Suggestions list"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/suggestions$"
  - description: "Back button"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Back$"
