id: "calendar/android/repeat_picker"
description: "Recurrence (repeat) picker dialog from the event editor — Does not repeat / Every day / Every week / Every month / Every year / Custom."
required:
  - description: "Picker dialog list"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/select_dialog_listview$"
  - description: "'Does not repeat' option"
    selector:
      androidAccessibility:
        textRegex: "^Does not repeat$"
  - description: "'Every day' option"
    selector:
      androidAccessibility:
        textRegex: "^Every day$"
  - description: "'Every week' option"
    selector:
      androidAccessibility:
        textRegex: "^Every week$"
  - description: "'Every month' option"
    selector:
      androidAccessibility:
        textRegex: "^Every month$"
  - description: "'Custom…' option (typographic ellipsis)"
    selector:
      androidAccessibility:
        textRegex: "^Custom…$"
forbidden:
  - description: "Theme picker title would mean we're on the wrong dialog"
    selector:
      androidAccessibility:
        textRegex: "^Choose theme$"
