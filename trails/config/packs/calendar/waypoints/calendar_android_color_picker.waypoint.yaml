id: "calendar/android/color_picker"
description: "Event color picker dialog showing the event-color palette (Tomato, Flamingo, Tangerine, Banana, Sage, Basil, Peacock, Blueberry, Lavender, Grape, Graphite). Inferred from standard Calendar feature."
required:
  - description: "Picker dialog list"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/select_dialog_listview$"
  - description: "At least one Google Calendar color name"
    selector:
      androidAccessibility:
        textRegex: "^(Tomato|Flamingo|Tangerine|Banana|Sage|Basil|Peacock|Blueberry|Lavender|Grape|Graphite)$"
  - description: "Color-square tile in row"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/color_square$"
forbidden:
  - description: "Repeat picker"
    selector:
      androidAccessibility:
        textRegex: "^Does not repeat$"
