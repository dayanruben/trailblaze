id: "calendar/android/day_view"
description: "Google Calendar, Day view selected. Single day's timeline with 'Open Schedule View' switcher header. Distinct from week/3-day (multi-day) and schedule (week-range labels)."
required:
  - description: "Toolbar 'May' date picker button (calendar header is present)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/date_picker_button$"
  - description: "Single-day timeline cell with 'Open Schedule View' action — present only on Day view"
    selector:
      androidAccessibility:
        contentDescriptionRegex: ".*, Open Schedule View$"
  - description: "Create-new-event FAB"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/floating_action_button$"
forbidden:
  - description: "Multi-day cell w/ 'Open Day View' would mean we're on schedule/3-day/week, not day"
    selector:
      androidAccessibility:
        contentDescriptionRegex: ".*, Open Day View$"
