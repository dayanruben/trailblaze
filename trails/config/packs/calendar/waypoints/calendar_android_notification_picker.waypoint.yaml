id: "calendar/android/notification_picker"
description: "Notification time picker dialog (e.g. 5/10/15/30 minutes before, 1 hour, 1 day, Custom). Same shape used by the per-calendar default-notifications screen and the in-event notification picker."
required:
  - description: "Picker dialog list"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/select_dialog_listview$"
  - description: "5 minutes before option"
    selector:
      androidAccessibility:
        textRegex: "^5 minutes before$"
  - description: "10 minutes before option"
    selector:
      androidAccessibility:
        textRegex: "^10 minutes before$"
  - description: "30 minutes before option"
    selector:
      androidAccessibility:
        textRegex: "^30 minutes before$"
  - description: "1 hour before option"
    selector:
      androidAccessibility:
        textRegex: "^1 hour before$"
  - description: "Custom… option"
    selector:
      androidAccessibility:
        textRegex: "^Custom…$"
forbidden:
  - description: "Repeat picker option (sibling dialog)"
    selector:
      androidAccessibility:
        textRegex: "^Every week$"
