id: "calendar/android/calendar_picker"
description: "'Choose calendar' picker that appears when the user can choose between multiple calendars to add an event to. Inferred — only appears with multiple calendars; uses the same select_dialog_listview shape."
required:
  - description: "Picker dialog list"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/select_dialog_listview$"
  - description: "Calendar item with color square (calendar-row tile)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/color_square$"
forbidden:
  - description: "Frequency picker option"
    selector:
      androidAccessibility:
        textRegex: "^Does not repeat$"
  - description: "Visibility picker option"
    selector:
      androidAccessibility:
        textRegex: "^Default visibility$"
