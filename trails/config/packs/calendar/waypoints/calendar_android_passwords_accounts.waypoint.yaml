id: "calendar/android/passwords_accounts"
description: "Android system 'Passwords & accounts' screen reached from Calendar's account_sheet → 'Manage accounts on this device'. Lives in com.android.settings, but Calendar reaches it via deep-link."
required:
  - description: "Settings system app bar"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.android\\.settings:id/app_bar$"
  - description: "'Passwords & accounts' content-desc"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Passwords & accounts$"
  - description: "'Accounts for Owner' header"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Accounts for Owner$"
  - description: "Add account row"
    selector:
      androidAccessibility:
        textRegex: "^Add account$"
forbidden:
  - description: "Calendar action_bar_root (would mean we never left Calendar)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/action_bar_root$"
