id: "calendar/android/event_year_picker"
description: "Modal date picker dialog in year-grid mode (after tapping the year header). Distinct from event_date_picker (which shows the day-grid month_view)."
required:
  - description: "Native datePicker widget"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/datePicker$"
  - description: "Year-grid picker (replaces date_picker_day_picker when in year mode)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/date_picker_year_picker$"
  - description: "Header date display"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/date_picker_header_date$"
  - description: "OK button"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/button1$"
forbidden:
  - description: "Day picker would mean we're still in month-grid mode"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/date_picker_day_picker$"
  - description: "Month-view grid (only present in day mode)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/month_view$"
