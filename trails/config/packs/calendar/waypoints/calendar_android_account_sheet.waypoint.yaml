id: "calendar/android/account_sheet"
description: "Account & settings bottom sheet (OneGoogle dialog) for the signed-in account. Reached via the avatar in the top-right of the toolbar."
required:
  - description: "OneGoogle account card root"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/og_card$"
  - description: "Selected-account header"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/selected_account_view$"
  - description: "Manage-accounts entry"
    selector:
      androidAccessibility:
        textRegex: "^Manage accounts on this device$"
  - description: "Privacy Policy footer button"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/og_privacy_policy_button$"
  - description: "Close (X) header button"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Close$"
forbidden:
  - description: "Calendar FAB is hidden behind the OneGoogle sheet"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/floating_action_button$"
        isClickable: true
