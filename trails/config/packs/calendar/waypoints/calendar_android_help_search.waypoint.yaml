id: "calendar/android/help_search"
description: "Help & feedback search overlay — opened by tapping the 'Search help' input. Search-results list is open (gh_search_results_list) with article-suggestion rows. Distinct from help_feedback (popular-articles + feedback option) and help_search_results (variant requiring at least one match)."
required:
  - description: "Search-box input"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.gms:id/gh_search_box$"
  - description: "Search results list container (only present in active search)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.gms:id/gh_search_results_list$"
  - description: "'Clear text' action button on the search input"
    selector:
      androidAccessibility:
        contentDescriptionRegex: "^Clear text$"
forbidden:
  - description: "Help-article content (would mean we're inside an article, not searching)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.gms:id/gh_help_answer$"
