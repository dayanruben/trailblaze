id: "calendar/android/log_access_dialog"
description: "OS dialog requesting one-time access to device logs — surfaced when sending feedback. 'Allow Google Play services to access all device logs?'"
required:
  - description: "Dialog title resource"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/log_access_dialog_title$"
  - description: "Dialog body explaining device logs"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/log_access_dialog_body$"
  - description: "Allow one-time access button"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/log_access_dialog_allow_button$"
  - description: "Deny button"
    selector:
      androidAccessibility:
        resourceIdRegex: "^android:id/log_access_dialog_deny_button$"
forbidden:
  - description: "Approximate-location accuracy radio (a different OS dialog)"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.android\\.permissioncontroller:id/permission_location_accuracy$"
