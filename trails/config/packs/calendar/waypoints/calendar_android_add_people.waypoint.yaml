id: "calendar/android/add_people"
description: "Add people / guests screen — search for attendees plus a results list. Toolbar reads 'Add people'. Reached from event editor's people row."
required:
  - description: "'Add people' header"
    selector:
      androidAccessibility:
        textRegex: "^Add people$"
  - description: "People list recycler"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/recycler$"
  - description: "Search input"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/search_text$"
  - description: "Done action button"
    selector:
      androidAccessibility:
        textRegex: "^Done$"
forbidden:
  - description: "Locations 'suggestions' container is for add-location, not add-people"
    selector:
      androidAccessibility:
        resourceIdRegex: "^com\\.google\\.android\\.calendar:id/suggestions$"
