id: calendar_android_generalToStartOfWeek
description: From Settings → General, tap 'Start of the week' to open the week-start picker.
shortcut:
  from: calendar/android/settings_general
  to: calendar/android/start_of_week_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Start of the week$"
