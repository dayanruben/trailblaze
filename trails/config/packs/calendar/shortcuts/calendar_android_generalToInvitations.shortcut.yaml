id: calendar_android_generalToInvitations
description: From Settings → General, tap 'Adding invitations' to open its sub-screen.
shortcut:
  from: calendar/android/settings_general
  to: calendar/android/settings_invitations
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Adding invitations$"
