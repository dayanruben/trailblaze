id: calendar_android_settingsGeneralToQuickResponses
description: From Settings → General, tap 'Quick responses' to open the canned-responses sub-screen.
shortcut:
  from: calendar/android/settings_general
  to: calendar/android/settings_quick_responses
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Quick responses$"
