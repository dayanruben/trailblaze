id: calendar_android_managePasswordsToAddAccount
description: From the system Passwords & accounts screen, tap 'Add account' to open the account-type picker.
shortcut:
  from: calendar/android/passwords_accounts
  to: calendar/android/add_account_type_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Add account$"
          resourceIdRegex: "^android:id/title$"
