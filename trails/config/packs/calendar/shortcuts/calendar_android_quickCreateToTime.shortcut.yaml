id: calendar_android_quickCreateToTime
description: Tap the start-time row in the quick-create sheet to open the time picker dialog.
shortcut:
  from: calendar/android/quick_create_collapsed
  to: calendar/android/event_time_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          contentDescriptionRegex: "^Start time: .*$"
