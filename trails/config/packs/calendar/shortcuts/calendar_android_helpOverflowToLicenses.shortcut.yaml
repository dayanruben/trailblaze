id: calendar_android_helpOverflowToLicenses
description: From the help overflow popup, tap 'Open source licenses' to open the licenses index.
shortcut:
  from: calendar/android/help_overflow_menu
  to: calendar/android/open_source_licenses
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Open source licenses$"
          resourceIdRegex: "^com\\.google\\.android\\.gms:id/title$"
