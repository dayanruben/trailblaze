id: calendar_android_expandedToRepeat
description: From the expanded event sheet, tap the 'Does not repeat' row to open the recurrence picker.
shortcut:
  from: calendar/android/quick_create_expanded
  to: calendar/android/repeat_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Does not repeat$"
