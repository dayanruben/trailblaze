id: calendar_android_generalToTimezone
description: From Settings → General, tap 'Time zone' to open the timezone picker sub-screen.
shortcut:
  from: calendar/android/settings_general
  to: calendar/android/timezone_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Time zone$"
