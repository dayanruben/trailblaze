id: calendar_android_generalToTheme
description: From Settings → General, tap 'Theme' to open the theme picker dialog.
shortcut:
  from: calendar/android/settings_general
  to: calendar/android/theme_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Theme$"
