id: calendar_android_timeToText
description: Toggle the time picker from radial-clock mode into keyboard / text-entry mode.
shortcut:
  from: calendar/android/event_time_picker
  to: calendar/android/time_picker_text_mode
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          resourceIdRegex: "^android:id/toggle_mode$"
