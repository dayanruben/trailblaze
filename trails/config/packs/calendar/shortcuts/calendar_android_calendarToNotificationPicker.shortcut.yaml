id: calendar_android_calendarToNotificationPicker
description: From per-calendar settings, tap 'Add a notification' (default-notifications row) to open the notification time picker.
shortcut:
  from: calendar/android/settings_calendar
  to: calendar/android/notification_picker
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Add a notification$"
