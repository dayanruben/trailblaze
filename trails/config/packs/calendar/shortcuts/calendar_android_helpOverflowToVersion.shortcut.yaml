id: calendar_android_helpOverflowToVersion
description: From the help overflow popup, tap 'Version info' to open the version dialog.
shortcut:
  from: calendar/android/help_overflow_menu
  to: calendar/android/version_info_dialog
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Version info$"
          resourceIdRegex: "^com\\.google\\.android\\.gms:id/title$"
