id: calendar_android_signinToFindEmail
description: From Google sign-in, tap 'Forgot email?' to open the recovery flow.
shortcut:
  from: calendar/android/google_signin
  to: calendar/android/find_email
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Forgot email\\?$"
