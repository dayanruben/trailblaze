id: calendar_android_eventOverflowToDuplicate
description: From event-detail overflow, tap 'Duplicate' to open the duplicate-event editor.
shortcut:
  from: calendar/android/event_overflow_menu
  to: calendar/android/event_duplicate_form
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          textRegex: "^Duplicate$"
          resourceIdRegex: "^com\\.google\\.android\\.calendar:id/title$"
