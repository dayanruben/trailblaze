id: calendar_android_inlinePickerClose
description: From the inline date picker, tap the toolbar 'May, Hide date picker' button to collapse it back to day view.
shortcut:
  from: calendar/android/inline_date_picker
  to: calendar/android/day_view
parameters: []
tools:
  - tapOnElementBySelector:
      reason: ""
      nodeSelector:
        androidAccessibility:
          contentDescriptionRegex: "^[A-Z][a-z]+, Hide date picker$"
