# Android World Benchmark: BrightnessMaxVerify
- config:
    id: android-world-benchmarks/system/brightness_max_verify
    displayName: "System - Brightness Max Verify"
    description: "Turn brightness to the max value."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "settings put system screen_brightness 255"

- prompts:
    - step: "Turn brightness to the max value."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get system screen_brightness"
        expectedOutput: "255"
        matchMode: "exact"

