# Android World Benchmark: BluetoothTurnOn
- config:
    id: android-world-benchmarks/system/bluetooth_turn_on
    displayName: "System - Bluetooth Turn On"
    description: "Turn bluetooth on."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "svc bluetooth disable"

- prompts:
    - step: "Turn bluetooth on."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get global bluetooth_on"
        expectedOutput: "1"
        matchMode: "exact"

