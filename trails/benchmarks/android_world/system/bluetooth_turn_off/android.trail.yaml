# Android World Benchmark: BluetoothTurnOff
- config:
    id: android-world-benchmarks/system/bluetooth_turn_off
    displayName: "System - Bluetooth Turn Off"
    description: "Turn bluetooth off."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "svc bluetooth enable"

- prompts:
    - step: "Turn bluetooth off."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get global bluetooth_on"
        expectedOutput: "0"
        matchMode: "exact"

