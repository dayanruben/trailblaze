# Android World Benchmark: WifiTurnOff
- config:
    id: android-world-benchmarks/system/wifi_turn_off
    displayName: "System - Wifi Turn Off"
    description: "Turn wifi off."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "svc wifi enable"

- prompts:
    - step: "Turn wifi off."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get global wifi_on"
        expectedOutput: "0"
        matchMode: "exact"

