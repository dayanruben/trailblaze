# Android World Benchmark: BrightnessMin
- config:
    id: android-world-benchmarks/system/brightness_min
    displayName: "System - Brightness Min"
    description: "Turn brightness to the min value."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "settings put system screen_brightness 255"

- prompts:
    - step: "Turn brightness to the min value."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get system screen_brightness"
        expectedOutput: "1"
        matchMode: "exact"

