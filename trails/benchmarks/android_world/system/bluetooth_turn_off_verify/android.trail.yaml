# Android World Benchmark: BluetoothTurnOffVerify
- config:
    id: android-world-benchmarks/system/bluetooth_turn_off_verify
    displayName: "System - Bluetooth Turn Off Verify"
    description: "Turn bluetooth off."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "svc bluetooth disable"

- prompts:
    - step: "Turn bluetooth off."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get global bluetooth_on"
        expectedOutput: "0"
        matchMode: "exact"

