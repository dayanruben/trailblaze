# Android World Benchmark: WifiTurnOffVerify
- config:
    id: android-world-benchmarks/system/wifi_turn_off_verify
    displayName: "System - Wifi Turn Off Verify"
    description: "Turn wifi off."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "svc wifi disable"

- prompts:
    - step: "Turn wifi off."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get global wifi_on"
        expectedOutput: "0"
        matchMode: "exact"

