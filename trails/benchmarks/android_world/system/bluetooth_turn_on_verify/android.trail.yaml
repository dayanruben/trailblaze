# Android World Benchmark: BluetoothTurnOnVerify
- config:
    id: android-world-benchmarks/system/bluetooth_turn_on_verify
    displayName: "System - Bluetooth Turn On Verify"
    description: "Turn bluetooth on."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "svc bluetooth enable"

- prompts:
    - step: "Turn bluetooth on."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get global bluetooth_on"
        expectedOutput: "1"
        matchMode: "exact"

