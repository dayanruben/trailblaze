# Android World Benchmark: WifiTurnOn
- config:
    id: android-world-benchmarks/system/wifi_turn_on
    displayName: "System - Wifi Turn On"
    description: "Turn wifi on."

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "svc wifi disable"

- prompts:
    - step: "Turn wifi on."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "settings get global wifi_on"
        expectedOutput: "1|2"
        matchMode: "regex"

