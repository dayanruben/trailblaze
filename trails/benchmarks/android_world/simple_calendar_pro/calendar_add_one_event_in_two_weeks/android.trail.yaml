# Android World Benchmark: calendar/add_one_event_in_two_weeks
- config:
    id: android-world-benchmarks/simple_calendar_pro/calendar_add_one_event_in_two_weeks
    description: Create a calendar event in two weeks from today (2023-10-29) at 11h with title "Review session for Annual Report" and description "Finalize business objectives" lasting 60 mins

- tools:
  - androidworldbenchmarks_runAdbShell:
      adbShellCommands:
        - "settings put global auto_time 0"
        - "date -s 20231015.153400"
  - androidworldbenchmarks_executeSqliteOnDevice:
      dbPath: /data/data/com.simplemobiletools.calendar.pro/databases/events.db
      sqlStatements:
        - "DELETE FROM events"
      appPackageName: com.simplemobiletools.calendar.pro

- prompts:
  - step: "In Simple Calendar Pro, create a calendar event in two weeks from today at 11h with the title 'Review session for Annual Report' and the description 'Finalize business objectives'. The event should last for 60 mins."

- tools:
  - androidworldbenchmarks_assertSqliteQuery:
      dbPath: /data/data/com.simplemobiletools.calendar.pro/databases/events.db
      query: "SELECT title FROM events WHERE title='Review session for Annual Report'"
      expectedOutput: "Review session for Annual Report"
      matchMode: exact
      appPackageName: com.simplemobiletools.calendar.pro

