# Android World Benchmark: RecipeAddMultipleFromMarkor2
- config:
    id: android-world-benchmarks/recipe/add_multiple_from_markor_2
    description: "Add the recipes listed in the file meal_plan.md in Markor to the Broccoli app."
- tools:
    - androidworldbenchmarks_executeSqliteOnDevice:
        dbPath: /data/data/com.flauschcode.broccoli/databases/broccoli
        sqlStatements:
          - "DELETE FROM recipes"
        appPackageName: com.flauschcode.broccoli
    - androidworldbenchmarks_createFileOnDevice:
        devicePath: /storage/emulated/0/Documents/Markor
        fileName: meal_plan.md
        content: "Title,Servings,PrepTime\nQuinoa Bowl,2,25 minutes\nEgg Fried Rice,4,20 minutes\nFish Tacos,3,30 minutes"
- prompts:
    - step: "Add the recipes listed in the file meal_plan.md in Markor to the Broccoli app."
- tools:
    - androidworldbenchmarks_assertSqliteQuery:
        dbPath: /data/data/com.flauschcode.broccoli/databases/broccoli
        query: "SELECT COUNT(*) FROM recipes WHERE title='Quinoa Bowl' OR title='Egg Fried Rice' OR title='Fish Tacos'"
        expectedOutput: "3"
        matchMode: exact
        appPackageName: com.flauschcode.broccoli

