# Android World Benchmark: RecipeAddMultipleFromMarkor
- config:
    id: android-world-benchmarks/recipe/add_multiple_from_markor
    description: "Add the recipes listed in the file recipes.md in Markor to the Broccoli app."
- tools:
    - androidworldbenchmarks_executeSqliteOnDevice:
        dbPath: /data/data/com.flauschcode.broccoli/databases/broccoli
        sqlStatements:
          - "DELETE FROM recipes"
        appPackageName: com.flauschcode.broccoli
    - androidworldbenchmarks_createFileOnDevice:
        devicePath: /storage/emulated/0/Documents/Markor
        fileName: recipes.md
        content: "Recipe: Tomato Soup\nServes: 4\nPrep time: 20 minutes\nIngredients: tomatoes, onion, garlic, broth\nDirections: Sauté onion and garlic. Add tomatoes and broth. Simmer 15 minutes.\n\nRecipe: Grilled Chicken\nServes: 2\nPrep time: 30 minutes\nIngredients: chicken breasts, olive oil, lemon, herbs\nDirections: Season chicken. Grill 6-8 minutes per side.\n\nRecipe: Vegetable Stir Fry\nServes: 3\nPrep time: 15 minutes\nIngredients: broccoli, carrots, soy sauce, ginger\nDirections: Heat oil. Add vegetables and stir fry 5 minutes."
- prompts:
    - step: "Add the recipes listed in the file recipes.md in Markor to the Broccoli app."
- tools:
    - androidworldbenchmarks_assertSqliteQuery:
        dbPath: /data/data/com.flauschcode.broccoli/databases/broccoli
        query: "SELECT COUNT(*) FROM recipes WHERE title='Tomato Soup' OR title='Grilled Chicken' OR title='Vegetable Stir Fry'"
        expectedOutput: "3"
        matchMode: exact
        appPackageName: com.flauschcode.broccoli

