# Android World Benchmark: Delete Note
- config:
    id: android-world-benchmarks/markor/delete_note
    description: Delete the note in Markor named shopping_list.md
- tools:
    - androidworldbenchmarks_clearDirectory:
        directoryPath: /storage/emulated/0/Documents/Markor
    - androidworldbenchmarks_createFileOnDevice:
        devicePath: /storage/emulated/0/Documents/Markor
        fileName: shopping_list.md
        content: Milk, Eggs, Bread
    - androidworldbenchmarks_createFileOnDevice:
        devicePath: /storage/emulated/0/Documents/Markor
        fileName: notes.md
        content: Various notes
    - androidworldbenchmarks_createFileOnDevice:
        devicePath: /storage/emulated/0/Documents/Markor
        fileName: journal.txt
        content: Daily journal entries
- prompts:
    - step: Delete the note in Markor named shopping_list.md.
- tools:
    - androidworldbenchmarks_assertFileExistsOnDevice:
        filePath: /storage/emulated/0/Documents/Markor/shopping_list.md
        shouldExist: false

