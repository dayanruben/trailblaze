# Android World Benchmark: Move Note
- config:
    id: android-world-benchmarks/markor/move_note
    description: Move project_plan.md from DailyNotes to WorkProjects in Markor
- tools:
    - androidworldbenchmarks_clearDirectory:
        directoryPath: /storage/emulated/0/Documents/Markor
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "mkdir -p /storage/emulated/0/Documents/Markor/DailyNotes"
          - "mkdir -p /storage/emulated/0/Documents/Markor/WorkProjects"
    - androidworldbenchmarks_createFileOnDevice:
        devicePath: /storage/emulated/0/Documents/Markor/DailyNotes
        fileName: project_plan.md
        content: Project plan for Q4
    - androidworldbenchmarks_createFileOnDevice:
        devicePath: /storage/emulated/0/Documents/Markor/DailyNotes
        fileName: daily_log.txt
        content: Daily log entries
- prompts:
    - step: In Markor, move the note project_plan.md from DailyNotes to WorkProjects.
- tools:
    - androidworldbenchmarks_assertFileExistsOnDevice:
        filePath: /storage/emulated/0/Documents/Markor/WorkProjects/project_plan.md
        shouldExist: true
    - androidworldbenchmarks_assertFileExistsOnDevice:
        filePath: /storage/emulated/0/Documents/Markor/DailyNotes/project_plan.md
        shouldExist: false

