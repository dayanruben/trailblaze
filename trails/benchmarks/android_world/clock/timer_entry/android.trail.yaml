# Android World Benchmark: TimerEntry
#
# From android_world ClockTimerEntry:
# - Setup: Clear clock app data
# - Prompt: "Create a timer with {hours} hours, {minutes} minutes, and {seconds} seconds. Do not start the timer."
# - Validation: DeskClock activity is foreground, timer shows "02h 30m 45s" text.
- config:
    id: android-world-benchmarks/clock/timer_entry
    displayName: "Clock - Timer Entry"
    description: "Create a timer with 2 hours, 30 minutes, and 45 seconds. Do not start the timer."

- tools:
    - clearAppData:
        packageName: com.google.android.deskclock
    # Android World starts every task from the home screen (using adb for reliable setup execution)
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "input keyevent KEYCODE_HOME"

- prompts:
    - step: "Create a timer with 2 hours, 30 minutes, and 45 seconds. Do not start the timer."

- tools:
    # Validation: timer shows the correct time entry
    # Android World checks for text "02h 30m 45s" or content_description "2 hours, 30 minutes, 45 seconds"
    - assertVisibleBySelector:
        reason: "Timer should show the entered time"
        selector:
          textRegex: "02h 30m 45s"

