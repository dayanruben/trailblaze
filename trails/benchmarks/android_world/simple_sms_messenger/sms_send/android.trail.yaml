# Android World Benchmark: sms/send
- config:
    id: android-world-benchmarks/simple_sms_messenger/sms_send
    description: Send a text message using Simple SMS Messenger to 555-234-5678 with message "Hey, are you coming to the party tonight?"

- tools:
  - androidworldbenchmarks_runAdbShell:
      adbShellCommands:
        - "content delete --uri content://sms"

- prompts:
  - step: "Send a text message using Simple SMS Messenger to 555-234-5678 with message: Hey, are you coming to the party tonight?"

- tools:
  - androidworldbenchmarks_assertAdbShellOutput:
      command: "content query --uri content://sms --where \"address LIKE '%5552345678%' AND type=2\" --projection body"
      expectedOutput: "party tonight"
      matchMode: "contains"

