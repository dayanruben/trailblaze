# Android World Benchmark: sms/resend
- config:
    id: android-world-benchmarks/simple_sms_messenger/sms_resend
    description: Resend the message I just sent to Alice in Simple SMS Messenger

- tools:
  - androidworldbenchmarks_runAdbShell:
      adbShellCommands:
        - "content delete --uri content://sms"
  - androidworldbenchmarks_addContactToDevice:
      name: "Alice"
      phoneNumber: "5551234567"
  - androidworldbenchmarks_runAdbShell:
      adbShellCommands:
        - "content insert --uri content://sms --bind address:s:5551234567 --bind \"body:s:Don't forget the meeting at 2pm\" --bind type:i:2 --bind read:i:1"

- prompts:
  - step: "Resend the message I just sent to Alice in Simple SMS Messenger"

- tools:
  - androidworldbenchmarks_assertAdbShellOutput:
      command: "content query --uri content://sms --where \"address LIKE '%5551234567%' AND body LIKE '%forget the meeting%' AND type=2\" --projection body"
      expectedOutput: "Row: 1"
      matchMode: "contains"

