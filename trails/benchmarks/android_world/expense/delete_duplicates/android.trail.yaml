# Android World Benchmark: ExpenseDeleteDuplicates
- config:
    id: android-world-benchmarks/expense/delete_duplicates
    description: "Delete duplicate expenses in Pro Expense app, keeping only one of each."
- tools:
    - androidworldbenchmarks_executeSqliteOnDevice:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        sqlStatements:
          - "DELETE FROM expense"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Coffee', 450, 1, 1697300000, 1697300000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Coffee', 450, 1, 1697299000, 1697299000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Bus fare', 250, 7, 1697200000, 1697200000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Bus fare', 250, 7, 1697199000, 1697199000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Lunch', 1299, 3, 1697100000, 1697100000)"
        appPackageName: com.arduia.expense
- prompts:
    - step: "Delete duplicate expenses in Pro Expense app, keeping only one of each."
- tools:
    - androidworldbenchmarks_assertSqliteQuery:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        query: "SELECT COUNT(*) FROM expense WHERE name='Coffee'"
        expectedOutput: "1"
        matchMode: exact
        appPackageName: com.arduia.expense

