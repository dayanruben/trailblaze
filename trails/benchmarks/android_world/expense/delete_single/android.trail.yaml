# Android World Benchmark: ExpenseDeleteSingle
- config:
    id: android-world-benchmarks/expense/delete_single
    description: "Delete the expense 'Gym membership' from Pro Expense app."
- tools:
    - androidworldbenchmarks_executeSqliteOnDevice:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        sqlStatements:
          - "DELETE FROM expense"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Gym membership', 5000, 6, 1697300000, 1697300000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Internet bill', 6999, 4, 1697200000, 1697200000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Groceries', 8525, 3, 1697100000, 1697100000)"
        appPackageName: com.arduia.expense
- prompts:
    - step: "Delete the expense 'Gym membership' from Pro Expense app."
- tools:
    - androidworldbenchmarks_assertSqliteQuery:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        query: "SELECT name FROM expense WHERE name='Gym membership'"
        expectedOutput: ""
        matchMode: exact
        appPackageName: com.arduia.expense

