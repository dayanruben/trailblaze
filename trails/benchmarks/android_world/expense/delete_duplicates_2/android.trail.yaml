# Android World Benchmark: ExpenseDeleteDuplicates2
- config:
    id: android-world-benchmarks/expense/delete_duplicates_2
    description: "Remove all duplicate expense entries in Pro Expense app. For entries with the same name and amount, keep only the first occurrence."
- tools:
    - androidworldbenchmarks_executeSqliteOnDevice:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        sqlStatements:
          - "DELETE FROM expense"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Movie ticket', 1500, 6, 1697400000, 1697400000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Movie ticket', 1500, 6, 1697399000, 1697399000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Movie ticket', 1500, 6, 1697398000, 1697398000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Gas', 3550, 7, 1697300000, 1697300000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Gas', 3550, 7, 1697299000, 1697299000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Dinner', 2500, 3, 1697200000, 1697200000)"
        appPackageName: com.arduia.expense
- prompts:
    - step: "Remove all duplicate expense entries in Pro Expense app. For entries with the same name and amount, keep only the first occurrence."
- tools:
    - androidworldbenchmarks_assertSqliteQuery:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        query: "SELECT COUNT(*) FROM expense WHERE name='Gas'"
        expectedOutput: "1"
        matchMode: exact
        appPackageName: com.arduia.expense

