# Android World Benchmark: ExpenseDeleteMultiple
- config:
    id: android-world-benchmarks/expense/delete_multiple
    description: "Delete the expenses 'Taxi ride' and 'Concert tickets' from Pro Expense app."
- tools:
    - androidworldbenchmarks_executeSqliteOnDevice:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        sqlStatements:
          - "DELETE FROM expense"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Taxi ride', 2500, 7, 1697300000, 1697300000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Concert tickets', 8500, 6, 1697200000, 1697200000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Coffee', 450, 1, 1697100000, 1697100000)"
          - "INSERT INTO expense (name, amount, category, created_date, modified_date) VALUES ('Fuel', 4200, 7, 1697000000, 1697000000)"
        appPackageName: com.arduia.expense
- prompts:
    - step: "Delete the expenses 'Taxi ride' and 'Concert tickets' from Pro Expense app."
- tools:
    - androidworldbenchmarks_assertSqliteQuery:
        dbPath: /data/data/com.arduia.expense/databases/accounting.db
        query: "SELECT COUNT(*) FROM expense WHERE name='Taxi ride' OR name='Concert tickets'"
        expectedOutput: "0"
        matchMode: exact
        appPackageName: com.arduia.expense

