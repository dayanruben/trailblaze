# Android World Benchmark: TakeVideo
- config:
    id: android-world-benchmarks/camera/take_video
    displayName: "Camera - Take Video"
    description: "Take one video."

- tools:
    - androidworldbenchmarks_clearDirectory:
        directoryPath: /sdcard/Movies

- prompts:
    - step: "Take one video."

- tools:
    - launchApp:
        appId: com.android.camera2
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "ls /sdcard/Movies/ /sdcard/DCIM/ 2>/dev/null"
        expectedOutput: "."
        matchMode: "contains"

