# Android World Benchmark: TakePhoto
- config:
    id: android-world-benchmarks/camera/take_photo
    displayName: "Camera - Take Photo"
    description: "Take one photo."

- tools:
    - androidworldbenchmarks_clearDirectory:
        directoryPath: /sdcard/Pictures

- prompts:
    - step: "Take one photo."

- tools:
    - launchApp:
        appId: com.android.camera2
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "ls /sdcard/Pictures"
        expectedOutput: "."
        matchMode: "contains"

