# Android World Benchmark: AddContact
- config:
    id: android-world-benchmarks/contacts/add_contact
    displayName: "Contacts - Add Contact"
    description: "Create a new contact for Alice Johnson. Their number is 555-123-4567."

- tools:
    # Match Android World: clear the contacts provider data before the run.
    - clearAppData:
        packageName: com.android.providers.contacts
    - clearAppData:
        packageName: com.google.android.contacts
    # Android World starts every task from the home screen (using adb for reliable setup execution)
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "input keyevent KEYCODE_HOME"

- prompts:
    - step: "Create a new contact for Alice Johnson. Their number is 555-123-4567."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "content query --uri content://contacts/phones --projection display_name:number"
        expectedOutput: "Alice Johnson.*555\\D*123\\D*4567"
        matchMode: "regex"

