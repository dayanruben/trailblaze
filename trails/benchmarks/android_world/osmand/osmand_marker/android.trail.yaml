# Android World Benchmark: osmand/marker
- config:
    id: android-world-benchmarks/osmand/osmand_marker
    description: Add a location marker for Schaan, Liechtenstein in the OsmAnd maps app

- tools:
  - androidworldbenchmarks_executeSqliteOnDevice:
      dbPath: /data/data/net.osmand/databases/map_markers_db
      sqlStatements:
        - "DELETE FROM map_markers"
      appPackageName: net.osmand

- prompts:
  - step: "Add a location marker for Schaan, Liechtenstein in the OsmAnd maps app."

- tools:
  - androidworldbenchmarks_assertSqliteQuery:
      dbPath: /data/data/net.osmand/databases/map_markers_db
      query: "SELECT * FROM map_markers"
      expectedOutput: "Schaan"
      matchMode: contains
      appPackageName: net.osmand

