# Android World Benchmark: osmand/track
# NOTE: This is a complexity=12 task (very hard)
- config:
    id: android-world-benchmarks/osmand/osmand_track
    description: Save a track with waypoints Balzers, Liechtenstein, Triesen, Liechtenstein, Schaan, Liechtenstein in the OsmAnd maps app in the same order as listed

- tools:
  - androidworldbenchmarks_clearDirectory:
      directoryPath: /storage/emulated/0/Android/data/net.osmand/files/tracks

- prompts:
  - step: "Save a track with waypoints Balzers, Liechtenstein, Triesen, Liechtenstein, Schaan, Liechtenstein in the OsmAnd maps app in the same order as listed."

- tools:
  - androidworldbenchmarks_assertAdbShellOutput:
      command: "ls /storage/emulated/0/Android/data/net.osmand/files/tracks/"
      expectedOutput: ".gpx"
      matchMode: contains

