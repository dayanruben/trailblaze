# Android World Benchmark: VLCCreateTwoPlaylists
# NOTE: Requires audio assets to be bundled in test APK at benchmarks/audio/

- config:
    id: android-world-benchmarks/vlc/create_two_playlists
    description: Create two playlists in VLC with different song selections

- tools:
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "rm -rf /sdcard/Music/*"
    - androidworldbenchmarks_pushAssetToDevice:
        assetPath: "benchmarks/audio/Sunset Dreams.mp3"
        devicePath: "/sdcard/Music/Sunset Dreams.mp3"
    - androidworldbenchmarks_pushAssetToDevice:
        assetPath: "benchmarks/audio/Ocean Waves.mp3"
        devicePath: "/sdcard/Music/Ocean Waves.mp3"
    - androidworldbenchmarks_pushAssetToDevice:
        assetPath: "benchmarks/audio/Mountain Echo.mp3"
        devicePath: "/sdcard/Music/Mountain Echo.mp3"
    - androidworldbenchmarks_pushAssetToDevice:
        assetPath: "benchmarks/audio/City Lights.mp3"
        devicePath: "/sdcard/Music/City Lights.mp3"
    - androidworldbenchmarks_pushAssetToDevice:
        assetPath: "benchmarks/audio/Forest Rain.mp3"
        devicePath: "/sdcard/Music/Forest Rain.mp3"
    - androidworldbenchmarks_runAdbShell:
        adbShellCommands:
          - "am broadcast -a android.intent.action.MEDIA_SCANNER_SCAN_FILE -d file:///sdcard/Music/"

- prompts:
    - step: "Create a playlist in VLC titled \"Morning Energy\" with songs: Sunset Dreams, City Lights. And then, create a playlist titled \"Night Wind Down\" with songs: Ocean Waves, Forest Rain."

- tools:
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "find /sdcard -name \"Morning Energy*\" -type f 2>/dev/null"
        expectedOutput: "Morning Energy"
        matchMode: "contains"
    - androidworldbenchmarks_assertAdbShellOutput:
        command: "find /sdcard -name \"Night Wind Down*\" -type f 2>/dev/null"
        expectedOutput: "Night Wind Down"
        matchMode: "contains"

