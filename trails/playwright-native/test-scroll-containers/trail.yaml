config:
  devices:
    web: PLAYWRIGHT_NATIVE
  title: 'Test: Scroll within specific containers'

trail:
  - step: "Navigate to ../../../examples/playwright-native/sample-app/index.html"
    recording:
      web:
        - web_navigate:
            url: ../../../examples/playwright-native/sample-app/index.html
            reasoning: The objective is to navigate to the specified URL. No interactive elements are present, so navigation must be done directly.

  - step: "Click on the \"Scroll\" navigation link"
    recording:
      web:
        - web_click:
            ref: e7
            reasoning: The objective is to click the "Scroll" navigation link. The element with ID e7 is the correct target for this action.
            nodeSelector:
              web:
                cssSelector: "#nav-scroll"

  - step: "Take a snapshot of the current page"
    recording:
      web:
        - web_snapshot:
            screenName: current_page_snapshot
            reasoning: The objective is to take a snapshot of the current page. This action will capture the current screen state and fulfill the task requirements.

  - step: "Use the web_verifyTextVisible tool to verify \"Category 1\" is visible"
    recording:
      web:
        - web_verifyTextVisible:
            text: Category 1
            reasoning: The objective specifically asks to verify that the text 'Category 1' is visible. This text appears as a link in the Sidebar navigation. I expect the verification to succeed since it is clearly listed in the current view hierarchy and screenshot.

  - step: "Scroll down within the sidebar navigation container"
    recording:
      web:
        - web_scroll:
            ref: navigation "Sidebar navigation"
            reasoning: The sidebar contains more categories than currently visible, so scrolling down within 'Sidebar navigation' will reveal further items and accomplish the objective.
            nodeSelector:
              web:
                ariaRole: navigation
                ariaNameRegex: Sidebar navigation

  - step: "Use the web_verifyTextVisible tool to verify \"Category 15\" is visible"
    recording:
      web:
        - web_verifyTextVisible:
            text: Category 15
            reasoning: The visible hierarchy shows 'Category 15' as a link in the sidebar navigation. Verifying that this text is visible fulfills the objective.

  - step: "Scroll down within the content panel"
    recording:
      web:
        - web_scroll:
            ref: e26
            reasoning: The objective is to scroll down within the content panel. The content panel corresponds to region 'e26'. I will scroll down within this region to achieve the objective.
            nodeSelector:
              web:
                ariaRole: region
                ariaNameRegex: Content panel

  - step: "Use the web_verifyTextVisible tool to verify \"Item 20\" is visible"
    recording:
      web:
        - web_verifyTextVisible:
            text: Item 20
            reasoning: The current objective requests verification that 'Item 20' is visible. According to the view hierarchy and screenshot, 'Item 20' is visible within the content panel. Using the web_verifyTextVisible tool to confirm its presence as required by the objective.

  - step: "Scroll up within the content panel"
    recording:
      web:
        - web_scroll:
            direction: UP
            ref: e26
            reasoning: The objective is to scroll up within the content panel. The element e26 represents the content panel region, so scrolling up within this region will satisfy the objective.
            nodeSelector:
              web:
                ariaRole: region
                ariaNameRegex: Content panel
