          text: elec-3
          reasoning: The objective is to verify that the text 'elec-3' is visible in the detail panel. Since the prior step was clicking 'View' on an item in the Electronics section, the detail panel for that item should now display 'elec-3' if the implementation is correct. This action will check for the presence of that text.
  - step: Click the "View" button on the "Premium Cable" item in the Office Supplies section
