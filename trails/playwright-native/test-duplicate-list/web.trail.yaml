- config:
    title: 'Test: Click specific items in a list with duplicate text'
    platform: web
    driver: PLAYWRIGHT_NATIVE
- prompts:
  - step: Navigate to ../../../examples/playwright-native/sample-app/duplicate-list.html
    recording:
      tools:
      - playwright_navigate:
          url: ../../../examples/playwright-native/sample-app/duplicate-list.html
          reasoning: The objective is to navigate to the specified relative URL. Since there are no interactive elements or navigation options visible on the current page, I will directly navigate to the provided URL to begin or complete the task.
  - step: Verify the heading "Product List" is visible
    recording:
      tools:
      - playwright_verify_element_visible:
          ref: e1
          element: heading 'Product List'
          reasoning: The objective is to verify that the heading 'Product List' is visible, and element [e1] corresponds to that heading. This check confirms its presence on the screen.
          nodeSelector:
            web:
              ariaRole: heading
              ariaNameRegex: Product List
  - step: Click the "View" button on the first "Premium Cable" item in the Electronics section
    recording:
      tools:
      - playwright_click:
          ref: e4
          element: first View button in Electronics section
          reasoning: This is the first 'View' button in the Electronics section, which corresponds to the first 'Premium Cable' item as per the objective.
          nodeSelector:
            index: 2
  - step: Verify the text "elec-1" is visible in the detail panel
    recording:
      tools:
      - playwright_verify_text_visible:
          text: elec-1
          reasoning: The objective requires verifying that the text 'elec-1' is visible in the detail panel. This verification directly checks if the required text is present anywhere on the page, including within a detail panel if visible.
  - step: Click the "View" button on the second "Premium Cable" item in the Electronics section
    recording:
      tools:
      - playwright_click:
          ref: e5
          element: View button for second Premium Cable in Electronics section
          reasoning: This is the second 'View' button under the Electronics section, which matches the request to click the 'View' button for the second 'Premium Cable' item in that section.
          nodeSelector:
            web:
              ariaRole: button
              ariaNameRegex: View
              nthIndex: 1
  - step: Verify the text "elec-2" is visible in the detail panel
    recording:
      tools:
      - playwright_verify_text_visible:
          text: elec-2
          reasoning: The objective is to verify that the text 'elec-2' is visible in the detail panel. Since the prior objective was to view the details for the second 'Premium Cable' in Electronics, I expect 'elec-2' to be present as an identifier in the detail section. I will verify its visibility on the current page.
  - step: Click the "View" button on the "Standard Adapter" item in the Electronics section
    recording:
