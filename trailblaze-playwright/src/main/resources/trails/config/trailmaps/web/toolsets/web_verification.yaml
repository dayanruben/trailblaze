# Playwright web assertion tools.
id: web_verification
description: "Verify text, elements, values, and lists are visible on the web page."
drivers:
  - playwright-native
  - playwright-electron
tools:
  - web_verifyTextVisible
  - web_verifyElementVisible
  - web_verifyValue
  - web_verifyListVisible
  - web_assertNetworkEvent
  # Generic, driver-agnostic verification primitive (host-backed): assert the page reached a named
  # waypoint. Resolves against the same registry/matcher every driver uses.
  - assertWaypoint
