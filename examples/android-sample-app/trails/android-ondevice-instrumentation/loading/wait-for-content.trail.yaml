config:
  id: sample-app/loading/wait-for-content
  target: xyz.block.trailblaze.examples.sampleapp
  devices:
    android-phone: ANDROID_ONDEVICE_INSTRUMENTATION

trailhead:
  step: Launch the sample app
  recording:
    android-phone:
      launchApp:
        appId: xyz.block.trailblaze.examples.sampleapp
        launchMode: REINSTALL

trail:
  - step: "Navigate to the \"Loading\" tab"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Open the Loading demo by tapping the Loading navigation item.
            nodeSelector:
              containsChild:
                androidAccessibility:
                  textRegex: Loading

  - step: "Tap \"Start Loading\" to begin loading the content"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Start the (variable-delay) load.
            nodeSelector:
              containsChild:
                androidAccessibility:
                  textRegex: Start Loading

  - step: "Wait (event-driven) for the content to finish loading"
    recording:
      android-phone:
        - mobile_maestro:
            commands:
            - extendedWaitUntil:
                visible:
                  text: Content Loaded
                timeout: "30000"

  - verify: "\"Content Loaded\" is visible on the screen"
    recording:
      android-phone:
        - assertVisibleBySelector:
            reason: Confirm the content finished loading.
            nodeSelector:
              androidAccessibility:
                textRegex: Content Loaded
