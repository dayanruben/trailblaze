- config:
    id: sample-app/lists/scroll-and-navigate
    target: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_ONDEVICE_INSTRUMENTATION
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
      launchMode: REINSTALL
- prompts:
  - step: Navigate to the "Lists" tab
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The user requested to navigate to the 'Lists' tab, and the element with nodeId 88 contains the 'Lists' text and is clickable, indicating it is the navigation tab.
          selector:
            containsChild:
              textRegex: Lists
  - step: Scroll down to "Item 25" and tap it
    recording:
      tools:
      - scrollUntilTextIsVisible:
          text: Item 25
      - tapOnElementBySelector:
          reason: '"Item 25" is now visible and clickable, fulfilling the objective requirement to tap it.'
          selector:
            textRegex: Item 25
  - step: Verify "Detail for Item 25" is shown, then go back to the list
    recording:
      tools:
      - assertVisibleBySelector:
          reason: The objective requires verifying that the detail view for 'Item 25' is shown, and the TextView with this text confirms the correct screen is displayed.
          selector:
            textRegex: Detail for Item 25
      - tapOnElementBySelector:
          reason: The detail view for 'Item 25' is shown. The next step is to go back to the list by tapping the back arrow at the top left (nodeId 56).
          selector:
            textRegex: Back
  - step: Scroll down to "Item 50" and verify it is visible
    recording:
      tools:
      - scrollUntilTextIsVisible:
          text: Item 50
      - assertVisibleBySelector:
          reason: '''Item 50'' is specifically mentioned in the objective as the verification target and is clearly listed in the current view hierarchy.'
          selector:
            textRegex: Item 50
