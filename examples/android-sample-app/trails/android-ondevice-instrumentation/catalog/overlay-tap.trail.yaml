config:
  id: sample-app/catalog/overlay-tap
  target: xyz.block.trailblaze.examples.sampleapp
  devices:
    android-phone: ANDROID_ONDEVICE_INSTRUMENTATION

trailhead:
  step: Launch the sample app
  recording:
    android-phone:
      launchApp:
        appId: xyz.block.trailblaze.examples.sampleapp
        launchMode: REINSTALL

trail:
  - step: "Navigate to the \"Catalog\" tab"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Navigate to the Catalog tab by tapping the Catalog navigation item.
            nodeSelector:
              containsChild:
                androidAccessibility:
                  textRegex: Catalog

  - step: "Tap \"Coffee Latte\" in the list"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Tap on the "Coffee Latte" item row to open its detail dialog.
            nodeSelector:
              containsChild:
                androidAccessibility:
                  textRegex: Coffee Latte

  - verify: "A dialog showing \"Coffee Latte\" is visible"
    recording:
      android-phone:
        - assertVisibleBySelector:
            reason: Verify the item detail dialog is showing "Coffee Latte".
            nodeSelector:
              androidAccessibility:
                textRegex: Coffee Latte

  - step: "Tap \"Add to Cart\" in the dialog"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Tap the "Add to Cart" button in the dialog overlay.
            nodeSelector:
              containsChild:
                androidAccessibility:
                  textRegex: Add to Cart
