- config:
    id: sample-app/swipe/swipe-directions
    target: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_ONDEVICE_INSTRUMENTATION
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
      launchMode: REINSTALL
- prompts:
  - step: Navigate to the "Swipe" tab and verify "Page 1 of 5" is shown
    recording:
      tools:
      - tapOnElementBySelector:
          reason: Navigate to the 'Swipe' tab as instructed.
          selector:
            containsChild:
              textRegex: Swipe
      - assertVisibleBySelector:
          reason: To verify that 'Page 1 of 5' is visible as required by the objective.
          selector:
            textRegex: Page 1 of 5
  - step: Swipe forward to page 3, then swipe back to page 2
    recording:
      tools:
      - swipe:
          direction: LEFT
      - swipe:
          direction: LEFT
      - swipe:
          direction: RIGHT
  - step: Verify the page-body label shows "Page 2"
    recording:
      tools:
      - assertVisibleBySelector:
          reason: Verify the page-body label (set imperatively by SwipePageFragment via
            TextView.setText) shows "Page 2" — proves the ViewPager has settled on page 2.
            We intentionally do NOT assert on the header "Page 2 of 5" here even though it
            visually updates, because that header is a Compose `Text` whose state-driven
            recomposition doesn't reliably fire an accessibility-cache-invalidating event,
            making it an unreliable target on the accessibility driver. The body label is
            a plain Android TextView in a fragment that's swapped on page change, so its
            accessibility node is naturally fresh on every read.
          selector:
            textRegex: ^Page 2$
