config:
  id: sample-app/swipe/swipe-directions
  target: xyz.block.trailblaze.examples.sampleapp
  devices:
    android-phone: ANDROID_ONDEVICE_INSTRUMENTATION

trailhead:
  step: Launch the sample app
  recording:
    android-phone:
      launchApp:
        appId: xyz.block.trailblaze.examples.sampleapp
        launchMode: REINSTALL

trail:
  - step: "Navigate to the \"Swipe\" tab and verify \"Page 1 of 5\" is shown"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Navigate to the 'Swipe' tab as instructed.
            nodeSelector:
              containsChild:
                androidAccessibility:
                  textRegex: Swipe
        - assertVisibleBySelector:
            reason: To verify that 'Page 1 of 5' is visible as required by the objective.
            nodeSelector:
              androidAccessibility:
                textRegex: Page 1 of 5

  - step: "Swipe forward to page 3, then swipe back to page 2"
    recording:
      android-phone:
        - swipe:
            direction: LEFT
        - swipe:
            direction: LEFT
        - swipe:
            direction: RIGHT

  - step: "Verify \"Page 2 of 5\" is displayed"
    recording:
      android-phone:
        - assertVisibleBySelector:
            reason: Proves the ViewPager has settled on page 2. The pattern matches either the Compose header "Page 2 of 5" or the body label "Page 2" (a TextView inside `AndroidView { ViewPager2 { Fragment { TextView } } }`). Both targets appear depending on whether Compose's accessibility delegate is authoritative for the ComposeView subtree at read time. Post-#3237, when the on-device accessibility service is started unconditionally, Compose owns the subtree and filters AndroidView holders out (the WebView/AndroidView
              accessibility gap; see devlog 2026-05-14-android-webview-compose-accessibility-gap.md) — only the Compose header is reachable on UiAutomator2. In RPC/daemon execution where the instrumentation rule never fires (accessibility service stays unbound), the body TextView is also reachable. Matching either keeps the assertion robust across both execution shapes.
            nodeSelector:
              androidAccessibility:
                textRegex: Page 2( of 5)?
