config:
  id: sample-app/settings/system-interactions
  target: xyz.block.trailblaze.examples.sampleapp
  devices:
    android-phone: ANDROID_ONDEVICE_ACCESSIBILITY

trailhead:
  step: Launch the sample app
  recording:
    android-phone:
      launchApp:
        appId: xyz.block.trailblaze.examples.sampleapp

trail:
  - step: "Navigate to the \"Settings\" tab"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: The 'Settings' tab is represented by the clickable view with nodeId 53 and contains the text 'Settings'. Tapping this should navigate to the Settings tab.
            nodeSelector:
              androidAccessibility:
                classNameRegex: android.view.View
                collectionItemRowIndex: 0
                collectionItemColumnIndex: 5

  - step: "Enable the \"Enable Notifications\" switch and verify it is checked"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: The toggle for 'Enable Notifications' is part of the clickable view with nodeId 10, which is visually associated with the label and switch.
            nodeSelector:
              androidAccessibility:
                classNameRegex: android.view.View
              index: 2

  - step: "Verify the network status shows \"Online\" or \"Offline\" and an app version starting with \"Version\" is visible"
    recording:
      android-phone:
        - assertVisibleBySelector:
            reason: This node displays the network status as 'Online'. Either 'Online' or 'Offline' needs to be visible.
            nodeSelector:
              androidAccessibility:
                textRegex: (Online|Offline)
        - assertVisibleBySelector:
            reason: This node displays the network status as either 'Online' or 'Offline'.
            nodeSelector:
              androidAccessibility:
                textRegex: (Online|Offline)
        - assertVisibleBySelector:
            reason: This node displays 'Online' which is an acceptable network status for the requirement.
            nodeSelector:
              androidAccessibility:
                textRegex: (Online|Offline)
        - assertVisibleBySelector:
            reason: This node displays the network status as 'Online'. Either 'Online' or 'Offline' must be visible.
            nodeSelector:
              androidAccessibility:
                textRegex: (Online|Offline)
        - assertVisibleBySelector:
            reason: This node displays the network status as 'Online'. 'Online' or 'Offline' must be visible.
            nodeSelector:
              androidAccessibility:
                textRegex: (Online|Offline)

  - step: "Check the \"Accept Terms\" checkbox and verify it is checked"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Node 21 is the clickable parent view containing both the 'Accept Terms' label and the checkbox. Tapping this should check the checkbox as intended.
            nodeSelector:
              androidAccessibility:
                textRegex: Accept Terms
