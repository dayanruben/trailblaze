- config:
    id: sample-app/lists/scroll-and-navigate
    target: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
- prompts:
  - step: Navigate to the "Lists" tab
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The 'Lists' tab is identified by the TextView labeled 'Lists' and the clickable parent View node 45. Tapping this View should navigate to the 'Lists' tab.
          selector:
            containsChild:
              textRegex: Lists
          nodeSelector:
            androidAccessibility:
              classNameRegex: \Qandroid.view.View\E
              collectionItemRowIndex: 0
              collectionItemColumnIndex: 2
  - step: Scroll down to "Item 25" and tap it
    recording:
      tools:
      - scrollUntilTextIsVisible:
          text: Item 25
      - tapOnElementBySelector:
          reason: The current objective is to tap on 'Item 25'. 'Item 25' is visible and clickable, corresponding to nodeId 17.
          selector:
            textRegex: Item 25
          nodeSelector:
            androidAccessibility:
              textRegex: Item 25
  - step: Verify "Detail for Item 25" is shown, then go back to the list
    recording:
      tools:
      - assertVisibleBySelector:
          reason: To verify that the 'Detail for Item 25' view is currently visible, satisfying the first step of the objective.
          selector:
            textRegex: Detail for Item 25
          nodeSelector:
            androidAccessibility:
              textRegex: Detail for Item 25
      - tapOnElementBySelector:
          reason: The 'Detail for Item 25' view is confirmed to be visible. The next step is to go back to the list, which is typically done by tapping the back arrow, represented by nodeId 13.
          selector:
            containsChild:
              textRegex: Back
          nodeSelector:
            androidAccessibility:
              contentDescriptionRegex: Back
  - step: Scroll down to "Item 50" and verify it is visible
    recording:
      tools:
      - scrollUntilTextIsVisible:
          text: Item 50
      - assertVisibleBySelector:
          reason: Item 50 is requested to be verified as visible. The corresponding node for 'Item 50' is present in the view hierarchy and shown near the bottom, indicating visibility.
          selector:
            textRegex: Item 50
          nodeSelector:
            androidAccessibility:
              textRegex: Item 50
