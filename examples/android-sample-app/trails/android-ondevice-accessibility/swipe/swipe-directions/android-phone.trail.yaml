- config:
    id: sample-app/swipe/swipe-directions
    app: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_ONDEVICE_ACCESSIBILITY
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
- prompts:
  - step: Navigate to the "Swipe" tab and verify "Page 1 of 5" is shown
    recording:
      tools:
      - tapOnElementBySelector:
          reason: To navigate to the 'Swipe' tab, I need to tap on the tab labeled 'Swipe'. The corresponding nodeId is 49.
          selector:
            containsChild:
              textRegex: Swipe
          nodeSelector:
            androidAccessibility:
              classNameRegex: \Qandroid.view.View\E
              collectionItemRowIndex: 0
              collectionItemColumnIndex: 3
  - step: Swipe forward to page 3, then swipe back to page 2
    recording:
      tools:
      - swipe:
          direction: LEFT
      - swipe:
          direction: LEFT
      - swipe:
          direction: RIGHT
  - step: Verify "Page 2 of 5" is displayed
    recording:
      tools:
      - assertVisibleBySelector:
          reason: The current objective is to verify that 'Page 2 of 5' is displayed. Node 9 is a TextView containing 'Page 2 of 5', making it the correct element to check for visibility.
          selector:
            textRegex: Page 2 of 5
          nodeSelector:
            androidAccessibility:
              textRegex: Page 2 of 5
