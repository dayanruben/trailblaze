config:
  id: sample-app/catalog/conditional-item
  target: xyz.block.trailblaze.examples.sampleapp
  devices:
    android-phone: ANDROID_ONDEVICE_ACCESSIBILITY

trailhead:
  step: Launch the sample app
  recording:
    android-phone:
      launchApp:
        appId: xyz.block.trailblaze.examples.sampleapp

trail:
  - step: "Navigate to the \"Catalog\" tab"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Navigate to the Catalog tab by tapping the Catalog navigation item.
            nodeSelector:
              androidAccessibility:
                textRegex: Catalog

  - verify: "\"Pumpkin Spice\" is not visible on the screen"

  - step: "Tap \"Show seasonal\" to reveal seasonal items"
    recording:
      android-phone:
        - tapOnElementBySelector:
            reason: Tap the "Show seasonal" filter chip to reveal seasonal items.
            nodeSelector:
              androidAccessibility:
                textRegex: Show seasonal

  - step: "Verify \"Pumpkin Spice\" is now visible and tap it"
    recording:
      android-phone:
        - assertVisibleBySelector:
            reason: Verify that "Pumpkin Spice" is now visible after enabling the seasonal filter.
            nodeSelector:
              androidAccessibility:
                textRegex: Pumpkin Spice
        - tapOnElementBySelector:
            reason: Tap on the "Pumpkin Spice" item row to open its detail dialog.
            nodeSelector:
              androidAccessibility:
                textRegex: Pumpkin Spice

  - verify: "A dialog showing \"Pumpkin Spice\" is visible"
    recording:
      android-phone:
        - assertVisibleBySelector:
            reason: Verify the item detail dialog is showing "Pumpkin Spice".
            nodeSelector:
              androidAccessibility:
                textRegex: Pumpkin Spice
