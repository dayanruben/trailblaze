# Demonstrates waiting for a screen that loads with a variable delay.
#
# The "Loading" tab swaps a spinner for a "Content Loaded" result after a delay you pick (1s / 3s /
# 6s). The trail passes regardless of which delay is selected because it waits for the result to
# *appear* rather than sleeping a fixed amount of time — the event-driven "wait until visible"
# pattern a real app's launch flow uses to wait for a screen to render after a cold start.
#
# The recorded per-driver variants (trails/android-ondevice-*/loading/wait-for-content.trail.yaml)
# perform the wait with the built-in `findMatches` / `maestro extendedWaitUntil` primitives. The
# `sampleapp_waitForText` scripted tool (trails/config/trailmaps/sampleapp/tools/) shows how to wrap
# those same primitives into a reusable, driver-aware tool — see the config README for the full story.
config:
  id: sample-app/loading/wait-for-content
  target: xyz.block.trailblaze.examples.sampleapp

trailhead:
  step: Launch the sample app
  recording:
    android:
      launchApp:
        appId: xyz.block.trailblaze.examples.sampleapp
        launchMode: REINSTALL

trail:
  - step: Navigate to the "Loading" tab
  - step: Tap "Start Loading" to begin loading the content
  - step: Wait for the content to finish loading and verify "Content Loaded" is visible
  - verify: '"Content Loaded" is visible on the screen'
