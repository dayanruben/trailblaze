# No LLM required — every tool call is pinned. Proves that the subprocess MCP server
# (../../trailblaze-config/mcp/tools.ts) is spawned at session start, its tools get
# registered into the session's tool repo, and direct dispatch round-trips through
# the subprocess.
- config:
    id: "sampleapp/mcp-tools-demo"
    target: sampleapp
- tools:
    - generateTestUser: {}
    - currentEpochMillis: {}
