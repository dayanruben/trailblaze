# No LLM required — every tool call is pinned. Proves that the subprocess MCP server
# (../../config/mcp/tools.ts) is spawned at session start, its tools get
# registered into the session's tool repo, and direct dispatch round-trips through
# the subprocess.
config:
  id: "sampleapp/mcp-tools-demo"
  target: sampleapp

trail:
  - step: Generate a test user and capture the current time
    recording:
      android:
        - generateTestUser: {}
        - currentEpochMillis: {}
