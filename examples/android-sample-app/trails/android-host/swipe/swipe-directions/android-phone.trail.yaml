- config:
    id: sample-app/swipe/swipe-directions
    app: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_HOST
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
      launchMode: REINSTALL
- prompts:
  - step: Navigate to the "Swipe" tab and verify "Page 1 of 5" is shown
    recording:
      tools:
      - tapOnElementBySelector:
          reason: To navigate to the 'Swipe' tab as instructed in the objective.
          selector:
            textRegex: Swipe
      - assertVisibleBySelector:
          reason: To verify that the text 'Page 1 of 5' is visible, fulfilling the
            objective requirement to confirm the current page in the 'Swipe' tab.
          selector:
            textRegex: Page 1 of 5
  - step: Swipe forward to page 3, then swipe back to page 2
    recording:
      tools:
      - swipe:
          direction: LEFT
      - swipe:
          direction: LEFT
      - swipe:
          direction: RIGHT
  - step: Verify "Page 2 of 5" is displayed
    recording:
      tools:
      - assertVisibleBySelector:
          reason: The objective is to verify that 'Page 2 of 5' is displayed, and
            node 38 is the TextView containing this text.
          selector:
            textRegex: Page 2 of 5
