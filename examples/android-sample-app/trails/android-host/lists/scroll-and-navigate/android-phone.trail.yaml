- config:
    id: sample-app/lists/scroll-and-navigate
    app: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_HOST
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
      launchMode: REINSTALL
- prompts:
  - step: Navigate to the "Lists" tab
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The objective is to navigate to the "Lists" tab, and the node with
            the text "Lists" is the corresponding tab button.
          selector:
            containsChild:
              textRegex: Lists
  - step: Scroll down to "Item 25" and tap it
    recording:
      tools:
      - scrollUntilTextIsVisible:
          text: Item 25
      - tapOnElementBySelector:
          reason: '"Item 25" is visible and clickable, matching the objective to tap
            it.'
          selector:
            textRegex: Item 25
  - step: Verify "Detail for Item 25" is shown, then go back to the list
    recording:
      tools:
      - assertVisibleBySelector:
          reason: To verify that the 'Detail for Item 25' text is visible, confirming
            the detail screen is displayed.
          selector:
            textRegex: Detail for Item 25
      - tapOnElementBySelector:
          reason: To navigate back to the list after verifying the detail view for
            Item 25, using the back navigation icon at the top left, which is standard
            for returning to the previous screen in Android apps.
          selector:
            textRegex: Back
  - step: Scroll down to "Item 50" and verify it is visible
    recording:
      tools:
      - scrollUntilTextIsVisible:
          text: Item 50
      - assertVisibleBySelector:
          reason: Item 50 is now visible in the scrollable list and needs to be verified
            per the objective.
          selector:
            textRegex: Item 50
