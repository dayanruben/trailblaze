- config:
    id: sample-app/taps/tap-interactions
    app: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_HOST
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
- prompts:
  - step: Tap the "Tap Me" button 3 times and verify the tap count shows 3
    recording:
      tools:
      - tapOnElementBySelector:
          reason: Begin the process by tapping the 'Tap Me' button as required by the task. This will be the first tap out of three.
          selector:
            containsChild:
              textRegex: Tap Me
      - tapOnElementBySelector:
          reason: Tap the 'Tap Me' button a second time. We need 3 taps to fulfill the objective. The nodeId 40 is the button.
          selector:
            containsChild:
              textRegex: Tap Me
      - tapOnElementBySelector:
          reason: Tap the 'Tap Me' button for the third and final time to reach a tap count of 3 as required by the objective.
          selector:
            containsChild:
              textRegex: Tap Me
      - assertVisibleBySelector:
          reason: 'The objective requires verifying that after tapping the ''Tap Me'' button 3 times, the tap count shows 3. Node 50 is the ''Tap Count: 3'' display.'
          selector:
            textRegex: 'Tap Count: 3'
  - step: Verify a button labeled "Now Enabled!" is visible and enabled
    recording:
      tools:
      - assertVisibleBySelector:
          reason: The button labeled 'Now Enabled!' is on nodeId 51 and is clickable, indicating that it is visible and enabled.
          selector:
            containsChild:
              textRegex: Now Enabled!
  - step: Tap the button with accessibility description "accessibility_tap_button"
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The button with the accessibility description 'accessibility_tap_button' corresponds to node 44 based on the view hierarchy.
          selector:
            textRegex: accessibility_tap_button
  - step: Long press "Long Press Me", then dismiss the dialog by tapping "Copy"
    recording:
      tools:
      - tapOnElementBySelector:
          reason: To trigger the long press dialog, I need to long press on the 'Long Press Me' button as the first step of the objective.
          selector:
            containsChild:
              textRegex: Long Press Me
          longPress: true
      - tapOnElementBySelector:
          reason: To dismiss the dialog as required, I need to tap the 'Copy' button that appeared after the long press.
          selector:
            containsChild:
              textRegex: Copy
  - step: Tap "Toggle A" and verify it is selected
    recording:
      tools:
      - tapOnElementBySelector:
          reason: '"Toggle A" needs to be tapped as part of the objective. The textView with "Toggle A" is child of nodeId 54 (clickable).'
          selector:
            containsChild:
              textRegex: Toggle A
      - assertVisibleBySelector:
          reason: The objective requires verifying that "Toggle A" is selected. The view with nodeId 54 is both clickable and marked as 'checked', indicating a selected state after the tap.
          selector:
            checked: true
  - step: Tap the "Nested Button" inside the parent container
    recording:
      tools:
      - tapOnPoint:
          x: 188
          y: 997
          reasoning: This clickable View is located directly beneath the 'Parent Container' label, fitting the description of the nested button inside the container.
