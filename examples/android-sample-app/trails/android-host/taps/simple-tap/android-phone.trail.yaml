- config:
    id: sample-app/taps/simple-tap
    app: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_HOST
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
      launchMode: REINSTALL
- prompts:
  - step: Tap the "Tap Me" button once
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The objective is to tap the 'Tap Me' button, which is associated
            with nodeId 13 based on its placement and label in the hierarchy.
          selector:
            containsChild:
              textRegex: Tap Me
