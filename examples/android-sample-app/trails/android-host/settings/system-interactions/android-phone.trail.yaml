- config:
    id: sample-app/settings/system-interactions
    app: xyz.block.trailblaze.examples.sampleapp
    platform: android
    driver: ANDROID_HOST
- tools:
  - launchApp:
      appId: xyz.block.trailblaze.examples.sampleapp
- prompts:
  - step: Navigate to the "Settings" tab
    recording:
      tools:
      - tapOnElementBySelector:
          reason: The user wants to navigate to the 'Settings' tab, which is represented by the clickable element with the text 'Settings'.
          selector:
            containsChild:
              textRegex: Settings
  - step: Enable the "Enable Notifications" switch and verify it is checked
    recording:
      tools:
      - tapOnElementBySelector:
          reason: To enable notifications, I need to tap the toggle switch next to 'Enable Notifications'. The clickable 'View' (node 12) is likely the toggle.
          selector:
            containsChild:
              textRegex: Enable Notifications
      - assertVisibleBySelector:
          reason: To verify the 'Enable Notifications' switch is enabled, I will check that the associated switch element (node 12) is checked.
          selector:
            checked: true
  - step: Verify the network status shows "Online" or "Offline" and an app version starting with "Version" is visible
    recording:
      tools:
      - assertVisibleBySelector:
          reason: Verifying that the network status shows 'Online' or 'Offline' is visible.
          selector:
            textRegex: (Online|Offline)
      - assertVisibleBySelector:
          reason: Verifying that the network status 'Online' is visible.
          selector:
            textRegex: (Online|Offline)
      - assertVisibleBySelector:
          reason: Checking that the network status shows 'Online' is visible.
          selector:
            textRegex: (Online|Offline)
  - step: Check the "Accept Terms" checkbox and verify it is checked
    recording:
      tools:
      - tapOnElementBySelector:
          reason: To check the 'Accept Terms' checkbox as required by the objective.
          selector:
            containsChild:
              textRegex: Accept Terms
