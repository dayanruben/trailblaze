<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search with Duplicate Results</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #1a1a1a; }
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .search-bar input {
      flex: 1; padding: 10px 14px; font-size: 1em;
      border: 2px solid #ddd; border-radius: 8px;
    }
    .search-bar input:focus { border-color: #0066cc; outline: none; }
    .search-bar button {
      background: #0066cc; color: white; border: none;
      padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1em;
    }
    .search-bar button:hover { background: #0052a3; }
    .result-count { color: #666; margin-bottom: 12px; }
    .result-item {
      display: block; width: 100%; text-align: left; background: white;
      border: 1px solid #ddd; border-radius: 8px; padding: 14px;
      margin-bottom: 10px; cursor: pointer; transition: background 0.15s;
      font-family: inherit; font-size: inherit;
    }
    .result-item:hover { background: #f5f5f5; }
    .result-item:focus { outline: 2px solid #0066cc; outline-offset: 2px; }
    .result-item .result-title { font-weight: 600; font-size: 1.1em; }
    .result-item .result-subtitle { color: #666; font-size: 0.9em; margin-top: 4px; }
    .result-item .result-price { color: #0066cc; font-weight: 600; margin-top: 4px; }
    #detail-view {
      margin-top: 20px; padding: 16px; background: #e8f5e9;
      border-radius: 8px; display: none;
    }
    #detail-view.visible { display: block; }
    .no-results { color: #999; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <h1>Product Search</h1>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search products..." aria-label="Search products">
    <button id="search-btn" onclick="doSearch()">Search</button>
  </div>

  <div id="result-count" class="result-count"></div>
  <div id="results-list" role="list" aria-label="Search results"></div>

  <div id="detail-view">
    <strong>Viewing:</strong>
    <span id="detail-title"></span> —
    <span id="detail-subtitle"></span>,
    <span id="detail-price"></span>
    (ID: <span id="detail-id"></span>)
  </div>

  <script>
    const products = [
      { id: 1, title: "Wireless Mouse", subtitle: "Bluetooth, Black", price: "$29.99" },
      { id: 2, title: "Wireless Mouse", subtitle: "Bluetooth, White", price: "$29.99" },
      { id: 3, title: "Wireless Mouse", subtitle: "USB-A, Black", price: "$19.99" },
      { id: 4, title: "Wireless Mouse", subtitle: "USB-C, Gray", price: "$34.99" },
      { id: 5, title: "Keyboard", subtitle: "Mechanical, Full-size", price: "$89.99" },
      { id: 6, title: "Keyboard", subtitle: "Membrane, Compact", price: "$39.99" },
      { id: 7, title: "Keyboard", subtitle: "Mechanical, Compact", price: "$79.99" },
      { id: 8, title: "Monitor Stand", subtitle: "Aluminum, Single", price: "$49.99" },
      { id: 9, title: "Monitor Stand", subtitle: "Aluminum, Dual", price: "$79.99" },
      { id: 10, title: "Monitor Stand", subtitle: "Wood, Single", price: "$59.99" },
      { id: 11, title: "USB Hub", subtitle: "4-port, USB-A", price: "$14.99" },
      { id: 12, title: "USB Hub", subtitle: "7-port, USB-C", price: "$29.99" },
      { id: 13, title: "Desk Lamp", subtitle: "LED, Adjustable", price: "$44.99" },
      { id: 14, title: "Desk Lamp", subtitle: "LED, Clip-on", price: "$24.99" },
    ];

    // Show all products on load
    renderResults(products);

    function doSearch() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      if (!query) {
        renderResults(products);
        return;
      }
      const filtered = products.filter(p =>
        p.title.toLowerCase().includes(query) ||
        p.subtitle.toLowerCase().includes(query)
      );
      renderResults(filtered, query);
    }

    // Also search on Enter key
    document.getElementById('search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    function renderResults(items, query) {
      const list = document.getElementById('results-list');
      const countEl = document.getElementById('result-count');

      if (items.length === 0) {
        list.innerHTML = '<div class="no-results">No results found.</div>';
        countEl.textContent = '0 results';
        return;
      }

      countEl.textContent = query
        ? `${items.length} result${items.length !== 1 ? 's' : ''} for "${query}"`
        : `${items.length} products`;

      list.innerHTML = items.map(item => `
        <button class="result-item" role="listitem" data-id="${item.id}"
                aria-label="${item.title} - ${item.subtitle} - ${item.price}"
                onclick="selectResult(${item.id})">
          <div class="result-title">${item.title}</div>
          <div class="result-subtitle">${item.subtitle}</div>
          <div class="result-price">${item.price}</div>
        </button>
      `).join('');
    }

    function selectResult(id) {
      const item = products.find(p => p.id === id);
      if (!item) return;
      document.getElementById('detail-title').textContent = item.title;
      document.getElementById('detail-subtitle').textContent = item.subtitle;
      document.getElementById('detail-price').textContent = item.price;
      document.getElementById('detail-id').textContent = item.id;
      document.getElementById('detail-view').classList.add('visible');
    }
  </script>
</body>
</html>
