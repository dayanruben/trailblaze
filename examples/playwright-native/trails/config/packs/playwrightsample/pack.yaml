# Authored pack for the Playwright Sample example. Replaces the legacy flat target at
# ../../targets/playwright-sample.yaml — this workspace is now pack-driven via the
# sibling trailblaze.yaml. Each scripted tool lives in its own file under tools/. The pack
# loader auto-discovers every `<pack>/tools/*.yaml` descriptor into a name-keyed registry,
# decodes each into a PackScriptedToolFile, wraps its flat inputSchema into a JSON-Schema-
# conformant object, and resolves the names listed below into the runtime tool list.
id: playwrightsample
target:
  display_name: Playwright Sample App
  tools:
    - playwrightSample_web_openFixtureAndVerifyText
    - playwrightSample_web_incrementCounterToValue
    - playwrightSample_web_submitContactForm
    - playwrightSample_web_openFormIfNeeded
    - playwrightSample_web_openDuplicateProductDetail
    - playwrightSample_web_searchProductsAndOpenResult

  platforms:
    web:
      drivers: [playwright-native, playwright-electron]
      tool_sets:
        - web_core
        - web_verification
        - memory
