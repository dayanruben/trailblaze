# Authored trailmap for the iOS Contacts example. Demonstrates a mobile target that drives
# the iOS system Contacts app via the host driver, using a small set of scripted tools
# that wrap common Contacts interactions (open contact, search, create, delete, verify
# contact shape). Each scripted tool is a bare `<name>.ts` under `tools/` whose
# `trailblaze.tool<I>(spec, handler)` export carries name, input schema, and metadata.
# No sibling YAML descriptor is needed — the trailmap loader auto-discovers every `.ts`
# in `tools/` that exports a typed tool and resolves the names listed below into the
# runtime tool list. (An optional `<name>.yaml` is still supported when an author needs
# to pin a descriptor field or declare a multi-tool file.)
#
# Trailmap id is `contacts` so the same trailmap can later host Android / web tools alongside
# the iOS ones already wired here. This shadows the bundled framework `contacts` trailmap
# within this example workspace per the trailmap-id collision rule — fine here, since the
# example is only meant to demonstrate Contacts-app testing in this workspace.
id: contacts
target:
  display_name: Contacts
  # Target-scoped system prompt that nudges the LLM toward the contacts_ios_*
  # scripted tools when a natural-language step matches a known task pattern
  # ("search Contacts for X" → contacts_ios_searchContacts, etc.). Without this,
  # the agent tends to inline-expand to generic interaction primitives even when
  # the scripted-tool descriptions advertise themselves as the right choice. The
  # file lives next to this trailmap.yaml and is inlined at trailmap-load time.
  system_prompt_file: contacts-ios-system-prompt.md
  tools:
    # --- Trailheads: deterministic starting points -------------------------------
    - contacts_ios_openApp
    - contacts_ios_openContact
    # --- Feature tools -----------------------------------------------------------
    - contacts_ios_dismissKeyboardIfPresent
    - contacts_ios_searchContacts
    - contacts_ios_createContact
    - contacts_ios_deleteContact
    - contacts_ios_verifyContactStructure
    - contacts_ios_addPhoneNumber
    # --- Composition example: a scripted tool that delegates to other -----------
    # --- scripted tools in the same trailmap via `client.tools.<name>(args)`. -------
    - contacts_ios_searchAndVerify

  platforms:
    ios:
      app_ids:
        - com.apple.MobileAddressBook
      drivers: [ios-host]
      tool_sets:
        - core_interaction
        - navigation
        - verification
        - observation
      excluded_tools:
        - tapOnPoint
