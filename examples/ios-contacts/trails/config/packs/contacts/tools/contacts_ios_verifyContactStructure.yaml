script: ./contacts_ios_verifyContactStructure.ts
name: contacts_ios_verifyContactStructure
description: |
  Verify the currently-open iOS contact detail screen conforms to an expected
  shape — name heading visible, plus an optional list of required field
  labels ("phone", "email", "home", etc.). Use this whenever the task is to
  confirm a contact rendered correctly, check a contact has certain fields,
  or assert a contact's shape. Pass an empty `requireFields` list for a
  lightweight "did the detail screen render?" check.
_meta:
  trailblaze/supportedPlatforms: [ios]
  trailblaze/requiresContext: true
inputSchema:
  name:
    type: string
    description: Contact name to assert in the navbar / heading (e.g. "John Appleseed").
    required: false
  requireFields:
    type: array
    description: |
      Optional list of field labels the contact must surface. Each entry is
      interpreted as a regex against accessibility text (case-sensitive by
      default — wrap with `(?i)` for case-insensitive). Pass an empty list to
      skip field assertions.
    items:
      type: string
    required: false
