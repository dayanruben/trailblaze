script: ./contacts_ios_createContact.ts
name: contacts_ios_createContact
description: |
  Create a brand-new contact in the iOS Contacts app. Use this whenever the
  task is to add a contact, create a contact, save a new person, or otherwise
  populate the contacts list with someone new. Opens the new-contact draft,
  types first + last name (and optionally a phone number), and saves. Verifies
  the save round-trip completed by asserting the contact's full name is
  visible on the post-save detail screen iOS navigates to.
_meta:
  trailblaze/supportedPlatforms: [ios]
  trailblaze/requiresContext: true
inputSchema:
  firstName:
    type: string
    description: First name to type into the First Name field.
    required: false
  lastName:
    type: string
    description: Last name to type into the Last Name field.
    required: false
  phoneNumber:
    type: string
    description: Phone number to type. When omitted or empty, no phone is added. Formatting (spaces, dashes, parens) is preserved verbatim.
    required: false
