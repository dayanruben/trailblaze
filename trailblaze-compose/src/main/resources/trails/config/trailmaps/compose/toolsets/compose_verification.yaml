# Compose Desktop assertion tools.
id: compose_verification
description: "Verify text and elements are visible in Compose Desktop UI."
drivers:
  - compose
tools:
  - compose_verify_text_visible
  - compose_verify_element_visible
  # Generic, driver-agnostic verification primitive (host-backed): assert the UI reached a named
  # waypoint. Resolves against the same registry/matcher every driver uses.
  - assertWaypoint
