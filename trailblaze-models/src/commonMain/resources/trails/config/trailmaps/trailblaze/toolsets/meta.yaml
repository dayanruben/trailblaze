# Framework meta tools — always enabled regardless of which other toolsets are active.
# - setActiveToolSets: lets the LLM toggle which toolsets are live.
# - objectiveStatus: lets the LLM declare a step complete or failed.
id: meta
description: "Framework meta tools for toolset control and objective reporting."
always_enabled: true
tools:
  - setActiveToolSets
  - objectiveStatus
