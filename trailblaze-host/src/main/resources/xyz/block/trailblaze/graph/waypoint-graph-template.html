<body>
  <div id="root">
    <div class="empty-state"><p>Loading…</p></div>
  </div>

  <!-- Graph data is inlined as a JSON literal. The Kotlin renderer replaces the
       JSON_DATA_PLACEHOLDER token with a JSON-encoded WaypointGraphData. Strict
       JSON (not JS) so kotlinx.serialization's output drops in unmodified. -->
  <script>
    window.WAYPOINT_GRAPH_DATA = /*JSON_DATA_PLACEHOLDER_BEGIN*/ null /*JSON_DATA_PLACEHOLDER_END*/;
  </script>

  <script type="module">
    import React, { useState, useMemo, useCallback, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ReactFlow, Background, Controls, MiniMap,
      MarkerType, Handle, Position,
      BaseEdge, EdgeLabelRenderer, getSmoothStepPath, getStraightPath,
      useInternalNode,
    } from '@xyflow/react';
    import dagre from '@dagrejs/dagre';

    const NODE_WIDTH = 220;
    // Effective height when title runs ~4 lines + screenshot (220×~390 contained)
    // + id label. Used by the layout to reserve vertical space; React Flow
    // measures actual height for routing.
    const NODE_HEIGHT = 470;
    const TRAILHEAD_WIDTH = 260;
    const TRAILHEAD_HEIGHT = 42;
    const TRAILHEAD_NODE_PREFIX = 'trailhead-node::';

    /* ============================================================================
       LABEL HELPERS
       ============================================================================
       Both helpers extract short human-readable labels from the longer YAML
       descriptions. The renderer falls back to the id when extraction fails.
    */
    function shortNodeTitle(description, id) {
      if (!description) return id.split('/').slice(1).join(' / ') || id;
      // Prefer the text up to the first " — " or first sentence, capped at ~50 chars.
      const dash = description.indexOf(' — ');
      const period = description.indexOf('. ');
      let cut = -1;
      if (dash > 0 && (period < 0 || dash < period)) cut = dash;
      else if (period > 0) cut = period;
      let title = cut > 0 ? description.substring(0, cut) : description;
      // Trim leading "<App> Android" / "<App> iOS" prefixes — they're redundant
      // with the id's pack/platform segment shown below the screenshot.
      title = title.replace(/^[A-Z][\w\s]*?\b(?:Android|iOS|Web)\b[,\s]*/i, '').trim();
      title = title.replace(/^[A-Z][a-z]+ App\b[,\s]*/i, '').trim();
      title = title.replace(/^,\s+/, '').replace(/^—\s+/, '');
      if (title.length > 56) title = title.substring(0, 53).trim() + '…';
      // Capitalize first letter for readability.
      return title.charAt(0).toUpperCase() + title.slice(1);
    }

    /* ============================================================================
       MATCHER RULE RENDERING
       ============================================================================
       The required[] / forbidden[] entries on a WaypointDefinition each carry a
       human description and a TrailblazeNodeSelector — a kitchen-sink shape with
       optional fields per driver (androidAccessibility, iosAxe, web, etc.) plus
       spatial relationship pieces. The detail panel renders each entry as a
       short summary with a collapsible YAML-ish dump of just the populated
       sub-fields, so the user can see "what does the matcher actually look at."
    */
    function selectorSummary(selector) {
      if (!selector || typeof selector !== 'object') return null;
      // Pick the driver-specific sub-object that's populated. Listed in priority
      // so the most informative one wins on the rare entry that sets multiple.
      const drivers = ['androidAccessibility', 'androidMaestro', 'compose', 'iosAxe', 'iosMaestro', 'web'];
      for (const d of drivers) {
        if (selector[d] && typeof selector[d] === 'object') {
          const fields = Object.entries(selector[d])
            .filter(([_, v]) => v !== null && v !== undefined && v !== '')
            .map(([k, v]) => k + '=' + (typeof v === 'object' ? JSON.stringify(v) : v))
            .join(', ');
          return d + ' { ' + fields + ' }';
        }
      }
      return null;
    }

    function selectorYaml(selector) {
      // Prune null/empty fields recursively so the dump shows only the
      // fields that actually contribute to the match.
      function prune(v) {
        if (v === null || v === undefined || v === '') return undefined;
        if (Array.isArray(v)) {
          const filtered = v.map(prune).filter(x => x !== undefined);
          return filtered.length ? filtered : undefined;
        }
        if (typeof v === 'object') {
          const out = {};
          let any = false;
          for (const [k, val] of Object.entries(v)) {
            const p = prune(val);
            if (p !== undefined) { out[k] = p; any = true; }
          }
          return any ? out : undefined;
        }
        return v;
      }
      const pruned = prune(selector) || {};
      return JSON.stringify(pruned, null, 2);
    }

    function renderMatcherEntry(entry, key, isForbidden) {
      const summary = selectorSummary(entry.selector);
      const yaml = selectorYaml(entry.selector);
      return React.createElement('div', {
        key: 'm-' + key,
        className: 'matcher-entry' + (isForbidden ? ' forbidden' : ''),
      },
        React.createElement('span', { className: 'matcher-marker' }, isForbidden ? '✕' : '✓'),
        entry.description
          ? React.createElement('span', { className: 'matcher-desc' }, entry.description)
          : React.createElement('span', { className: 'matcher-desc matcher-fallback' }, summary || '(unnamed selector)'),
        entry.minCount && entry.minCount !== 1
          ? React.createElement('div', { className: 'matcher-meta' }, 'minCount: ' + entry.minCount)
          : null,
        React.createElement('details', null,
          React.createElement('summary', null, summary || 'show selector'),
          React.createElement('pre', null, yaml),
        ),
      );
    }

    function shortEdgeAction(description, fromId, toId) {
      if (description) {
        // Try "tap [the] X button|tab|row|link|card|cell"
        const m = description.match(/(tap|swipe|click|press|enter|fill|scroll|long[\- ]press|drag)\s+(?:on\s+)?(?:the\s+)?([\w'+\-]+(?:\s+[\w'+\-]+){0,3}?)\s+(?:button|tab|row|link|card|cell|icon|chip|pill|fab|sheet)\b/i);
        if (m) {
          const verb = m[1].toLowerCase();
          const obj = m[2];
          return verb + ' ' + obj;
        }
        // Try "tap [the] X" up to next punctuation/preposition
        const m2 = description.match(/(tap|swipe|click|press)\s+(?:on\s+)?(?:the\s+)?([\w'+\-]+(?:\s+[\w'+\-]+){0,2})/i);
        if (m2) return m2[1].toLowerCase() + ' ' + m2[2];
      }
      // Fall back: derive from the to-id's last segment
      const toLeaf = toId.split('/').pop();
      return '→ ' + toLeaf;
    }

    /* ============================================================================
       JOURNEY DERIVATION
       ============================================================================
       We don't (yet) carry trail data through to the graph view, so we derive
       "user journeys" from the (trailhead, shortcut) graph itself: BFS from each
       trailhead, then pick interesting (trailhead → reachable-waypoint) pairs
       and reconstruct a path of length 1–4 between them. Each pair becomes one
       journey card.

       This deliberately mirrors what trail YAMLs would produce when piped through
       — once trail data lands, swap derivation for the real thing without
       touching the rendering layer.
    */
    function bfsFromTrailhead(trailheadId, startWaypointId, shortcuts, waypointIds) {
      // shortest-path BFS, returns { waypointId: [pathOfWaypointIds] }
      const adj = new Map();
      shortcuts.forEach(sc => {
        if (!adj.has(sc.from)) adj.set(sc.from, []);
        adj.get(sc.from).push({ to: sc.to, sc });
      });
      const reached = new Map();
      reached.set(startWaypointId, [startWaypointId]);
      const queue = [startWaypointId];
      while (queue.length > 0) {
        const cur = queue.shift();
        const next = adj.get(cur) || [];
        for (const { to } of next) {
          if (reached.has(to)) continue;
          if (!waypointIds.has(to)) continue;
          reached.set(to, [...reached.get(cur), to]);
          queue.push(to);
        }
      }
      return reached;
    }

    function categorizeJourney(path) {
      // Heuristic: pick the badge from the destination's id segments.
      const last = path[path.length - 1] || '';
      const lower = last.toLowerCase();
      if (lower.includes('sign-in') || lower.includes('login') || lower.includes('auth')) return 'AUTH';
      if (lower.includes('pay') || lower.includes('payment') || lower.includes('checkout')) return 'PAYMENT';
      if (lower.includes('search') || lower.includes('find')) return 'SEARCH';
      if (lower.includes('help') || lower.includes('support')) return 'SUPPORT';
      if (lower.includes('legal') || lower.includes('terms') || lower.includes('privacy')) return 'LEGAL';
      if (lower.includes('cancel') || lower.includes('delete')) return 'CANCEL';
      if (lower.includes('profile') || lower.includes('settings') || lower.includes('account')
          || lower.includes('linked-banks') || lower.includes('banking')) return 'ACCOUNT';
      return 'NAVIGATE';
    }

    function deriveJourneys(waypoints, shortcuts, trailheads) {
      // For each (trailhead, reachable-waypoint with depth >= 1) pair, build a
      // journey. Skip the trailhead's direct landing screen (depth 0) since
      // that's a trivial 1-step path. Cap pairs per trailhead to keep the list
      // navigable on a real-world dataset.
      const waypointIds = new Set(waypoints.map(w => w.id));
      const wpById = new Map(waypoints.map(w => [w.id, w]));
      const journeys = [];
      let counter = 1;
      trailheads.forEach(th => {
        if (!waypointIds.has(th.to)) return;
        const reached = bfsFromTrailhead(th.id, th.to, shortcuts, waypointIds);
        // sort destinations by path length (shortest paths first), then by id
        const dests = [...reached.entries()]
          .filter(([id]) => id !== th.to) // skip trivial 1-step "trailhead → its own to"
          .sort((a, b) => a[1].length - b[1].length || a[0].localeCompare(b[0]));
        dests.forEach(([destId, path]) => {
          const dest = wpById.get(destId);
          journeys.push({
            num: counter++,
            id: 'journey::' + th.id + '::' + destId,
            trailheadId: th.id,
            trailheadLabel: th.id,
            destinationId: destId,
            destinationLabel: dest ? (dest.description?.split('.')[0] || dest.id) : destId,
            path,
            screens: path.length,
            category: categorizeJourney(path),
          });
        });
      });
      return journeys;
    }

    /* ============================================================================
       LAYOUT (SCC condensation + BFS-layered + barycentric ordering)
       ============================================================================
       The IA insight: bottom-nav peers in a typical mobile app (the four or
       five top-level tabs every screen can hop between) are mutually reachable
       via tap-a-tab shortcuts. In graph theory terms, they form a strongly-
       connected component (SCC). The user's mental model says these are
       *peers at the same level* — the same row of the layout, not stacked
       across multiple rows just because dagre/BFS picks one as the entry and
       finds the others "one hop away."

       Algorithm:
        1. Compute SCCs over the full forward graph (Tarjan's, no edge filtering).
        2. Condense: each SCC is a single super-node. Inter-SCC edges form a DAG.
        3. BFS-shortest the SCC DAG from entry SCCs (those containing entry
           points) → each SCC gets a depth.
        4. Every waypoint inherits its SCC's depth.
        5. Within each depth row, order nodes by barycentric x (avg parent x
           from upstream SCCs) to minimize crossings.
        6. Trailheads anchor above their targets, X-aligned to target center.

       Result: the bottom-nav cluster becomes a single horizontal row of peers,
       drill-downs flow below as the next layer, deeper drill-downs below those.
    */
    function computeLayout(waypoints, shortcuts, trailheads) {
      const waypointIds = new Set(waypoints.map(w => w.id));
      const entryPoints = new Set();
      trailheads.forEach(th => {
        if (waypointIds.has(th.to)) entryPoints.add(th.to);
      });

      // Full forward adjacency (no filtering — SCCs need every real edge).
      const childrenOf = new Map();
      const parentsOf = new Map();
      waypoints.forEach(wp => {
        childrenOf.set(wp.id, []);
        parentsOf.set(wp.id, []);
      });
      shortcuts.forEach(sc => {
        if (!waypointIds.has(sc.from) || !waypointIds.has(sc.to)) return;
        childrenOf.get(sc.from).push(sc.to);
        parentsOf.get(sc.to).push(sc.from);
      });

      // ---- Tarjan's SCC (iterative, to avoid recursion-depth issues) ----
      const sccs = []; // array of arrays of waypoint ids
      const sccIndex = new Map();
      {
        const ids = new Map();
        const low = new Map();
        const onStack = new Set();
        const tStack = [];
        let counter = 0;
        const callStack = [];
        waypoints.forEach(wp => {
          if (ids.has(wp.id)) return;
          callStack.push({ v: wp.id, phase: 'enter', childIdx: 0, lastChild: null });
          while (callStack.length > 0) {
            const frame = callStack[callStack.length - 1];
            const v = frame.v;
            if (frame.phase === 'enter') {
              ids.set(v, counter); low.set(v, counter); counter++;
              tStack.push(v); onStack.add(v);
              frame.phase = 'loop';
            }
            if (frame.phase === 'returned') {
              low.set(v, Math.min(low.get(v), low.get(frame.lastChild)));
              frame.phase = 'loop';
            }
            const kids = childrenOf.get(v);
            let recursed = false;
            while (frame.childIdx < kids.length && !recursed) {
              const w = kids[frame.childIdx++];
              if (!ids.has(w)) {
                frame.lastChild = w;
                frame.phase = 'returned';
                callStack.push({ v: w, phase: 'enter', childIdx: 0, lastChild: null });
                recursed = true;
              } else if (onStack.has(w)) {
                low.set(v, Math.min(low.get(v), ids.get(w)));
              }
            }
            if (!recursed) {
              if (low.get(v) === ids.get(v)) {
                const scc = [];
                let w;
                do { w = tStack.pop(); onStack.delete(w); scc.push(w); } while (w !== v);
                const sccI = sccs.length;
                sccs.push(scc);
                scc.forEach(id => sccIndex.set(id, sccI));
              }
              callStack.pop();
            }
          }
        });
      }

      // ---- Condensation graph (SCC i → SCC j if any forward edge crosses) ----
      const sccChildren = new Map();
      sccs.forEach((_, i) => sccChildren.set(i, new Set()));
      shortcuts.forEach(sc => {
        if (!waypointIds.has(sc.from) || !waypointIds.has(sc.to)) return;
        const i = sccIndex.get(sc.from);
        const j = sccIndex.get(sc.to);
        if (i !== j) sccChildren.get(i).add(j);
      });

      // ---- Entry SCCs: those containing at least one trailhead target ----
      const entrySCCs = new Set();
      entryPoints.forEach(ep => {
        if (sccIndex.has(ep)) entrySCCs.add(sccIndex.get(ep));
      });

      // ---- BFS-shortest in condensation graph to assign SCC depths ----
      const sccDepth = new Map();
      const bfsQueue = [];
      entrySCCs.forEach(i => { sccDepth.set(i, 0); bfsQueue.push(i); });
      while (bfsQueue.length > 0) {
        const cur = bfsQueue.shift();
        const curDepth = sccDepth.get(cur);
        sccChildren.get(cur).forEach(next => {
          if (sccDepth.has(next)) return;
          sccDepth.set(next, curDepth + 1);
          bfsQueue.push(next);
        });
      }
      // Orphan SCCs (not reachable from any entry) at depth 0
      sccs.forEach((_, i) => { if (!sccDepth.has(i)) sccDepth.set(i, 0); });

      // ---- Each waypoint inherits its SCC's depth ----
      const depth = new Map();
      waypoints.forEach(wp => {
        depth.set(wp.id, sccDepth.get(sccIndex.get(wp.id)));
      });

      // Group by depth
      const byDepth = new Map();
      depth.forEach((d, id) => {
        if (!byDepth.has(d)) byDepth.set(d, []);
        byDepth.get(d).push(id);
      });
      const maxDepth = Math.max(...byDepth.keys(), 0);

      // Within-rank ordering: barycentric. Initialize depth 0 alphabetically
      // (peers within the same SCC slot in next to each other since they share
      // a pack-id prefix). For each subsequent depth, sort by avg position of
      // *upstream* parents only — within-SCC same-depth parents are filtered
      // out so they don't muddy the heuristic.
      const orderIndex = new Map();
      // Cluster depth 0 by SCC so SCC members sit together in the row.
      const dZero = (byDepth.get(0) || []).slice().sort((a, b) => {
        const sa = sccIndex.get(a), sb = sccIndex.get(b);
        return sa - sb || a.localeCompare(b);
      });
      dZero.forEach((id, i) => orderIndex.set(id, i));
      byDepth.set(0, dZero);
      for (let d = 1; d <= maxDepth; d++) {
        const inRank = (byDepth.get(d) || []).slice();
        inRank.sort((a, b) => {
          const aDepth = depth.get(a);
          const aParents = parentsOf.get(a)
            .filter(p => depth.get(p) < aDepth)         // upstream only
            .map(p => orderIndex.get(p))
            .filter(x => x !== undefined);
          const bDepth = depth.get(b);
          const bParents = parentsOf.get(b)
            .filter(p => depth.get(p) < bDepth)
            .map(p => orderIndex.get(p))
            .filter(x => x !== undefined);
          const aBary = aParents.length ? aParents.reduce((s, x) => s + x, 0) / aParents.length : 0;
          const bBary = bParents.length ? bParents.reduce((s, x) => s + x, 0) / bParents.length : 0;
          // Tie-break: same SCC → cluster together; then alphabetical.
          if (aBary !== bBary) return aBary - bBary;
          const sa = sccIndex.get(a), sb = sccIndex.get(b);
          if (sa !== sb) return sa - sb;
          return a.localeCompare(b);
        });
        inRank.forEach((id, i) => orderIndex.set(id, i));
        byDepth.set(d, inRank);
      }

      // Final pixel positions. Each rank's row is centered horizontally
      // around x=0; rows stack downward.
      // RANKSEP is the vertical gap between depth rows. Generous now (260)
      // because: (1) titles aren't line-clamped anymore so nodes can be ~470px
      // tall, (2) edge labels need a clear band between rows to read, and
      // (3) at this depth the smoothstep curves benefit from extra Y to bend
      // gracefully instead of cramping into right-angle hairpins.
      // NODESEP scales with width — wide rows (10+ peer screens) need
      // headroom for edge labels to sit between siblings.
      const RANKSEP = 260;
      const NODESEP = 64;
      const positions = {};
      let y = 80;
      for (let d = 0; d <= maxDepth; d++) {
        const inRank = byDepth.get(d) || [];
        const totalWidth = inRank.length * NODE_WIDTH + Math.max(0, inRank.length - 1) * NODESEP;
        let x = -totalWidth / 2;
        inRank.forEach(id => {
          positions[id] = { x, y };
          x += NODE_WIDTH + NODESEP;
        });
        y += NODE_HEIGHT + RANKSEP;
      }

      // Trailheads above their targets, X-aligned to target center, fanning
      // horizontally if multiple trailheads share a target.
      const targetGroups = new Map();
      trailheads.forEach(th => {
        if (!waypointIds.has(th.to)) return;
        if (!targetGroups.has(th.to)) targetGroups.set(th.to, []);
        targetGroups.get(th.to).push(th);
      });
      const TRAILHEAD_GAP_ABOVE = 44;
      const TRAILHEAD_X_GAP = 18;
      targetGroups.forEach((ths, targetId) => {
        const target = positions[targetId];
        if (!target) return;
        const targetCenterX = target.x + NODE_WIDTH / 2;
        const totalWidth = ths.length * TRAILHEAD_WIDTH + Math.max(0, ths.length - 1) * TRAILHEAD_X_GAP;
        const startX = targetCenterX - totalWidth / 2;
        const yPos = target.y - TRAILHEAD_HEIGHT - TRAILHEAD_GAP_ABOVE;
        ths.forEach((th, i) => {
          const x = startX + i * (TRAILHEAD_WIDTH + TRAILHEAD_X_GAP);
          positions[TRAILHEAD_NODE_PREFIX + th.id] = { x, y: yPos };
        });
      });

      return positions;
    }

    /* ============================================================================
       NODE COMPONENTS
       ============================================================================ */
    function WaypointNode({ data, selected }) {
      const cls = 'waypoint-node' + (selected ? ' selected' : '');
      return React.createElement('div', { className: cls, title: data.sourceLabel || data.label },
        React.createElement(Handle, {
          type: 'target', position: Position.Top, isConnectable: false,
          style: { opacity: 0, top: 0 },
        }),
        // Title strip — short human-readable name, derived from the description.
        // Falls back to the id-leaf when description is missing.
        React.createElement('div', { className: 'waypoint-title' }, data.title),
        data.screenshotDataUri
          ? React.createElement('img', { src: data.screenshotDataUri, className: 'waypoint-screenshot', alt: data.label })
          : React.createElement('div', { className: 'waypoint-no-screenshot' }, '(no screenshot)'),
        React.createElement('div', { className: 'waypoint-label' }, data.label),
        React.createElement(Handle, {
          type: 'source', position: Position.Bottom, isConnectable: false,
          style: { opacity: 0, bottom: 0 },
        }),
      );
    }

    function TrailheadNode({ data }) {
      return React.createElement('div', { title: data.description || data.label },
        React.createElement('div', { className: 'trailhead-node' },
          React.createElement('span', { className: 'trailhead-icon' }, '✈'),
          data.label,
        ),
        React.createElement(Handle, {
          type: 'source', position: Position.Bottom, isConnectable: false,
          style: { opacity: 0 },
        }),
      );
    }

    const nodeTypes = { waypoint: WaypointNode, trailhead: TrailheadNode };

    /* ============================================================================
       CUSTOM EDGE — staggered HTML labels + class for focus dimming
       ============================================================================
       Why custom: React Flow's built-in smoothstep edge centers its label at
       the path midpoint as an SVG `<text>`. When many edges leave the same
       source going down to a row of children, all those midpoints land at
       roughly the same Y, producing the stack-of-labels overlap the user
       reported ("press a contact in / tap a contact name / tap Back / tap +"
       all clobbering each other on one horizontal line).

       Fix: render the label as an HTML chip via EdgeLabelRenderer, and shift
       it by `data.labelOffsetY` so siblings stagger vertically. The offset is
       computed in the edges memo below as `index_within_source_group * 18 px`
       centered around 0. With 5 siblings that's labels at y∈{-36,-18,0,18,36}
       relative to the path midpoint — readable at default zoom, and the
       clamp keeps things from flying off when one source has 30 children.
    */
    /** Center + size of an internal-node, with sensible fallbacks for the
        first render before React Flow has measured the DOM box. */
    function getNodeBox(node) {
      const w = (node && node.measured && node.measured.width)
        || (node && node.width) || NODE_WIDTH;
      const h = (node && node.measured && node.measured.height)
        || (node && node.height) || NODE_HEIGHT;
      const pos = (node && node.internals && node.internals.positionAbsolute)
        || (node && node.position) || { x: 0, y: 0 };
      return {
        x: pos.x, y: pos.y, w, h,
        cx: pos.x + w / 2, cy: pos.y + h / 2,
      };
    }

    /** Where the line from the node's center toward `point` intersects the
        node's rectangular border. Used by the floating-edge path so arrows
        attach to whichever side of the card faces the other endpoint —
        right side for an edge going right, top for one going up, etc. */
    function getRectIntersection(box, point) {
      const dx = point.x - box.cx;
      const dy = point.y - box.cy;
      if (dx === 0 && dy === 0) return { x: box.cx, y: box.cy };
      const halfW = box.w / 2;
      const halfH = box.h / 2;
      const tx = dx === 0 ? Infinity : Math.abs(halfW / dx);
      const ty = dy === 0 ? Infinity : Math.abs(halfH / dy);
      const t = Math.min(tx, ty);
      return { x: box.cx + dx * t, y: box.cy + dy * t };
    }

    function StaggeredEdge(props) {
      const {
        id, source, target, sourceX, sourceY, targetX, targetY,
        sourcePosition, targetPosition,
        markerEnd, style, label, data,
      } = props;
      const useStraight = !!(data && data.straight);
      const useFloating = !!(data && data.floating);
      // Hooks must run unconditionally — useInternalNode returns null
      // when the id isn't found, which we just guard against below.
      const sourceNode = useInternalNode(source);
      const targetNode = useInternalNode(target);

      let sx = sourceX, sy = sourceY, tx = targetX, ty = targetY;
      if (useFloating && sourceNode && targetNode) {
        const sBox = getNodeBox(sourceNode);
        const tBox = getNodeBox(targetNode);
        const sPt = getRectIntersection(sBox, { x: tBox.cx, y: tBox.cy });
        const tPt = getRectIntersection(tBox, { x: sBox.cx, y: sBox.cy });
        sx = sPt.x; sy = sPt.y; tx = tPt.x; ty = tPt.y;
      }

      const [edgePath, midX, midY] = useStraight
        ? getStraightPath({ sourceX: sx, sourceY: sy, targetX: tx, targetY: ty })
        : getSmoothStepPath({
            sourceX: sx, sourceY: sy, targetX: tx, targetY: ty,
            sourcePosition, targetPosition,
          });
      const offsetY = (data && data.labelOffsetY) || 0;
      const offsetX = (data && data.labelOffsetX) || 0;
      const labelClass = data && data.labelClass ? data.labelClass : '';
      const onLabelClick = data && data.onLabelClick;
      const isClickable = typeof onLabelClick === 'function';
      const fullLabelClass = 'edge-label ' + labelClass + (isClickable ? ' clickable' : '');
      return React.createElement(React.Fragment, null,
        React.createElement(BaseEdge, { path: edgePath, markerEnd, style }),
        label
          ? React.createElement(EdgeLabelRenderer, null,
              React.createElement('div', {
                className: fullLabelClass,
                onClick: isClickable
                  ? (e) => { e.stopPropagation(); onLabelClick(); }
                  : undefined,
                style: {
                  transform: `translate(-50%, -50%) translate(${midX + offsetX}px, ${midY + offsetY}px)`,
                  // Re-render decision: nodrag/nopan attrs let users still
                  // pan/scroll when starting on a label; without them, React
                  // Flow eats the gesture.
                },
                'data-nodrag': true,
                'data-nopan': true,
              }, label),
            )
          : null,
      );
    }
    const edgeTypes = { staggered: StaggeredEdge };

    /* ============================================================================
       MAP VIEW
       ============================================================================ */
    function MapView({ filtered, selectedWaypoint, onSelectWaypoint, onInspectShortcut, themeKey }) {
      const positions = useMemo(
        () => computeLayout(filtered.waypoints, filtered.shortcuts, filtered.trailheads),
        [filtered.waypoints, filtered.shortcuts, filtered.trailheads],
      );

      // Compute the focused set: when a waypoint W is selected, light up
      // *every shortest path from any trailhead to W*, plus W's immediate
      // outgoing neighbors. This answers "how could the agent have arrived
      // here?" — the union of routes back to a trailhead — instead of just
      // 1-hop neighbors. Everything outside that union dims out.
      //
      // Algorithm: forward BFS from each trailhead destination, recording
      // the parent of each visited node. If W was reached, walk back through
      // parents to enumerate the shortest path from that trailhead to W and
      // add every node + the corresponding shortcut edges to the focused set.
      // Multiple trailheads → multiple paths → the union shows every shortest
      // way to get there.
      const focusedSet = useMemo(() => {
        if (!selectedWaypoint) return null;
        const nodes = new Set([selectedWaypoint]);
        const edges = new Set(); // 'shortcut::<id>' or 'trailhead::<id>'

        // Build forward adjacency, keyed by source. Each entry holds the
        // outgoing shortcut id alongside the destination so we can identify
        // the exact edge on the path (not just the node pair) — important
        // when two shortcuts connect the same pair of waypoints.
        const forward = new Map();
        filtered.shortcuts.forEach(sc => {
          if (!forward.has(sc.from)) forward.set(sc.from, []);
          forward.get(sc.from).push({ to: sc.to, id: sc.id });
        });

        // For each trailhead's destination, BFS until W is found, then walk
        // the parent chain back to mark every node + edge on the route.
        filtered.trailheads.forEach(th => {
          if (!forward.has(th.to) && th.to !== selectedWaypoint) {
            // Trailhead lands at a waypoint with no outgoing shortcuts and
            // it isn't W — no path to W from here.
            return;
          }
          const parent = new Map(); // childWp -> { from, edgeId }
          parent.set(th.to, null);
          const queue = [th.to];
          let found = th.to === selectedWaypoint;
          while (queue.length && !found) {
            const v = queue.shift();
            const children = forward.get(v) || [];
            for (const c of children) {
              if (parent.has(c.to)) continue;
              parent.set(c.to, { from: v, edgeId: c.id });
              if (c.to === selectedWaypoint) { found = true; break; }
              queue.push(c.to);
            }
          }
          if (!found) return;

          // Walk back from W → trailhead-destination, marking the route.
          let cur = selectedWaypoint;
          while (cur !== null && parent.get(cur) !== null) {
            nodes.add(cur);
            const p = parent.get(cur);
            edges.add('shortcut::' + p.edgeId);
            cur = p.from;
          }
          // Add the trailhead-destination + the trailhead pill itself
          // + the trailhead → destination edge.
          nodes.add(th.to);
          nodes.add(TRAILHEAD_NODE_PREFIX + th.id);
          edges.add('trailhead::' + th.id);
        });

        // Strict path-only focus: nothing else gets added. Off-path edges
        // (including W's own outgoing "next steps") dim with the rest of
        // the graph — the user explicitly asked for label brightness to
        // match the dimmed nodes around them.

        return { nodes, edges };
      }, [selectedWaypoint, filtered.shortcuts, filtered.trailheads]);

      const nodes = useMemo(() => [
        ...filtered.waypoints.map(wp => {
          const dimmed = focusedSet && !focusedSet.nodes.has(wp.id);
          return {
            id: wp.id,
            type: 'waypoint',
            position: positions[wp.id] || { x: 0, y: 0 },
            selected: selectedWaypoint === wp.id,
            className: dimmed ? 'dimmed' : '',
            data: {
              label: wp.id,
              title: shortNodeTitle(wp.description, wp.id),
              screenshotDataUri: wp.screenshotDataUri,
              sourceLabel: wp.sourceLabel,
            },
          };
        }),
        ...filtered.trailheads.map(th => {
          const id = TRAILHEAD_NODE_PREFIX + th.id;
          const dimmed = focusedSet && !focusedSet.nodes.has(id);
          return {
            id,
            type: 'trailhead',
            position: positions[id] || { x: 0, y: 0 },
            data: { label: th.id, description: th.description },
            className: dimmed ? 'dimmed' : '',
            draggable: false, selectable: false,
          };
        }),
      ], [filtered.waypoints, filtered.trailheads, positions, selectedWaypoint, focusedSet]);

      // Compute the entry-point set once for edge classification — same set
      // the layout uses to drop back-edges from dagre input. Here we use it
      // to *style* back-edges differently (faded, dashed) so the user can
      // still see them but they don't compete with the tree backbone.
      const entryPoints = useMemo(
        () => new Set(filtered.trailheads.map(th => th.to)),
        [filtered.trailheads],
      );

      const edges = useMemo(() => {
        // Group shortcuts by source so we can stagger their label Y offsets —
        // each child gets `index * 18 px` shift centered around 0, which
        // unstacks labels that would otherwise pile up at the same midpoint.
        const sourceGroupCount = new Map();
        const sourceGroupIndex = new Map();
        filtered.shortcuts.forEach(sc => {
          sourceGroupCount.set(sc.from, (sourceGroupCount.get(sc.from) || 0) + 1);
        });
        const STAGGER_STEP = 18; // px between sibling labels
        const STAGGER_CAP = 64;  // don't fly off when one source has many children

        return [
          ...filtered.shortcuts.map(sc => {
            const isBack = entryPoints.has(sc.to);
            const idx = sourceGroupIndex.get(sc.from) || 0;
            sourceGroupIndex.set(sc.from, idx + 1);
            const total = sourceGroupCount.get(sc.from) || 1;
            // Center the offset around 0 so siblings spread above and below
            // the path midpoint symmetrically. Clamped at ±STAGGER_CAP.
            let offsetY = (idx - (total - 1) / 2) * STAGGER_STEP;
            if (offsetY > STAGGER_CAP) offsetY = STAGGER_CAP;
            if (offsetY < -STAGGER_CAP) offsetY = -STAGGER_CAP;

            // An edge is focused IFF it's explicitly on the focused-path set
            // (the union of trailhead→W shortest-path edges + W's outgoing
            // 1-hop edges). Endpoint-membership alone is not enough — two
            // focused nodes can sit on different paths through the graph,
            // and an edge between them that's not on those paths should
            // dim with the rest of the off-path graph.
            const edgeKey = 'shortcut::' + sc.id;
            const isFocused = !focusedSet || focusedSet.edges.has(edgeKey);
            const classes = [];
            if (isBack) classes.push('back-edge');
            if (!isFocused) classes.push('dimmed');
            if (focusedSet && isFocused) classes.push('focused');

            // Label class needs the dimmed marker too — labels are rendered
            // via EdgeLabelRenderer (a portal), so the .dimmed class on the
            // edge SVG never cascades down to them.
            const labelClasses = [];
            if (isBack) labelClasses.push('back');
            if (!isFocused) labelClasses.push('dimmed');

            return {
              id: 'shortcut::' + sc.id,
              source: sc.from,
              target: sc.to,
              type: 'staggered',
              className: classes.join(' '),
              label: isBack ? '' : shortEdgeAction(sc.description, sc.from, sc.to),
              data: {
                labelOffsetY: offsetY,
                labelClass: labelClasses.join(' '),
                // Click the label to open the inspect modal — back-edges
                // have no label so the click handler simply never fires
                // on them (label === '' in that branch).
                onLabelClick: onInspectShortcut ? () => onInspectShortcut(sc) : null,
              },
              markerEnd: {
                type: MarkerType.ArrowClosed,
                color: isBack ? 'var(--back-edge)' : 'var(--tree-edge)',
                width: isBack ? 14 : 18,
                height: isBack ? 14 : 18,
              },
              style: {
                stroke: isBack ? 'var(--back-edge)' : 'var(--tree-edge)',
                strokeWidth: isBack ? 1.25 : 2.5,
              },
            };
          }),
          ...filtered.trailheads.map(th => {
            const edgeKey = 'trailhead::' + th.id;
            // Same strict path-only rule as shortcut edges — the trailhead
            // edge is focused only when its id is explicitly in the path
            // set. Sharing a landing waypoint with a focused trailhead
            // doesn't make this one's edge focused.
            const isFocused = !focusedSet || focusedSet.edges.has(edgeKey);
            const classes = [];
            if (!isFocused) classes.push('dimmed');
            const labelClasses = ['trailhead'];
            if (!isFocused) labelClasses.push('dimmed');
            return {
              id: 'trailhead::' + th.id,
              source: TRAILHEAD_NODE_PREFIX + th.id,
              target: th.to,
              type: 'staggered',
              className: classes.join(' '),
              label: 'entry',

       SUBWAY VIEW — concentric, focal-centered, expand-on-click
       ============================================================================

       sit on a ring at radius R₁; 2 hops on a ring at R₂; deeper hops are
       hidden until the user opts into them by clicking an expandable node.

       upstream shortcuts (so you can see "how could I get here from a
       neighbor"), not just downstream ones.

         - plain click on a station: expand it — its outgoing shortcuts
           reveal one more level of children, added to the visible set
         - shift-click (or ⌘-click) on a station: re-center — that station
           becomes the new focal, ring distances recompute
         - click background: clears selection (does not change focal)

       Edges color by the dominant line they belong to. Stations on multiple

    function buildBfsTree(rootId, adj) {

        proportional to its visible-subtree size. Recomputing per visible

        wedges resize as the user reveals new branches, so freshly-revealed
        nodes don't crowd into a sliver and existing nodes spread out to
        share the freed space. */

    /** Per-depth ring radii. The baseline is `BASE + (d-1)*STEP`, but we push

        always at least one ring-step beyond ring d) so you never get rings
        crossing each other. */

      const radii = new Map();
      const sortedDepths = [...byDepth.keys()].sort((a, b) => a - b);
      let prevR = 0;
      sortedDepths.forEach(d => {
        const angles = byDepth.get(d).slice().sort((a, b) => a - b);
        let minGap = 2 * Math.PI;
        if (angles.length > 1) {

            let gap = next - angles[i];
            if (gap <= 0) gap += 2 * Math.PI;
            if (gap < minGap) minGap = gap;

        const baseR = SUBWAY_RING_BASE + (d - 1) * SUBWAY_RING_STEP;

          // tighter without overlap.

      useEffect(() => {

      // Hash sync — write the canonical hash whenever focal/depth/dest changes.
      // `replaceState` keeps the browser's back stack out of focal navigation

      // make the address bar shareable. Skipping this when nothing's loaded
      // avoids writing a `#focal=null` shape on the first paint.
      useEffect(() => {
        if (typeof window === 'undefined' || !window.history) return;
        if (!focalId) return;

        // a hashchange event in some browsers, and the listener below would
        // bounce right back into setState.

          // configurations — fall back silently rather than throwing on the
          // common offline-export use case.

      // when *another* page on this tab pushed history, paste-and-go) and
      // resync state. The guard against our own writes is via the equality
      // check in the writer — if we wrote the current hash, this listener
      // sees no diff and returns.
      useEffect(() => {
        if (typeof window === 'undefined') return;
        const handler = () => {
          const h = parseSubwayHash();
          if (h.focal && h.focal !== focalId) setFocalId(h.focal);
          // `h.depth != null` (rather than truthiness) so a hypothetical
          // `depth=0` parses through to the clamp below and lifts to
          // SUBWAY_DEPTH_MIN, instead of getting silently dropped at the gate.
          // The parser already filters empty strings via the `if (k && v)`
          // guard, so the only falsy value reaching here is undefined.
          if (h.depth != null) {
            const n = parseInt(h.depth, 10);
            if (!Number.isNaN(n)) {
              const clamped = Math.min(SUBWAY_DEPTH_MAX, Math.max(SUBWAY_DEPTH_MIN, n));
              if (clamped !== maxDepth) setMaxDepth(clamped);
            }
          }
          const nextDest = h.dest || null;
          if (nextDest !== destinationId) setDestinationId(nextDest);
        };
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, [focalId, maxDepth, destinationId]);

      // Shortest-path from focal → destinationId, computed by walking
      // `tree.parent` back from the destination. `tree` is already a BFS
      // tree rooted at the focal, so the parent-walk yields the shortest
      // forward path by construction. Returns:
      //   - found: true with `nodes` (focal-to-dest, inclusive) and `edges`
      //     (set of `subway::<sc.id>` / `subway-th::<th.id>` ids that lie on
      //     the path) when destination is reachable forward.
      //   - found: false with empty collections otherwise. The picker UI
      //     surfaces "no path" so the user knows the destination isn't
      //     forward-reachable from this focal — they might need to pick a
      //     different starting point or accept that the graph has no edge.
      const pathToDest = useMemo(() => {
        const empty = { found: false, nodes: [], edges: new Set(), hops: 0 };
        if (!focalId || !destinationId) return empty;
        if (destinationId === focalId) return empty;
        if (!tree.depth.has(destinationId)) return empty;
        // Walk parents back to focal, collecting nodes in reverse.
        const reverse = [destinationId];
        let cur = destinationId;
        while (cur !== focalId) {
          const p = tree.parent.get(cur);
          if (p === undefined) return empty; // disconnected — shouldn't happen if depth was set, but defend
          reverse.push(p);
          cur = p;
        }
        const nodes = reverse.reverse();
        const edgeIds = new Set();
        // Build a quick lookup so step-edge resolution is O(1) per step.
        const shortcutByFromTo = new Map(); // 'from||to' -> sc.id  (any one — multiple parallel edges collapse)
        filtered.shortcuts.forEach(sc => {
          const k = sc.from + '||' + sc.to;
          if (!shortcutByFromTo.has(k)) shortcutByFromTo.set(k, sc.id);
        });
        for (let i = 0; i + 1 < nodes.length; i++) {
          const a = nodes[i];
          const b = nodes[i + 1];
          if (typeof a === 'string' && a.startsWith(TRAILHEAD_NODE_PREFIX)) {
            edgeIds.add('subway-th::' + a.slice(TRAILHEAD_NODE_PREFIX.length));
          } else {
            const scId = shortcutByFromTo.get(a + '||' + b);
            if (scId) edgeIds.add('subway::' + scId);
          }
        }
        return { found: true, nodes, edges: edgeIds, hops: nodes.length - 1 };
      }, [focalId, destinationId, tree.depth, tree.parent, filtered.shortcuts]);

      const visibleIds = useMemo(() => {
        if (!focalId) return new Set();
        const visible = new Set();
        tree.depth.forEach((d, id) => {
          if (d <= maxDepth) visible.add(id);
        });
        // Always include focal even if depth map didn't capture it.
        visible.add(focalId);
        // Always include the full destination path — the user picked a
        // destination explicitly and shouldn't have to also bump depth to
        // see the answer. Edges on the path are highlighted regardless.
        if (pathToDest.found) {
          pathToDest.nodes.forEach(id => visible.add(id));
        }
        return visible;
      }, [focalId, tree.depth, maxDepth, pathToDest]);

      // Children-of-visible — the slice of the BFS tree that's actually
      // rendered as full waypoint cards. Ghost previews are layered on
      // top *without* participating in this allocation, so adding/removing
      // ghosts doesn't shift the visible siblings' angular slots.
      const visibleChildren = useMemo(() => {
        const m = new Map();
        visibleIds.forEach(id => {
          const kids = (tree.children.get(id) || []).filter(k => visibleIds.has(k));
          if (kids.length > 0) m.set(id, kids);
        });
        return m;
      }, [visibleIds, tree.children]);

      const angleMap = useMemo(() => {
        if (!focalId) return new Map();
        return radialAnglesVisible(focalId, visibleChildren);
      }, [focalId, visibleChildren]);

      // Per-depth ring radius — pushed outward when the densest sibling
      // pair on that ring would overlap at the baseline radius.
      const depthRadii = useMemo(() => {
        if (!focalId) return new Map();
        return computeDepthRadii(visibleIds, focalId, angleMap, tree.depth);
      }, [focalId, visibleIds, angleMap, tree.depth]);

      // One color per journey (trailhead → leaf path). Edges that appear
      // on multiple journeys take the color of the lowest-index journey.
      const edgeColors = useMemo(() => {
        const colors = new Map();
        const edgeId = new Map();
        filtered.shortcuts.forEach(sc => {
          edgeId.set(sc.from + '||' + sc.to, sc.id);
        });
        journeys.forEach((j, idx) => {
          const color = colorForJourney(idx);
          for (let i = 0; i + 1 < j.path.length; i++) {
            const eid = edgeId.get(j.path[i] + '||' + j.path[i + 1]);
            if (eid && !colors.has(eid)) colors.set(eid, color);
          }
        });
        return colors;
      }, [journeys, filtered.shortcuts]);

      const positions = useMemo(() => {
        const m = new Map();
        if (!focalId) return m;
        // Custom positions (from manual drags) take precedence over the
        // auto-computed radial slot. Focal stays at origin unless the
        // user has explicitly dragged it elsewhere.
        m.set(focalId, customPositions.get(focalId) || { x: 0, y: 0 });
        visibleIds.forEach(id => {
          if (id === focalId) return;
          if (customPositions.has(id)) {
            m.set(id, customPositions.get(id));
            return;
          }
          const d = tree.depth.get(id);
          const a = angleMap.get(id);
          if (d === undefined || a === undefined) return;
          const r = depthRadii.get(d) || (SUBWAY_RING_BASE + (d - 1) * SUBWAY_RING_STEP);
          m.set(id, { x: Math.cos(a) * r, y: Math.sin(a) * r });
        });
        return m;
      }, [focalId, visibleIds, tree.depth, angleMap, depthRadii, customPositions]);

      const stationNodes = useMemo(() => {
        const arr = [];
        filtered.waypoints.forEach(wp => {
          if (!visibleIds.has(wp.id)) return;
          const pos = positions.get(wp.id) || { x: 0, y: 0 };
          const isFocal = wp.id === focalId;
          const d = tree.depth.get(wp.id) || 0;
          const depthClass = d >= 6 ? 'subway-depth-deep' : ('subway-depth-' + d);
          const classes = [depthClass];
          if (isFocal) classes.push('subway-focal');
          arr.push({
            id: wp.id,
            type: 'subwayStation',
            position: pos,
            draggable: true,
            selected: selectedWaypoint === wp.id,
            className: classes.join(' '),
            data: {
              label: wp.id,
              title: shortNodeTitle(wp.description, wp.id),
              screenshotDataUri: wp.screenshotDataUri,
              sourceLabel: wp.sourceLabel,
            },
          });
        });
        return arr;
      }, [filtered.waypoints, positions, visibleIds, focalId, selectedWaypoint, tree.depth]);

      // Trailhead pill nodes — first-class citizens in the subway graph.
      // Click semantics are the same as station nodes (re-root focal).
      const trailheadNodes = useMemo(() => {
        const arr = [];
        trailheads.forEach(th => {
          const tid = TRAILHEAD_NODE_PREFIX + th.id;
          if (!visibleIds.has(tid)) return;
          const pos = positions.get(tid) || { x: 0, y: 0 };
          const isFocal = tid === focalId;
          const d = tree.depth.get(tid) || 0;
          const depthClass = d >= 6 ? 'subway-depth-deep' : ('subway-depth-' + d);
          const classes = [depthClass];
          if (isFocal) classes.push('subway-focal');
          arr.push({
            id: tid,
            type: 'subwayTrailhead',
            position: pos,
            draggable: true,
            selected: false,
            className: classes.join(' '),
            width: TRAILHEAD_WIDTH,
            height: TRAILHEAD_HEIGHT,
            data: {
              label: th.id,
              description: th.description,
            },
          });
        });
        return arr;
      }, [trailheads, visibleIds, focalId, positions, tree.depth]);

      const allNodes = useMemo(
        () => [...stationNodes, ...trailheadNodes],
        [stationNodes, trailheadNodes],
      );

      // Forward-only edges. Two filters together:
      //   1. depth(from) < depth(to) — the edge must take the user
      //      *outward* in the BFS expansion. Back-edges (deeper node →
      //      shallower) and same-depth cross-edges are skipped, because
      //      they don't represent forward navigation from "where I am."
      //   2. dedupe by directed (from, to) pair so variants sharing the
      //      same source/target collapse into a single rendered edge —
      //      the inspect modal still surfaces all variants on click.
      const dedupedEdges = useMemo(() => {
        const seen = new Set();
        const out = [];
        filtered.shortcuts.forEach(sc => {
          if (!visibleIds.has(sc.from) || !visibleIds.has(sc.to)) return;
          const dFrom = tree.depth.get(sc.from);
          const dTo = tree.depth.get(sc.to);
          if (dFrom === undefined || dTo === undefined) return;
          if (dFrom >= dTo) return;
          const key = sc.from + '||' + sc.to;
          if (seen.has(key)) return;
          seen.add(key);
          out.push(sc);
        });
        return out;
      }, [filtered.shortcuts, visibleIds, tree.depth]);

      const edges = useMemo(() => {
        const arr = dedupedEdges.map(sc => {
          const edgeKey = 'subway::' + sc.id;
          const onPath = pathToDest.found && pathToDest.edges.has(edgeKey);
          const baseColor = edgeColors.get(sc.id) || 'var(--tree-edge)';
          const color = onPath ? 'var(--accent)' : baseColor;
          // Edge depth = max of its endpoints, so it fades with the dimmer
          // side. A label class mirror keeps the portaled label opacity in
          // sync with the edge stroke. Path-overlay edges bypass the depth
          // dimming so the answer to "how do I get there" reads cleanly
          // even when the destination is past `maxDepth`.
          const dFrom = tree.depth.get(sc.from) || 0;
          const dTo = tree.depth.get(sc.to) || 0;
          const d = Math.max(dFrom, dTo);
          const depthClass = d >= 5 ? 'subway-edge-depth-deep' : ('subway-edge-depth-' + d);
          // Express-shortcut badge: when the shortcut body is more than
          // one tool call, the agent reaches the destination in a single
          // graph-edge but multiple actual taps. Show the tap count
          // inline so humans see "this is graph-distance 1 but 3 taps
          // under the hood."
          const tapCount = (sc.toolsList && sc.toolsList.length) || 0;
          const baseLabel = shortEdgeAction(sc.description, sc.from, sc.to);
          const label = (tapCount > 1)
            ? baseLabel + '  ·  ' + tapCount + ' taps'
            : baseLabel;
          const classes = [depthClass];
          if (tapCount > 1) classes.push('subway-edge-express');
          if (onPath) classes.push('subway-edge-shortest-path');
          return {
            id: edgeKey,
            source: sc.from,
            target: sc.to,
            type: 'staggered',
            className: classes.join(' '),
            label,
            data: {
              straight: true,
              floating: true,
              labelOffsetY: 0,
              labelClass: tapCount > 1 ? 'edge-label-express' : '',
              // Click the label to open the shortcut inspect modal —
              // the user can see exactly which actions take them from
              // sc.from to sc.to.
              onLabelClick: onInspectShortcut ? () => onInspectShortcut(sc) : null,
            },
            markerEnd: { type: MarkerType.ArrowClosed, color, width: onPath ? 18 : 16, height: onPath ? 18 : 16 },
            style: {
              stroke: color,
              strokeWidth: onPath ? 5 : 3,
              strokeOpacity: onPath ? 1 : 0.85,
            },
          };
        });
        // Trailhead → landing "launch" edges. Drawn dashed in the trailhead
        // color so they're visually distinct from regular shortcuts.
        trailheads.forEach(th => {
          const tid = TRAILHEAD_NODE_PREFIX + th.id;
          if (!visibleIds.has(tid) || !visibleIds.has(th.to)) return;
          const dFrom = tree.depth.get(tid) || 0;
          const dTo = tree.depth.get(th.to) || 0;
          const d = Math.max(dFrom, dTo);
          const depthClass = d >= 5 ? 'subway-edge-depth-deep' : ('subway-edge-depth-' + d);
          const edgeKey = 'subway-th::' + th.id;
          const onPath = pathToDest.found && pathToDest.edges.has(edgeKey);
          const classes = [depthClass];
          if (onPath) classes.push('subway-edge-shortest-path');
          arr.push({
            id: edgeKey,
            source: tid,
            target: th.to,
            type: 'staggered',
            className: classes.join(' '),
            label: 'launch',
            data: { straight: true, floating: true, labelOffsetY: 0, labelClass: 'trailhead' },
            markerEnd: { type: MarkerType.ArrowClosed, color: onPath ? 'var(--accent)' : 'var(--trailhead)', width: onPath ? 18 : 16, height: onPath ? 18 : 16 },
            style: {
              stroke: onPath ? 'var(--accent)' : 'var(--trailhead)',
              strokeWidth: onPath ? 5 : 2.5,
              strokeDasharray: onPath ? null : '5 4',
              strokeOpacity: onPath ? 1 : 0.95,
            },
          });
        });
        return arr;
      }, [dedupedEdges, edgeColors, tree.depth, trailheads, visibleIds, onInspectShortcut, pathToDest]);

      const onNodeClick = useCallback((evt, node) => {
        // Subway semantics: every click re-roots the focal at that node.
        // navigateTo pushes onto the history stack so Back can return to
        // the previous focal, then setFocalId fires the BFS recompute and
        // the unified animation effect handles the camera move.
        navigateTo(node.id);
        if (!isTrailheadId(node.id)) {
          onSelectWaypoint(node.id);
        } else {
          onSelectWaypoint(null);
        }
      }, [navigateTo, onSelectWaypoint]);

      const onPaneClick = useCallback(() => onSelectWaypoint(null), [onSelectWaypoint]);

      // Cancel any fly-to-selected animation the moment a drag begins —
      // otherwise the camera tries to chase the node while the user is
      // moving it, which feels broken.
      const onNodeDragStart = useCallback(() => {
        cancelInFlightAnim();
      }, []);

      // Update the override on every drag tick so the node visibly tracks
      // the cursor. Capturing only on dragStop fails because the `position`
      // prop we pass into ReactFlow is recomputed from the radial layout
      // each render and snaps the node back to its slot mid-drag.
      const onNodeDrag = useCallback((evt, node) => {
        setCustomPositions(prev => {
          const next = new Map(prev);
          next.set(node.id, { x: node.position.x, y: node.position.y });
          return next;
        });
      }, []);

      // dragStop is still useful as a safety net — if the final position
      // arrives via the stop event but not the last drag tick (rare), this
      // ensures we don't leave the node at a stale intermediate spot.
      const onNodeDragStop = useCallback((evt, node) => {
        setCustomPositions(prev => {
          const next = new Map(prev);
          next.set(node.id, { x: node.position.x, y: node.position.y });
          return next;
        });
      }, []);

      const resetExpansion = useCallback(() => {
        setCustomPositions(new Map());
        onSelectWaypoint(null);
      }, [onSelectWaypoint]);

      // Two refs: the React Flow instance (for setViewport / fitView) and
      // the wrapping DOM container (for measuring viewport size when we
      // compute the centering target).
      const flowInstanceRef = useRef(null);
      const containerRef = useRef(null);
      const animCancelRef = useRef(null);
      const onInit = useCallback((instance) => {
        flowInstanceRef.current = instance;
      }, []);

      // Cancel whatever animation is currently in flight so a fresh request
      // doesn't fight the previous one.
      const cancelInFlightAnim = () => {
        if (animCancelRef.current) {
          animCancelRef.current();
          animCancelRef.current = null;
        }
      };

      // Unified camera animation. Fires on focal *or* selected change, and
      // always uses the bouncy easeOutBack tweener so dropdown swaps,
      // canvas clicks, and external selections all feel the same. Two
      // separate effects raced each other when both fired in the same
      // click (focal + selected both update); merging into one with a
      // single setTimeout makes the cancellation deterministic.
      useEffect(() => {
        const inst = flowInstanceRef.current;
        const container = containerRef.current;
        if (!inst || !container || !focalId) return;
        const t = setTimeout(() => {
          cancelInFlightAnim();
          // When selected is distinct from focal (e.g. user picked a
          // waypoint from the side journey panel without re-focusing),
          // fly to the selected node at the current zoom. Otherwise the
          // target is the focal itself at world (0, 0), and we also
          // compute a zoom that fits ring 1 in the viewport — so a click
          // automatically zooms out enough to see "where can I go from
          // here?" without losing the neighbors off-screen.
          let wx = 0, wy = 0;
          let targetZoom; // undefined = keep current zoom
          if (selectedWaypoint && selectedWaypoint !== focalId) {
            const node = inst.getNode(selectedWaypoint);
            if (node && node.position) {
              const w = (node.measured && node.measured.width) || NODE_WIDTH;
              const h = (node.measured && node.measured.height) || NODE_HEIGHT;
              wx = node.position.x + w / 2;
              wy = node.position.y + h / 2;
            }
          } else {
            // Fit ring 1 + ring 2 in the viewport. Visible set is capped
            // at depth 2, so the outer extent is just the largest ring
            // radius depthRadii has computed.
            let maxR = depthRadii.get(1) || SUBWAY_RING_BASE;
            const r2 = depthRadii.get(2);
            if (r2 && r2 > maxR) maxR = r2;
            const rect = container.getBoundingClientRect();
            // Pad each side with a full card half so the outermost
            // element doesn't clip its own border against the viewport.
            const fitW = 2 * (maxR + NODE_WIDTH / 2);
            const fitH = 2 * (maxR + NODE_HEIGHT / 2);
            if (rect.width > 0 && rect.height > 0 && fitW > 0 && fitH > 0) {
              const zoomW = (rect.width * 0.9) / fitW;
              const zoomH = (rect.height * 0.9) / fitH;
              // No 1× cap — sparse views (focal with few neighbors) should
              // zoom *in* to fill the viewport, not leave acres of dead
              // space. 2× cap as a soft upper bound for edge cases like
              // a leaf focal with nothing else to fit.
              targetZoom = Math.min(2, Math.min(zoomW, zoomH));
            }
          }
          animCancelRef.current = flyViewportTo(inst, container, wx, wy, targetZoom, 700);
        }, 80);
        return () => clearTimeout(t);
      }, [focalId, selectedWaypoint, depthRadii, visibleIds, tree.children, tree.depth]);

      // Picker options come in three sections: the trailheads themselves
      // (selecting one re-centers on its pill), then trailhead landings
      // (waypoints reachable in one launch), then every other waypoint.
      const focalOptions = useMemo(() => {
        const trailheadDestSet = new Set(trailheads.map(th => th.to));
        const sortedWps = [...filtered.waypoints].sort((a, b) => a.id.localeCompare(b.id));
        const trailheadDests = sortedWps.filter(w => trailheadDestSet.has(w.id));
        const others = sortedWps.filter(w => !trailheadDestSet.has(w.id));
        const sortedTHs = [...trailheads].sort((a, b) => a.id.localeCompare(b.id));
        const groups = [];
        if (sortedTHs.length > 0) {
          groups.push(React.createElement('optgroup', { key: 'trailheads', label: 'Trailheads' },
            sortedTHs.map(th => React.createElement('option', {
              key: TRAILHEAD_NODE_PREFIX + th.id,
              value: TRAILHEAD_NODE_PREFIX + th.id,
            }, '✈ ' + th.id))));
        }
        if (trailheadDests.length > 0) {
          groups.push(React.createElement('optgroup', { key: 'landings', label: 'Trailhead landings' },
            trailheadDests.map(wp => React.createElement('option', {
              key: wp.id, value: wp.id,
            }, wp.id))));
        }
        if (others.length > 0) {
          groups.push(React.createElement('optgroup', { key: 'waypoints', label: 'Other waypoints' },
            others.map(wp => React.createElement('option', {
              key: wp.id, value: wp.id,
            }, wp.id))));
        }
        return groups;
      }, [filtered.waypoints, trailheads]);

      const trailheadHint = useMemo(() => {
        const ths = trailheadByLanding.get(focalId) || [];
        if (ths.length === 0) return null;
        return ths.map(th => th.id).join(', ');
      }, [trailheadByLanding, focalId]);

      // Destination dropdown options: only waypoints that are forward-reachable
      // from the current focal, sorted by hop distance then id. Showing
      // unreachable destinations would give the user the impression they could
      // pick *anything* and get a path — but the graph is directed and forward-
      // only navigation is the planner's model, so a backward-only destination
      // is genuinely a "no path" answer. Filtering at the source is more
      // honest than rendering "no path" 90% of the time.
      const destinationOptions = useMemo(() => {
        if (!focalId) return [];
        const reachable = [];
        tree.depth.forEach((d, id) => {
          if (id === focalId) return;
          if (typeof id === 'string' && id.startsWith(TRAILHEAD_NODE_PREFIX)) return; // trailheads aren't destinations
          reachable.push({ id, hops: d });
        });
        reachable.sort((a, b) => a.hops - b.hops || a.id.localeCompare(b.id));
        const groups = [];
        // Group by hop count up to 3, then a single "Further" bucket so the
        // dropdown doesn't grow an optgroup per ring. Most useful destinations
        // are within 1–3 hops; deeper ones are still selectable but live in a
        // single far group.
        const buckets = new Map();
        reachable.forEach(({ id, hops }) => {
          const bucket = hops <= 3 ? hops : 'far';
          if (!buckets.has(bucket)) buckets.set(bucket, []);
          buckets.get(bucket).push(id);
        });
        const orderedKeys = [1, 2, 3, 'far'].filter(k => buckets.has(k));
        orderedKeys.forEach(k => {
          const label = k === 'far' ? 'Further (4+ hops)' : (k + ' hop' + (k === 1 ? '' : 's'));
          groups.push(React.createElement('optgroup', { key: 'dest-' + k, label },
            buckets.get(k).map(id => React.createElement('option', { key: id, value: id }, id))));
        });
        return groups;
      }, [focalId, tree.depth]);

      // Agent-view text — the prompt format we'd hand the LLM. Two-part
      // structure to keep token usage flat as depth grows: first, a
      // depth-grouped list of *just* waypoint ids (with the immediate
      // parent shown for context past depth 1); then two flat lookup
      // appendices — one for waypoint descriptions, one for the
      // shortcuts used along the visible BFS tree. Each unique waypoint
      // and shortcut appears in the dictionary exactly once regardless
      // of how many paths cite it.
      const agentViewText = useMemo(() => {
        if (!focalId) return '';
        const wpById = new Map();
        filtered.waypoints.forEach(wp => wpById.set(wp.id, wp));
        const thById = new Map();
        filtered.trailheads.forEach(th => thById.set(th.id, th));
        const labelFor = (id) => {
          if (id.startsWith(TRAILHEAD_NODE_PREFIX)) return '✈ ' + id.slice(TRAILHEAD_NODE_PREFIX.length);
          return id;
        };
        const shortcutsFromTo = (from, to) => filtered.shortcuts.filter(sc => sc.from === from && sc.to === to);

        const out = [];
        out.push('You are at: ' + labelFor(focalId));
        out.push('');

        // Group reachable nodes by hop distance, capped at maxDepth.
        const byDepth = new Map();
        tree.depth.forEach((d, id) => {
          if (id === focalId) return;
          if (d < 1 || d > maxDepth) return;
          if (!byDepth.has(d)) byDepth.set(d, []);
          byDepth.get(d).push(id);
        });

        for (let d = 1; d <= maxDepth; d++) {
          const ids = (byDepth.get(d) || []).slice().sort();
          out.push('Reachable in ' + d + ' hop' + (d === 1 ? '' : 's') + ' (' + ids.length + '):');
          if (ids.length === 0) {
            out.push(d === 1 ? '  (none — leaf node)' : '  (none)');
            out.push('');
            continue;
          }
          ids.forEach(id => {
            if (d === 1) {
              out.push('  ' + labelFor(id));
            } else {
              // Show only the immediate parent with a back-arrow. The
              // full chain is recoverable from each node's parent link,
              // and the action labels live in the SHORTCUTS appendix
              // below — no need to repeat them per path.
              const parent = tree.parent.get(id);

    /** Format a JsonObject (typed as a plain JS object after parsing) into
        YAML-ish text for the inspect modal. Single-key wrapper objects
        like `{"tapElement": {...}}` are common — they render as
        `tapElement:` followed by indented children, mirroring how the
        shortcut would look in its source `.shortcut.yaml` file. */
    function formatYamlish(obj, indent) {
      indent = indent || 0;
      const pad = '  '.repeat(indent);
      if (obj === null || obj === undefined) return pad + 'null';
      if (typeof obj === 'string') return JSON.stringify(obj);
      if (typeof obj !== 'object') return String(obj);
      if (Array.isArray(obj)) {
        if (obj.length === 0) return '[]';
        return obj.map(item => {
          if (item !== null && typeof item === 'object') {
            const inner = formatYamlish(item, indent + 1);
            // Replace the first line's leading whitespace with `- ` so the
            // dash anchors the array element at the parent indent.
            const lines = inner.split('\n');
            lines[0] = '  '.repeat(indent) + '- ' + lines[0].slice((indent + 1) * 2);
            return lines.join('\n');
          }
          const valStr = typeof item === 'string' ? JSON.stringify(item) : String(item);
          return pad + '- ' + valStr;
        }).join('\n');
      }
      const entries = Object.entries(obj);
      if (entries.length === 0) return pad + '{}';
      return entries.map(([k, v]) => {
        if (v !== null && typeof v === 'object') {
          if (Array.isArray(v) && v.length === 0) return pad + k + ': []';
          if (!Array.isArray(v) && Object.keys(v).length === 0) return pad + k + ': {}';
          return pad + k + ':\n' + formatYamlish(v, indent + 1);
        }
        const valStr = typeof v === 'string' ? JSON.stringify(v) : String(v);
        return pad + k + ': ' + valStr;
      }).join('\n');
    }

      return React.createElement('div', { className: 'empty-state' },
        React.createElement('h2', null, 'No waypoints to display'),
        React.createElement('p', null, message),
      );
    }

    const data = window.WAYPOINT_GRAPH_DATA;
    const root = createRoot(document.getElementById('root'));
    if (!data || !Array.isArray(data.waypoints) || data.waypoints.length === 0) {
      root.render(React.createElement(EmptyState, {
        message: data
          ? 'The graph data was loaded but contained no waypoints.'
          : 'No graph data was provided. The page expects window.WAYPOINT_GRAPH_DATA to be set.',
      }));
    } else {
      root.render(React.createElement(App, { data }));
    }
  </script>
</body>
</html>
